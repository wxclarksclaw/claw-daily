=&mid=2247881170&idx=3&sn=d59c83fea9c08c25435d178631226add\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、研究背景：VLM空间推理测试面临严重困境</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、现有数据集存在根本性缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">维度混淆</span><span class=\"point-val\">：现有测试仅用\"房间数量\"定义复杂度，导致错误归因困难</span></div>\n<div class=\"point\"><span class=\"point-kw\">无法区分类别</span><span class=\"point-val\">：研究人员无法判断错误源于组合复杂度、关系复杂度还是观察复杂度</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、生成工具存在常识缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">物理违背</span><span class=\"point-val\">：LLM直接生成3D布局常出现物体穿模、悬空、越界等违反物理规律的问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">语言鸿沟</span><span class=\"point-val\">：传统3D程序化引擎虽符合物理规律，但难以理解复杂自然语言指令</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、核心方案：InfiniBench全自动3D场景生成引擎</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、大模型智能体迭代生成场景约束</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">LLM Agent</span><span class=\"point-val\">：提供包含可用API和Few-shot示例的知识库，将自然语言翻译为机器可读约束</span></div>\n<div class=\"point\"><span class=\"point-kw\">CoT反馈循环</span><span class=\"point-val\">：布局优化器报错时返回BEV碰撞图，LLM分析失败原因并自动修正约束</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、基于簇的布局优化策略</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">可移动簇概念</span><span class=\"point-val\">：将语义相关的物体群（如餐桌+周围椅子）打包成整体</span></div>\n<div class=\"point\"><span class=\"point-kw\">突破高密度极限</span><span class=\"point-val\">：允许簇作为整体移动，避免传统层级优化的小物体塞不进去问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">集体碰撞检测</span><span class=\"point-val\">：使用整个簇的边界框进行物理校验</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、任务感知相机轨迹优化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Frontier探索</span><span class=\"point-val\">：将未访问的关键物体视为前沿目标，自动采样无遮挡最佳视角</span></div>\n<div class=\"point\"><span class=\"point-kw\">Dijkstra路径规划</span><span class=\"point-val\">：在2D平面图规划无碰撞极简导航路径，确保所有测试物体清晰入镜</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、实验验证：物理真实度满分，揭示VLM核心弱点</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、与现有方法对比优势明显</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">提示词保真度</span><span class=\"point-val\">：契合度比肩LayoutGPT、Holodeck等顶尖LLM方法</span></div>\n<div class=\"point\"><span class=\"point-kw\">物理合理性</span><span class=\"point-val\">：碰撞数量和越界物体数量均无限逼近0.0，远超Infinigen、Luminous</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、顶级VLM空间推理测试结论</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">组合复杂度脆弱</span><span class=\"point-val\">：物体数量从5增至50时，所有VLM准确率断崖式下跌，倾向重复计数</span></div>\n<div class=\"point\"><span class=\"point-kw\">关系复杂度混淆</span><span class=\"point-val\">：无关物体增加导致复杂指代（如\"靠近木桌的蓝色杯子\"）时严重指代混淆</span></div>\n<div class=\"point\"><span class=\"point-kw\">观察复杂度受限</span><span class=\"point-val\">：宏观空间理解任务（透视变换、时空追踪）受限于2D视角降维</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-17", "category": "【AI技术与应用】"}, {"date": "2026-04-07", "title": "【卡帕西没做完的开源社区48小时搞定了完全体知识库token省70倍】", "summary": "开源社区48小时完成Karpathy知识库工具化升级，Graphify实现71.5倍token节省和全模态自动图谱化", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=2&sn=a48eb4404c4ea414a8586646bbaf749f\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Graphify是Karpathy知识库方法的完全体工具化升级</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、解决了Karpathy方法的三大痛点</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">手动整理</span><span class=\"point-val\">：raw文件夹需手动规整资料、手动触发处理</span></div>\n<div class=\"point\"><span class=\"point-kw\">token消耗高</span><span class=\"point-val\">：反复读取原始文件带来高昂token开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">工作流繁琐</span><span class=\"point-val\">：缺乏专门工具封装，需一步步引导AI执行</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、实现了零配置开箱即用的自动化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">一条命令</span><span class=\"point-val\">：执行`/graphify .`即可生成完整知识图谱</span></div>\n<div class=\"point\"><span class=\"point-kw\">无需预处理</span><span class=\"point-val\">：文件丢进文件夹即可统一入谱，无需人工干预</span></div>\n<div class=\"point\"><span class=\"point-kw\">全程自动化</span><span class=\"point-val\">：从文件扫描到图谱生成无需人工介入</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、71.5倍Token消耗节省的技术实现</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、第一阶段：本地AST确定性解析</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">tree-sitter解析</span><span class=\"point-val\">：对代码文件做本地AST提取</span></div>\n<div class=\"point\"><span class=\"point-kw\">零LLM调用</span><span class=\"point-val\">：第一阶段不调用LLM，不产生任何Token消耗</span></div>\n<div class=\"point\"><span class=\"point-kw\">结构信息提取</span><span class=\"point-val\">：直接获取代码结构信息，无需向量嵌入</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、第二阶段：并行LLM子代理语义提取</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">增量处理</span><span class=\"point-val\">：搭配SHA256缓存机制，仅处理变更文件</span></div>\n<div class=\"point\"><span class=\"point-kw\">避免重复</span><span class=\"point-val\">：从根本上避免重复计算与无效开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">多文件支持</span><span class=\"point-val\">：处理PDF、Markdown、图片等非代码内容</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、全模态自动图谱化的万物皆可图谱化能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、统一的多模态处理管线</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">代码解析</span><span class=\"point-val\">：通过tree-sitter做本地AST解析提取结构信息</span></div>\n<div class=\"point\"><span class=\"point-kw\">文档拆分</span><span class=\"point-val\">：PDF、Markdown自动拆分文本与语义单元</span></div>\n<div class=\"point\"><span class=\"point-kw\">视觉识别</span><span class=\"point-val\">：截图、流程图、白板照片调用Claude Vision完成概念提取</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、无需向量数据库的聚类方案</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">图拓扑聚类</span><span class=\"point-val\">：基于图拓扑完成聚类，依靠Leiden社区发现算法</span></div>\n<div class=\"point\"><span class=\"point-kw\">边密度划分</span><span class=\"point-val\">：按边密度划分社区，无需依赖embeddings</span></div>\n<div class=\"point\"><span class=\"point-kw\">省去部署</span><span class=\"point-val\">：自然省去向量数据库的部署与维护成本</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、实时增量更新的持续生长能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、文件监听与自动更新</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">—watch模式</span><span class=\"point-val\">：代码文件改动后立即触发AST重新解析</span></div>\n<div class=\"point\"><span class=\"point-kw\">增量提醒</span><span class=\"point-val\">：文档、图片变更主动提醒用户执行增量更新</span></div>\n<div class=\"point\"><span class=\"point-kw\">Git钩子</span><span class=\"point-val\">：代码commit提交、分支切换后自动重建图谱</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、持久化的增量更新命令</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">—update命令</span><span class=\"point-val\">：新资料加入时无需重建整个图谱</span></div>\n<div class=\"point\"><span class=\"point-kw\">节点关联</span><span class=\"point-val\">：只更新相关节点和关联</span></div>\n<div class=\"point\"><span class=\"point-kw\">持续生长</span><span class=\"point-val\">：让知识库真正实现随资料新增持续生长</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、全平台适配与快速部署</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、多平台无缝接入</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Claude Code</span><span class=\"point-val\">：支持Claude Code平台</span></div>\n<div class=\"point\"><span class=\"point-kw\">Codex</span><span class=\"point-val\">：需在config.toml打开multi_agent = true启用并行模式</span></div>\n<div class=\"point\"><span class=\"point-kw\">OpenClaw</span><span class=\"point-val\">：支持但仅支持顺序提取，速度效率受限</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、一行命令完成部署</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">pip安装</span><span class=\"point-val\">：`pip install graphifyy && graphify install`</span></div>\n<div class=\"point\"><span class=\"point-kw\">Python环境</span><span class=\"point-val\">：仅需Python 3.10及以上</span></div>\n<div class=\"point\"><span class=\"point-kw\">平台选项</span><span class=\"point-val\">：龙虾平台支持`graphify install —platform claw`</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-18", "category": "【AI技术与应用】"}]}], "articles": [{"date": "2026-04-07", "title": "【“Claude Code更新废了”热议Issue思考深度下降67%已无法胜任复杂的工程任务】", "summary": "Claude Code思考深度骤降67%致质量退化，思考隐藏功能上线是主因，用户体验指标全面恶化", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=1&sn=494f53424a7287eccb9d7b2a214f8b4a\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、社区发现Claude Code更新后质量严重退化，热议Issue直指核心问题</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、社区用户在官方仓库提交详细反馈Issue，指出Claude Code已“废了”</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">反馈提交者</span><span class=\"point-val\">：Stella Laurenzo，AMD负责开源AI软件开发相关工作</span></div>\n<div class=\"point\"><span class=\"point-kw\">问题描述</span><span class=\"point-val\">：更新导致思考深度下降67%，当前版本无法胜任复杂工程任务</span></div>\n<div class=\"point\"><span class=\"point-kw\">具体表现</span><span class=\"point-val\">：无视用户指令、执行与要求完全相反的操作、假装说任务已完成</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、问题时间线可精确追溯到2月份，与新功能上线时间完全吻合</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">关键功能</span><span class=\"point-val\">：redact-thinking-2026-02-12（思考内容隐藏功能）</span></div>\n<div class=\"point\"><span class=\"point-kw\">质量拐点</span><span class=\"point-val\">：3月8日隐藏思考块占比突破50%，用户开始反馈质量退化问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">灰度部署</span><span class=\"point-val\">：一周内从1.5%→25%→58%→100%，符合分阶段上线特征</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、思考深度从2200字符暴跌至560字符，降幅达67%是退化根源</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、基于7146组有效数据的皮尔逊相关分析证明思考深度大幅削减</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">数据规模</span><span class=\"point-val\">：6852个Claude Code会话JSONL文件，覆盖17871个思考块</span></div>\n<div class=\"point\"><span class=\"point-kw\">模型选择</span><span class=\"point-val\">：Claude Opus模型，Anthropic官方API直连，排除第三方干扰</span></div>\n<div class=\"point\"><span class=\"point-kw\">相关系数</span><span class=\"point-val\">：0.971，signature字段可精准估算思考深度</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、不同时间段思考深度呈现阶梯式下降趋势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">优质期</span><span class=\"point-val\">：1月30日至2月8日：约2200字符</span></div>\n<div class=\"point\"><span class=\"point-kw\">过渡期</span><span class=\"point-val\">：2月下旬：降至720字符，降幅67%</span></div>\n<div class=\"point\"><span class=\"point-kw\">退化期</span><span class=\"point-val\">：3月上旬：进一步降至560字符，降幅75%</span></div>\n<div class=\"point\"><span class=\"point-kw\">隐藏功能</span><span class=\"point-val\">：3月初上线让退化对用户变得不可见</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、思考深度下降导致工作模式从“先研究再修改”转变为“莽撞修改”</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、读改比从6.6骤降至2.0，模型研究投入减少70%</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">优质期行为</span><span class=\"point-val\">：先读取目标文件、相关依赖文件，检索代码库全局调用关系，查阅头文件与测试用例，再开展精准修改</span></div>\n<div class=\"point\"><span class=\"point-kw\">退化期行为</span><span class=\"point-val\">：仅读取当前文件就仓促修改，直接跳过前期调研步骤</span></div>\n<div class=\"point\"><span class=\"point-kw\">严重程度</span><span class=\"point-val\">：每3次修改中就有1次是在未读取目标文件上下文的情况下直接进行</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、代码修改精准度大幅下滑，依赖全量重写而非精准调整</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">优质期</span><span class=\"point-val\">：全量新建文件占比4.9%，倾向于精准调整</span></div>\n<div class=\"point\"><span class=\"point-kw\">退化期</span><span class=\"point-val\">：占比翻倍至10%，后期攀升至11.1%</span></div>\n<div class=\"point\"><span class=\"point-kw\">后果</span><span class=\"point-val\">：重写丢失项目专属规范理解和上下文感知能力</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、多种可量化质量指标全面恶化，用户体验显著下降</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、终止钩子脚本触发次数从0飙升至173次，平均每天10次</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">识别行为</span><span class=\"point-val\">：推诿责任、提前终止等不良行为</span></div>\n<div class=\"point\"><span class=\"point-kw\">时间范围</span><span class=\"point-val\">：3月8日后17天内</span></div>\n<div class=\"point\"><span class=\"point-kw\">前期对比</span><span class=\"point-val\">：3月8日之前从未触发</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、用户提示词负面情绪占比从5.8%升至9.8%，涨幅68%</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">其他指标</span><span class=\"point-val\">：需纠正的推诿行为数量翻倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">会话变化</span><span class=\"point-val\">：单会话平均提示词数量下降22%</span></div>\n<div class=\"point\"><span class=\"point-kw\">推理问题</span><span class=\"point-val\">：出现此前从未有过的推理循环问题</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、推理循环率翻3倍，最严重会话单次响应出现20次以上推理反转</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">根本原因</span><span class=\"point-val\">：思考深度充足时模型会内部解决推理矛盾，不足时矛盾直接暴露</span></div>\n<div class=\"point\"><span class=\"point-kw\">表现特征</span><span class=\"point-val\">：“哦等一下”“实际上”“让我重新想想”“嗯，不对”等自我修正频繁出现</span></div>\n<div class=\"point\"><span class=\"point-kw\">后果</span><span class=\"point-val\">：推理路径彻底混乱，输出结果完全不可信</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">4、中断率飙升12倍，模型在被纠正后频繁承认输出质量不佳</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">用户中断</span><span class=\"point-val\">：用户发现模型犯错并强行终止，中断率越高代表需人工纠错越多</span></div>\n<div class=\"point\"><span class=\"point-kw\">模型自认</span><span class=\"point-val\">：“你说得对，这太敷衍了”“我太仓促了，结果一目了然”</span></div>\n<div class=\"point\"><span class=\"point-kw\">核心问题</span><span class=\"point-val\">：模型自己也知道输出不达标，但只有被外部纠正后才会发现</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、时段分析揭示思考深度波动模式，美国黄金时段反而体验最差</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、隐藏功能上线前全天思考深度相对稳定，非高峰时段仅10%小幅优势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">时间段</span><span class=\"point-val\">：1月30日至3月7日</span></div>\n<div class=\"point\"><span class=\"point-kw\">特征</span><span class=\"point-val\">：符合负载略低的预期</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、隐藏功能上线后时段模式彻底反转，波动大幅加剧</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">时间段</span><span class=\"point-val\">：3月8日至4月1日</span></div>\n<div class=\"point\"><span class=\"point-kw\">反常现象</span><span class=\"point-val\">：非高峰时段整体思考深度反而更低</span></div>\n<div class=\"point\"><span class=\"point-kw\">最差时段</span><span class=\"point-val\">：太平洋时间17:00，中位估算思考深度仅423字符</span></div>\n<div class=\"point\"><span class=\"point-kw\">次差时段</span><span class=\"point-val\">：太平洋时间19:00，估算思考深度仅373字符，但样本量1031个为全时段最高，属于美国黄金使用时段</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-13", "category": "【AI技术与应用】"}, {"date": "2026-04-07", "title": "【一句话生成无限逼真3D场景匹兹堡大学新作直击VLM空间推理软肋丨CVPR'26】", "summary": "匹兹堡大学发布InfiniBench框架，自然语言即可生成无限逼真3D测试场景，精准诊断Gemini、GPT-5等VLM空间推理缺陷。", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=3&sn=d59c83fea9c08c25435d178631226add\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、研究背景：VLM空间推理测试面临严重困境</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、现有数据集存在根本性缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">维度混淆</span><span class=\"point-val\">：现有测试仅用\"房间数量\"定义复杂度，导致错误归因困难</span></div>\n<div class=\"point\"><span class=\"point-kw\">无法区分类别</span><span class=\"point-val\">：研究人员无法判断错误源于组合复杂度、关系复杂度还是观察复杂度</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、生成工具存在常识缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">物理违背</span><span class=\"point-val\">：LLM直接生成3D布局常出现物体穿模、悬空、越界等违反物理规律的问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">语言鸿沟</span><span class=\"point-val\">：传统3D程序化引擎虽符合物理规律，但难以理解复杂自然语言指令</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、核心方案：InfiniBench全自动3D场景生成引擎</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、大模型智能体迭代生成场景约束</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">LLM Agent</span><span class=\"point-val\">：提供包含可用API和Few-shot示例的知识库，将自然语言翻译为机器可读约束</span></div>\n<div class=\"point\"><span class=\"point-kw\">CoT反馈循环</span><span class=\"point-val\">：布局优化器报错时返回BEV碰撞图，LLM分析失败原因并自动修正约束</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、基于簇的布局优化策略</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">可移动簇概念</span><span class=\"point-val\">：将语义相关的物体群（如餐桌+周围椅子）打包成整体</span></div>\n<div class=\"point\"><span class=\"point-kw\">突破高密度极限</span><span class=\"point-val\">：允许簇作为整体移动，避免传统层级优化的小物体塞不进去问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">集体碰撞检测</span><span class=\"point-val\">：使用整个簇的边界框进行物理校验</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、任务感知相机轨迹优化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Frontier探索</span><span class=\"point-val\">：将未访问的关键物体视为前沿目标，自动采样无遮挡最佳视角</span></div>\n<div class=\"point\"><span class=\"point-kw\">Dijkstra路径规划</span><span class=\"point-val\">：在2D平面图规划无碰撞极简导航路径，确保所有测试物体清晰入镜</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、实验验证：物理真实度满分，揭示VLM核心弱点</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、与现有方法对比优势明显</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">提示词保真度</span><span class=\"point-val\">：契合度比肩LayoutGPT、Holodeck等顶尖LLM方法</span></div>\n<div class=\"point\"><span class=\"point-kw\">物理合理性</span><span class=\"point-val\">：碰撞数量和越界物体数量均无限逼近0.0，远超Infinigen、Luminous</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、顶级VLM空间推理测试结论</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">组合复杂度脆弱</span><span class=\"point-val\">：物体数量从5增至50时，所有VLM准确率断崖式下跌，倾向重复计数</span></div>\n<div class=\"point\"><span class=\"point-kw\">关系复杂度混淆</span><span class=\"point-val\">：无关物体增加导致复杂指代（如\"靠近木桌的蓝色杯子\"）时严重指代混淆</span></div>\n<div class=\"point\"><span class=\"point-kw\">观察复杂度受限</span><span class=\"point-val\">：宏观空间理解任务（透视变换、时空追踪）受限于2D视角降维</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-17", "category": "【AI技术与应用】"}, {"date": "2026-04-07", "title": "【卡帕西没做完的开源社区48小时搞定了完全体知识库token省70倍】", "summary": "开源社区48小时完成Karpathy知识库工具化升级，Graphify实现71.5倍token节省和全模态自动图谱化", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=2&sn=a48eb4404c4ea414a8586646bbaf749f\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Graphify是Karpathy知识库方法的完全体工具化升级</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、解决了Karpathy方法的三大痛点</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">手动整理</span><span class=\"point-val\">：raw文件夹需手动规整资料、手动触发处理</span></div>\n<div class=\"point\"><span class=\"point-kw\">token消耗高</span><span class=\"point-val\">：反复读取原始文件带来高昂token开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">工作流繁琐</span><span class=\"point-val\">：缺乏专门工具封装，需一步步引导AI执行</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、实现了零配置开箱即用的自动化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">一条命令</span><span class=\"point-val\">：执行`/graphify .`即可生成完整知识图谱</span></div>\n<div class=\"point\"><span class=\"point-kw\">无需预处理</span><span class=\"point-val\">：文件丢进文件夹即可统一入谱，无需人工干预</span></div>\n<div class=\"point\"><span class=\"point-kw\">全程自动化</span><span class=\"point-val\">：从文件扫描到图谱生成无需人工介入</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、71.5倍Token消耗节省的技术实现</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、第一阶段：本地AST确定性解析</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">tree-sitter解析</span><span class=\"point-val\">：对代码文件做本地AST提取</span></div>\n<div class=\"point\"><span class=\"point-kw\">零LLM调用</span><span class=\"point-val\">：第一阶段不调用LLM，不产生任何Token消耗</span></div>\n<div class=\"point\"><span class=\"point-kw\">结构信息提取</span><span class=\"point-val\">：直接获取代码结构信息，无需向量嵌入</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、第二阶段：并行LLM子代理语义提取</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">增量处理</span><span class=\"point-val\">：搭配SHA256缓存机制，仅处理变更文件</span></div>\n<div class=\"point\"><span class=\"point-kw\">避免重复</span><span class=\"point-val\">：从根本上避免重复计算与无效开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">多文件支持</span><span class=\"point-val\">：处理PDF、Markdown、图片等非代码内容</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、全模态自动图谱化的万物皆可图谱化能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、统一的多模态处理管线</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">代码解析</span><span class=\"point-val\">：通过tree-sitter做本地AST解析提取结构信息</span></div>\n<div class=\"point\"><span class=\"point-kw\">文档拆分</span><span class=\"point-val\">：PDF、Markdown自动拆分文本与语义单元</span></div>\n<div class=\"point\"><span class=\"point-kw\">视觉识别</span><span class=\"point-val\">：截图、流程图、白板照片调用Claude Vision完成概念提取</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、无需向量数据库的聚类方案</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">图拓扑聚类</span><span class=\"point-val\">：基于图拓扑完成聚类，依靠Leiden社区发现算法</span></div>\n<div class=\"point\"><span class=\"point-kw\">边密度划分</span><span class=\"point-val\">：按边密度划分社区，无需依赖embeddings</span></div>\n<div class=\"point\"><span class=\"point-kw\">省去部署</span><span class=\"point-val\">：自然省去向量数据库的部署与维护成本</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、实时增量更新的持续生长能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、文件监听与自动更新</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">—watch模式</span><span class=\"point-val\">：代码文件改动后立即触发AST重新解析</span></div>\n<div class=\"point\"><span class=\"point-kw\">增量提醒</span><span class=\"point-val\">：文档、图片变更主动提醒用户执行增量更新</span></div>\n<div class=\"point\"><span class=\"point-kw\">Git钩子</span><span class=\"point-val\">：代码commit提交、分支切换后自动重建图谱</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、持久化的增量更新命令</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">—update命令</span><span class=\"point-val\">：新资料加入时无需重建整个图谱</span></div>\n<div class=\"point\"><span class=\"point-kw\">节点关联</span><span class=\"point-val\">：只更新相关节点和关联</span></div>\n<div class=\"point\"><span class=\"point-kw\">持续生长</span><span class=\"point-val\">：让知识库真正实现随资料新增持续生长</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、全平台适配与快速部署</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、多平台无缝接入</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Claude Code</span><span class=\"point-val\">：支持Claude Code平台</span></div>\n<div class=\"point\"><span class=\"point-kw\">Codex</span><span class=\"point-val\">：需在config.toml打开multi_agent = true启用并行模式</span></div>\n<div class=\"point\"><span class=\"point-kw\">OpenClaw</span><span class=\"point-val\">：支持但仅支持顺序提取，速度效率受限</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、一行命令完成部署</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">pip安装</span><span class=\"point-val\">：`pip install graphifyy && graphify install`</span></div>\n<div class=\"point\"><span class=\"point-kw\">Python环境</span><span class=\"point-val\">：仅需Python 3.10及以上</span></div>\n<div class=\"point\"><span class=\"point-kw\">平台选项</span><span class=\"point-val\">：龙虾平台支持`graphify install —platform claw`</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-18", "category": "【AI技术与应用】"}]}, "2026-04-06": {"categories": [{"category": "【AI技术与应用】", "articles": [{"date": "2026-04-06", "title": "【OpenAI又曝出内讧了IPO前夜高层大换血】", "summary": "OpenAI冲刺IPO关键期遭遇高层动荡，CEO与CFO战略分歧加剧，上市前景引发外界质疑。", "source": "量子位 4月6日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247880964&idx=1&sn=ed05f4db2d8458c0b47209102222ace7\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、IPO冲刺期核心高管集中动荡</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、COO Brad Lightcap被“明升暗贬”</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Lightcap转岗</span><span class=\"point-val\">：原COO转任“特别项目”负责人，直接向CEO汇报，被外界解读为失去“大管家”身份</span></div>\n<div class=\"point\"><span class=\"point-kw\">Dresser接任</span><span class=\"point-val\">：Denise Dresser上任不足4个月即接棒COO，其Slack CEO背景显示OpenAI商业化战略转向</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、两位高管因健康原因离开岗位</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Simo休假</span><span class=\"point-val\">：首席应用官Fidji Simo因健康问题休假，她是Meta出身、被重金挖来的人才</span></div>\n<div class=\"point\"><span class=\"point-kw\">Rouch离职</span><span class=\"point-val\">：首席营销官Kate Rouch因癌症治疗离职，健康理由过于巧合引发外界猜测</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、CEO与CFO在IPO时间表上存在重大分歧</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、奥特曼求“快”vs CFO求“稳”</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">激进目标</span><span class=\"point-val\">：奥特曼希望抢在Anthropic之前于今年Q4完成IPO，并承诺5年投入6000亿美元</span></div>\n<div class=\"point\"><span class=\"point-kw\">谨慎态度</span><span class=\"point-val\">：CFO Sarah Friar认为内部准备工作量巨大，今年IPO目标过于激进</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、战略分歧已影响工作关系</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">汇报线调整</span><span class=\"point-val\">：自去年8月起，CFO不再直接向CEO汇报，而是向应用业务负责人汇报</span></div>\n<div class=\"point\"><span class=\"point-kw\">决策排除</span><span class=\"point-val\">：奥特曼近期与投资机构讨论服务器开支时，未让CFO参加，引发内部关注</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、OpenAI财务压力与市场竞争双重困境</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、巨额支出承诺与收入增长不匹配</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">服务器承诺</span><span class=\"point-val\">：OpenAI已签署总额约6650亿美元的服务器租赁协议，有效期至2030年</span></div>\n<div class=\"point\"><span class=\"point-kw\">消耗预警</span><span class=\"point-val\">：今年2月公司私下警告投资者，到2030年现金消耗量将比此前预测高两倍以上</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、竞争加剧导致商业化承压</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">毛利率下滑</span><span class=\"point-val\">：因面对Anthropic、谷歌Gemini竞争，OpenAI收入毛利率去年已不及预期</span></div>\n<div class=\"point\"><span class=\"point-kw\">对手嘲讽</span><span class=\"point-val\">：Anthropic CEO暗讽若对收入增长判断失误，提前锁定大量数据中心投资将是巨大风险</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-10", "category": "【AI技术与应用】"}, {"date": "2026-04-06", "title": "【让离线强化学习从局部描摹变全局布局丨ICLR'26】", "summary": "MAGE算法通过多尺度\"由粗到细\"的自回归生成策略，解决离线强化学习中局部合理但全局偏航的难题，实现长序列任务的高效规划。", "source": "量子位 4月6日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247880964&idx=2&sn=66563b6c5c6fcf70a9432eb599439b9a\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、问题背景：现有离线强化学习方法在长程规划中陷入「局部合理、全局偏航」困境</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、现有生成式方法的全局规划缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">单向自回归限制</span><span class=\"point-val\">：Decision Transformer受限于单向自回归的全局上下文缺失，在长程规划中迷失方向，无法抵达终点</span></div>\n<div class=\"point\"><span class=\"point-kw\">扩散模型局部偏差</span><span class=\"point-val\">：Decision Diffuser生成的轨迹仅能保证局部合理，智能体虽到达终点但遗漏关键金币，全局连贯性不足</span></div>\n<div class=\"point\"><span class=\"point-kw\">分层结构僵硬</span><span class=\"point-val\">：Hierarchical Diffuser固定双层结构导致高低层策略缺乏有效协同，出现物理违规的\"穿墙\"现象</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、迷宫吃金币实验验证缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">随机起点全局规划</span><span class=\"point-val\">：智能体需从随机起点出发，先吃银币再吃金币最后抵达终点，考验长程空间理解能力</span></div>\n<div class=\"point\"><span class=\"point-kw\">现有算法全面失败</span><span class=\"point-val\">：三个对比算法在需要全局规划的场景中均暴露出不同类型的缺陷</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、MAGE核心思路：「自顶向下、由粗到细」的生成策略</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、多尺度轨迹自编码器（MTAE）</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">多尺度离散Token</span><span class=\"point-val\">：将长序列轨迹转化为从粗到细的多尺度离散Token，粗尺度Token掌控全局长程结构，细尺度Token建模短期动态细节</span></div>\n<div class=\"point\"><span class=\"point-kw\">类比人类绘画</span><span class=\"point-val\">：如同画素描先画整体轮廓再细化五官，符合人类直觉的自顶向下规划方式</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、多尺度条件引导自回归生成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">目标回报约束</span><span class=\"point-val\">：每层生成均以\"目标回报\"和\"初始状态\"为条件进行约束</span></div>\n<div class=\"point\"><span class=\"point-kw\">序列化多尺度Token生成</span><span class=\"point-val\">：使用Transformer序列化生成多尺度Token，确保每步都朝向最终目标前进</span></div>\n<div class=\"point\"><span class=\"point-kw\">精确初始状态对齐</span><span class=\"point-val\">：集成轻量级适配器模块并引入条件引导损失函数Lcond，强制解码初始状态与真实环境精确对齐</span></div>\n<div class=\"point\"><span class=\"point-kw nt\"><span class=\"point-kw\">毫秒级推理</span><span class=\"point-val\">：每步推理时间保持在27毫秒，满足20 Hz真实机器人实时运行门槛</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-11", "category": "【AI技术与应用】"}]}};
let currentTab = "";
let SIMULATED_DATE = "";

// Bug 2 fix: 动态生成 Tabs
// 计算相对日期
function getRelativeDate(days) {
    const d = new Date();
    d.setDate(d.getDate() - days);
    return d.toISOString().split("T")[0];
}

function buildTabs() {
    const dates = Object.keys(DATE_GROUPS).sort(); // 已经是倒序
    const tabsContainer = document.getElementById("dynamicTabs");
    let html = "";
    
    // 计算固定偏移日期（从今天算起）
    const today = SIMULATED_DATE ? new Date(SIMULATED_DATE + "T00:00:00") : new Date();
    today.setHours(0,0,0,0);
    const toDateStr = (d) => {
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    };
    
    const yesterdayDate = new Date(today);
    yesterdayDate.setDate(yesterdayDate.getDate() - 1);
    const yesterdayStr = toDateStr(yesterdayDate);
    
    const dayBeforeYesterdayDate = new Date(today);
    dayBeforeYesterdayDate.setDate(dayBeforeYesterdayDate.getDate() - 2);
    const dayBeforeYesterdayStr = toDateStr(dayBeforeYesterdayDate);
    
    // 昨天（-1天）- 始终显示，即使没有文章
    html += `<div class="tab active" data-tab="${yesterdayStr}">昨天</div>`;
    
    // 前天（-2天）- 始终显示，即使没有文章
    html += `<div class="tab" data-tab="${dayBeforeYesterdayStr}">前天</div>`;
    
    // P7D（-3到-7天）
    html += `<div class="tab" data-tab="p7d">P7D</div>`;
    
    tabsContainer.innerHTML = html;
    
    // 绑定 tab 点击事件
    tabsContainer.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
            tabsContainer.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            currentTab = tab.dataset.tab;
            renderCurrentTab();
        });
    });
    
    // 初始化 currentTab 为默认激活的昨天 tab
    currentTab = yesterdayStr;
}

function renderCurrentTab() {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    if (currentTab === "p7d") {
        // P7D 使用 section-today
        const section = document.getElementById("section-today");
        if (!section) return;
        section.classList.add("active");
        renderDateGroups("p7d");
    } else {
        // 日期 tab 使用 section-today
        const section = document.getElementById("section-today");
        if (!section) return;
        section.classList.add("active");
        renderDateGroups(currentTab);
    }
}

function getDateRange(tab) {
    const today = SIMULATED_DATE ? new Date(SIMULATED_DATE + "T00:00:00") : new Date();
    today.setHours(0,0,0,0);
    const toDateStr = (d) => {
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    };
    let start = today, end = today;
    if (tab === "p7d") {
        // P7D: -3到-7天
        end = new Date(today);
        end.setDate(end.getDate() - 3);
        start = new Date(today);
        start.setDate(start.getDate() - 7);
    } else {
        // 单日期 tab：只显示该日期
        start = new Date(tab);
        end = new Date(tab);
    }
    return {start: toDateStr(start), end: toDateStr(end)};
}

function renderDateGroups(tab) {
    const range = getDateRange(tab);
    const container = document.getElementById("section-today");
    let html = "";
    let hasData = false;
    
    // 计算昨天和前天的日期字符串（用于判断单日期 tab）
    const today = SIMULATED_DATE ? new Date(SIMULATED_DATE + "T00:00:00") : new Date();
    today.setHours(0,0,0,0);
    const toDateStr = (d) => {
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    };
    const yesterdayStr = toDateStr(new Date(today.getTime() - 86400000));
    const dayBeforeYesterdayStr = toDateStr(new Date(today.getTime() - 2 * 86400000));
    
    // 如果是单日期 tab（昨天/前天），直接显示该日期（即使没有数据）
    if (tab === yesterdayStr || tab === dayBeforeYesterdayStr) {
        const dateLabel = tab.replace(/^(\d{4})-(\d{2})-(\d{2})$/, (m,y,mo,d) => `${parseInt(mo)}月${parseInt(d)}日`);
        const groups = DATE_GROUPS[tab];
        const articleCount = groups ? (groups.categories?.reduce((sum, c) => sum + (c.articles?.length || 0), 0) || 0) : 0;
        html += `<div class="date-group"><div class="date-header"><span class="date-label">📅 ${dateLabel}</span><span class="date-count">${articleCount}篇</span></div>`;
        if (groups) {
            for (const cat of groups.categories || []) {
                if (!cat.articles || cat.articles.length === 0) continue;
                html += `<div class="category"><div class="category-title">${cat.category}</div>`;
                for (const art of cat.articles) {
                    html += buildArticleCard(art);
                }
                html += `</div>`;
            }
            for (const imp of groups.importance_levels || []) {
                html += `<div class="importance-section"><div class="importance-title">${imp.label}</div>`;
                for (const art of imp.articles) {
                    html += buildArticleCard(art);
                }
                html += `</div>`;
            }
        }
        html += `</div>`;
        hasData = articleCount > 0;
    } else {
        // 多日期 tab（P7D/P14D）
        for (const [date, groups] of Object.entries(DATE_GROUPS)) {
            if (date < range.start || date > range.end) continue;
            hasData = true;
            const dateLabel = date.replace(/^(\d{4})-(\d{2})-(\d{2})$/, (m,y,mo,d) => `${parseInt(mo)}月${parseInt(d)}日`);
            html += `<div class="date-group"><div class="date-header"><span class="date-label">📅 ${dateLabel}</span><span class="date-count">${groups.articles?.length || 0}篇</span></div>`;
            for (const cat of groups.categories || []) {
                if (!cat.articles || cat.articles.length === 0) continue;
                html += `<div class="category"><div class="category-title">${cat.category}</div>`;
                for (const art of cat.articles) {
                    html += buildArticleCard(art);
                }
                html += `</div>`;
            }
            for (const imp of groups.importance_levels || []) {
                html += `<div class="importance-section"><div class="importance-title">${imp.label}</div>`;
                for (const art of imp.articles) {
                    html += buildArticleCard(art);
                }
                html += `</div>`;
            }
            html += `</div>`;
        }
    }
    
    container.innerHTML = html || "<p style='color:var(--c6);text-align:center;padding:2rem;'>暂无数据</p>";
    attachCardListeners(container);
}

function buildArticleCard(art) {
    return `<div class="article-card" data-id="${art.id}"><div class="card-summary"><span class="summary-text">${art.emoji || "📰"} ${art.summary}</span>${art.importance_level ? `<span class="importance-tag">⭐ 第${art.importance_level}级</span>` : ""}<span class="arrow">▼</span></div><div class="card-detail">${art.body || ""}${art.source ? `<div class="card-source">来源：${art.source}</div>` : ""}</div></div>`;
}

// Bug 5 fix: 点击 summary 展开所有 level1（显示1、2、3）；点击 level2 标题展开详情
function attachCardListeners(container) {
    container.querySelectorAll(".card-summary").forEach(el => {
        el.addEventListener("click", () => {
            const card = el.closest(".article-card");
            card.classList.toggle("open");
            // 展开时只显示 level1（包含1、2、3标题），不显示 level2 详情
            if (card.classList.contains("open")) {
                card.querySelectorAll(".level1").forEach(l1 => l1.classList.add("open"));
            }
        });
    });
    // 点击 level2 标题展开详情
    container.querySelectorAll(".level2-title").forEach(el => {
        el.addEventListener("click", (e) => {
            e.stopPropagation();
            el.parentElement.classList.toggle("open");
        });
    });
}

// 初始化
buildTabs();
if (currentTab === "") currentTab = Object.keys(DATE_GROUPS).sort()[0];
renderCurrentTab();
</script>
