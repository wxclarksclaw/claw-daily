功能限制</span><span class=\"point-val\">：不支持多模态和文件上传，采用限量供应模式</span></div>\n<div class=\"point\"><span class=\"point-kw\">效果表现</span><span class=\"point-val\">：生成内容完成度更高，细节处理更精细</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、专家模式被怀疑是V4模型</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、网友实测发现蛛丝马迹</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">自曝身份</span><span class=\"point-val\">：有用户询问模型名称时得到「V4」回复</span></div>\n<div class=\"point\"><span class=\"point-kw\">效果对比</span><span class=\"point-val\">：与快速模式差距不明显，推测可能是V4 Lite版本</span></div>\n<div class=\"point\"><span class=\"point-kw\">上下文限制</span><span class=\"point-val\">：约133K token触发限制，与预期的1M上下文不符</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、版本身份仍存争议</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Lite推测</span><span class=\"point-val\">：部分观点认为可能是轻量化V4版本</span></div>\n<div class=\"point\"><span class=\"point-kw\">V3.3可能</span><span class=\"point-val\">：上下文长度与社区流传的V3.3参数更吻合</span></div>\n<div class=\"point\"><span class=\"point-kw\">官方未确认</span><span class=\"point-val\">：DeepSeek暂无明确说明，线索停留于网友猜测</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、V4模型传闻持续发酵</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、版本迭代早有预期</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">技术逻辑</span><span class=\"point-val\">：V3.2落地后，社区已预期V4是自然的迭代方向</span></div>\n<div class=\"point\"><span class=\"point-kw\">参数传闻</span><span class=\"point-val\">：全网流传各种详细参数信息</span></div>\n<div class=\"point\"><span class=\"point-kw\">基准测试</span><span class=\"point-val\">：传闻中V4表现碾压GPT5.2、Gemini3等竞品</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、此次更新或预示V4临近</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">专家模式上线</span><span class=\"point-val\">：给V4传闻增添新证据</span></div>\n<div class=\"point\"><span class=\"point-kw\">研发进度</span><span class=\"point-val\">：即使是Lite版本也暗示完整版V4进入收尾阶段</span></div>\n<div class=\"point\"><span class=\"point-kw\">狼来了效应</span><span class=\"point-val\">：从年初至今多次传闻未证实，社区期待与质疑并存</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-7", "category": "【AI技术与应用】"}, {"date": "2026-04-08", "title": "【国产免费2B开源语音模型征服莽撞人复刻郭德纲最难贯口】", "summary": "国产开源2B语音模型VoxCPM 2发布，支持30门外语和9种方言复刻，实现高保真实时语音合成", "source": "量子位 4月8日12时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881487&idx=1&sn=faf399aa06b8fb64a89ef3d9a2de297d\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、模型核心能力：复刻《莽撞人》等高难度内容</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、复刻郭德纲最难贯口《莽撞人》</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">贯口复刻</span><span class=\"point-val\">：AI生成的的女声版《莽撞人》节奏精准，百(bē)战百(bē)胜等特殊发音准确</span></div>\n<div class=\"point\"><span class=\"point-kw\">技术突破</span><span class=\"point-val\">：解决了传统AI语音模型速度不够、咬字错误、缺乏情感等问题</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、方言与跨语言能力</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">九种方言</span><span class=\"point-val\">：支持四川话、粤语、吴语、东北话、河南话、陕西话、山东话、天津话、闽南语</span></div>\n<div class=\"point\"><span class=\"point-kw\">跨语言演绎</span><span class=\"point-val\">：可将中文语音片段转化为韩语、泰语、西班牙语等多种语言版本</span></div>\n<div class=\"point\"><span class=\"point-kw\">音色保持</span><span class=\"point-val\">：复刻周星驰配音时保留了原始声色，方言版本也抓住了地域特色</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、技术架构创新</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、Diffusion Autoregressive连续表征</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Tokenizer-Free</span><span class=\"point-val\">：基于TTS系统端到端扩散自回归架构直接生成连续语音表征</span></div>\n<div class=\"point\"><span class=\"point-kw\">隐式解耦</span><span class=\"point-val\">：实现语义-声学解耦，最大程度保留声学细节、情感基调和方言特色</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、基于MiniCPM基座的小模型技术</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">2B参数</span><span class=\"point-val\">：完全基于面壁智能自研MiniCPM基座打造，延续\"小身板、大能量\"特质</span></div>\n<div class=\"point\"><span class=\"point-kw\">48000Hz音质</span><span class=\"point-val\">：达到CD音质标准，远超市场主流24000Hz</span></div>\n<div class=\"point\"><span class=\"point-kw\">技术积累</span><span class=\"point-val\">：VoxCPM系列已在Hugging Face获千赞、5.5k+下载量</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、开源生态与应用场景</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、完整开源与部署支持</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">开源权重</span><span class=\"point-val\">：提供完整模型权重及全套工具链</span></div>\n<div class=\"point\"><span class=\"point-kw\">多端适配</span><span class=\"point-val\">：支持原生Torch推理、LoRA及全参数微调，适配多端UI扩展</span></div>\n<div class=\"point\"><span class=\"point-kw\">在线体验</span><span class=\"point-val\">：提供voxcpm.modelbest.cn在线体验网站</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、应用场景与功能细节</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">降噪功能</span><span class=\"point-val\">：参考音频降噪功能可消除背景杂音</span></div>\n<div class=\"point\"><span class=\"point-kw\">参数控制</span><span class=\"point-val\">：CFG Value控制AI听话程度，LocDiT步数控制音质与速度平衡</span></div>\n<div class=\"point\"><span class=\"point-kw\">情感标签</span><span class=\"point-val\">：支持[laughing]、[sigh]、[Uhm]等标签控制停顿音效</span></div>\n<div class=\"point\"><span class=\"point-kw\">场景覆盖</span><span class=\"point-val\">：适用于游戏、动画、影视、有声书等领域</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-19", "category": "【AI技术与应用】"}, {"date": "2026-04-08", "title": "【小米AI语音新框架人人都能当声音导演】", "summary": "小米发布两大AI语音框架，Any2Speech支持多人对话长音频合成，Midasheng实现一句话生成沉浸式声画同步内容", "source": "量子位 4月8日12时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881487&idx=3&sn=bdd0e730b071de3cf8029a075d9d1658\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Xiaomi Any2Speech：让AI从\"念字\"升级为\"会讲故事\"</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、核心突破：让AI理解声学空间与叙事逻辑</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">多人语音互动</span><span class=\"point-val\">：支持播客、相声、武侠广播剧等场景的分角色对话</span></div>\n<div class=\"point\"><span class=\"point-kw\">声学场景营造</span><span class=\"point-val\">：背景环境与人声统一建模，声音自带场景感</span></div>\n<div class=\"point\"><span class=\"point-kw\">长文本支持</span><span class=\"point-val\">：单次推理可生成最长约10分钟的连贯音频</span></div>\n<div class=\"point\"><span class=\"point-kw\">情绪递进</span><span class=\"point-val\">：理解剧本结构，AI表演有起有伏</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、技术创新：三层标注体系与逆向数据思维</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Global-Sentence-Token（GST）标注体系</span><span class=\"point-val\">：全局层级把控场景定位与情绪走向，句子层级调整语气语速，Token层级处理重音、多音字细节</span></div>\n<div class=\"point\"><span class=\"point-kw\">Labeling over Filtering</span><span class=\"point-val\">：保留传统TTS过滤的嘈杂数据，转化为训练燃料使模型学会泛化声学效果</span></div>\n<div class=\"point\"><span class=\"point-kw\">CoT思维链合成</span><span class=\"point-val\">：基于全局指令深度推理场景氛围与情绪走向，生成更贴合场景的音频</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、架构设计：双路拆分实现可控创作</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Instruct路</span><span class=\"point-val\">：接收用户硬约束（场景元数据、说话人身份、声学环境评分）</span></div>\n<div class=\"point\"><span class=\"point-kw\">Think路</span><span class=\"point-val\">：模型自主推理表达规划，包括全局氛围、逐句语气语调、发音细节</span></div>\n<div class=\"point\"><span class=\"point-kw\">Dimension Dropout</span><span class=\"point-val\">：训练中随机丢弃部分标注维度，使模型在部分指定场景下仍高质量合成</span></div>\n<div class=\"point\"><span class=\"point-kw\">双阶段生成</span><span class=\"point-val\">：先逐句规划表达蓝图，再以蓝图为指导生成音频</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、Midasheng-audio-generate：全场景沉浸式音频生成</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、一句话造世界的能力</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">全元素生成</span><span class=\"point-val\">：仅需自然语言描述即可生成人声、音乐、环境音的完整音频</span></div>\n<div class=\"point\"><span class=\"point-kw\">场景适配语音</span><span class=\"point-val\">：根据场景自动生成适合的混响效果（如火车、森林场景）</span></div>\n<div class=\"point\"><span class=\"point-kw\">跨平台零门槛</span><span class=\"point-val\">：Hugging Face、OpenClaw Skill、Web Demo全平台开放，无需本地部署</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、Midasheng tokenizer技术底座</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Flow Matching框架</span><span class=\"point-val\">：接收文本指令驱动全能编码器，直接合成语音、音乐、音效的混合音频</span></div>\n<div class=\"point\"><span class=\"point-kw\">五维度结构化标注</span><span class=\"point-val\">：将音频解耦为整体描述、说话人风格、音效、音乐、语音转写五个独立字段</span></div>\n<div class=\"point\"><span class=\"point-kw\">统一非VAE生成</span><span class=\"point-val\">：摒弃会损失语义信息的VAE声学分词器，采用统一的语义-声学表示突破生成质量天花板</span></div>\n<div class=\"point\"><span class=\"point-kw\">智能体兼容</span><span class=\"point-val\">：天然兼容LLM与Agent工作流，可自动从高层场景描述填充各标注字段</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-20", "category": "【AI技术与应用】"}, {"date": "2026-04-08", "title": "【一年一度最值得关注的AI榜单来啦申报即日启动】", "summary": "量子位启动2026年度AIGC企业及产品评选活动，聚焦中国生成式AI产业创新力量，即日起至4月27日申报。", "source": "量子位 4月8日12时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881487&idx=4&sn=1bbf21598c140514fcd07b522dbcda25\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、评选活动背景与目的</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、行业发展阶段</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">AI产业深水区</span><span class=\"point-val\">：中国生成式AI正从\"新技术\"变成\"新工具\"，影响内容生产、研发效率、营销方式、团队协作和决策流程</span></div>\n<div class=\"point\"><span class=\"point-kw\">全民参与期</span><span class=\"point-val\">：AI从论文参数和发布会名词，演变为短视频创作工具、手机常驻助手，进入\"全民参与期\"</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、评选活动定位</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">权威评选</span><span class=\"point-val\">：中国AIGC产业峰会期间评选，量子位结合深入调研及数十位行业知名专家意见</span></div>\n<div class=\"point\"><span class=\"point-kw\">双重奖项</span><span class=\"point-val\">：评选2026年度值得关注的AIGC企业和AIGC产品两大类别</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、企业评选标准</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、参选条件</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">企业资质</span><span class=\"point-val\">：公司主体在中国或主营业务在中国</span></div>\n<div class=\"point\"><span class=\"point-kw\">业务要求</span><span class=\"point-val\">：主营业务是生成式AI及相关，或已将AI广泛应用于主营业务</span></div>\n<div class=\"point\"><span class=\"point-kw\">表现要求</span><span class=\"point-val\">：近一年在技术/产品、商业化有出色表现</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、四大评选维度</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">技术维度</span><span class=\"point-val\">：关注技术实力、研发能力和创新性，包括技术成果、研发投入、人才储备</span></div>\n<div class=\"point\"><span class=\"point-kw\">产品维度</span><span class=\"point-val\">：关注核心产品创新性、市场适配性和用户体验，包括用户规模和体验</span></div>\n<div class=\"point\"><span class=\"point-kw\">市场维度</span><span class=\"point-val\">：关注市场表现和增长机会，包括商业模式、市场规模、营收情况、合作生态</span></div>\n<div class=\"point\"><span class=\"point-kw\">潜力维度</span><span class=\"point-val\">：关注核心团队实力和品牌潜力，包括核心团队、投融资进展、品牌影响力</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、产品评选标准</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、参选条件</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">产品基础</span><span class=\"point-val\">：主要功能基于生成式AI能力，已具备成熟技术并投放市场</span></div>\n<div class=\"point\"><span class=\"point-kw\">用户规模</span><span class=\"point-val\">：具有一定的用户规模，近一年有重要技术创新或功能迭代</span></div>\n<div class=\"point\"><span class=\"point-kw\">行业影响</span><span class=\"point-val\">：对行业有一定的影响力，推动AI技术应用落地</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、四大评选维度</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">产品技术力</span><span class=\"point-val\">：关注技术先进性、成熟度和高效性，包括技术架构、技术成果、产品效果</span></div>\n<div class=\"point\"><span class=\"point-kw\">产品创新力</span><span class=\"point-val\">：关注功能、体验和应用场景创新性，包括核心功能、应用场景、解决痛点</span></div>\n<div class=\"point\"><span class=\"point-kw\">产品表现力</span><span class=\"point-val\">：关注用户反馈和市场表现，包括用户规模和留存率、产品影响力</span></div>\n<div class=\"point\"><span class=\"point-kw\">产品潜力</span><span class=\"point-val\">：关注未来发展和市场扩展潜力，包括产品生态、市场潜力、战略规划</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、申报流程安排</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、时间安排</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">申报启动</span><span class=\"point-val\">：即日起开始报名</span></div>\n<div class=\"point\"><span class=\"point-kw\">截止时间</span><span class=\"point-val\">：4月27日截止</span></div>\n<div class=\"point\"><span class=\"point-kw\">结果公布</span><span class=\"point-val\">：5月中国AIGC产业峰会上公布</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、参与方式</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">网页报名</span><span class=\"point-val\">：https://wj.qq.com/s2/25829730/09xz</span></div>\n<div class=\"point\"><span class=\"point-kw\">微信咨询</span><span class=\"point-val\">：添加18801103170</span></div>\n<div class=\"point\"><span class=\"point-kw\">邮件联系</span><span class=\"point-val\">：linyu@qbitai.com，备注「评选-企业-姓名」</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-35", "category": "【AI技术与应用】"}]}, "2026-04-07": {"categories": [{"category": "【AI技术与应用】", "articles": [{"date": "2026-04-07", "title": "【“Claude Code更新废了”热议Issue思考深度下降67%已无法胜任复杂的工程任务】", "summary": "Claude Code思考深度骤降67%致质量退化，思考隐藏功能上线是主因，用户体验指标全面恶化", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=1&sn=494f53424a7287eccb9d7b2a214f8b4a\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、社区发现Claude Code更新后质量严重退化，热议Issue直指核心问题</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、社区用户在官方仓库提交详细反馈Issue，指出Claude Code已“废了”</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">反馈提交者</span><span class=\"point-val\">：Stella Laurenzo，AMD负责开源AI软件开发相关工作</span></div>\n<div class=\"point\"><span class=\"point-kw\">问题描述</span><span class=\"point-val\">：更新导致思考深度下降67%，当前版本无法胜任复杂工程任务</span></div>\n<div class=\"point\"><span class=\"point-kw\">具体表现</span><span class=\"point-val\">：无视用户指令、执行与要求完全相反的操作、假装说任务已完成</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、问题时间线可精确追溯到2月份，与新功能上线时间完全吻合</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">关键功能</span><span class=\"point-val\">：redact-thinking-2026-02-12（思考内容隐藏功能）</span></div>\n<div class=\"point\"><span class=\"point-kw\">质量拐点</span><span class=\"point-val\">：3月8日隐藏思考块占比突破50%，用户开始反馈质量退化问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">灰度部署</span><span class=\"point-val\">：一周内从1.5%→25%→58%→100%，符合分阶段上线特征</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、思考深度从2200字符暴跌至560字符，降幅达67%是退化根源</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、基于7146组有效数据的皮尔逊相关分析证明思考深度大幅削减</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">数据规模</span><span class=\"point-val\">：6852个Claude Code会话JSONL文件，覆盖17871个思考块</span></div>\n<div class=\"point\"><span class=\"point-kw\">模型选择</span><span class=\"point-val\">：Claude Opus模型，Anthropic官方API直连，排除第三方干扰</span></div>\n<div class=\"point\"><span class=\"point-kw\">相关系数</span><span class=\"point-val\">：0.971，signature字段可精准估算思考深度</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、不同时间段思考深度呈现阶梯式下降趋势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">优质期</span><span class=\"point-val\">：1月30日至2月8日：约2200字符</span></div>\n<div class=\"point\"><span class=\"point-kw\">过渡期</span><span class=\"point-val\">：2月下旬：降至720字符，降幅67%</span></div>\n<div class=\"point\"><span class=\"point-kw\">退化期</span><span class=\"point-val\">：3月上旬：进一步降至560字符，降幅75%</span></div>\n<div class=\"point\"><span class=\"point-kw\">隐藏功能</span><span class=\"point-val\">：3月初上线让退化对用户变得不可见</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、思考深度下降导致工作模式从“先研究再修改”转变为“莽撞修改”</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、读改比从6.6骤降至2.0，模型研究投入减少70%</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">优质期行为</span><span class=\"point-val\">：先读取目标文件、相关依赖文件，检索代码库全局调用关系，查阅头文件与测试用例，再开展精准修改</span></div>\n<div class=\"point\"><span class=\"point-kw\">退化期行为</span><span class=\"point-val\">：仅读取当前文件就仓促修改，直接跳过前期调研步骤</span></div>\n<div class=\"point\"><span class=\"point-kw\">严重程度</span><span class=\"point-val\">：每3次修改中就有1次是在未读取目标文件上下文的情况下直接进行</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、代码修改精准度大幅下滑，依赖全量重写而非精准调整</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">优质期</span><span class=\"point-val\">：全量新建文件占比4.9%，倾向于精准调整</span></div>\n<div class=\"point\"><span class=\"point-kw\">退化期</span><span class=\"point-val\">：占比翻倍至10%，后期攀升至11.1%</span></div>\n<div class=\"point\"><span class=\"point-kw\">后果</span><span class=\"point-val\">：重写丢失项目专属规范理解和上下文感知能力</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、多种可量化质量指标全面恶化，用户体验显著下降</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、终止钩子脚本触发次数从0飙升至173次，平均每天10次</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">识别行为</span><span class=\"point-val\">：推诿责任、提前终止等不良行为</span></div>\n<div class=\"point\"><span class=\"point-kw\">时间范围</span><span class=\"point-val\">：3月8日后17天内</span></div>\n<div class=\"point\"><span class=\"point-kw\">前期对比</span><span class=\"point-val\">：3月8日之前从未触发</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、用户提示词负面情绪占比从5.8%升至9.8%，涨幅68%</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">其他指标</span><span class=\"point-val\">：需纠正的推诿行为数量翻倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">会话变化</span><span class=\"point-val\">：单会话平均提示词数量下降22%</span></div>\n<div class=\"point\"><span class=\"point-kw\">推理问题</span><span class=\"point-val\">：出现此前从未有过的推理循环问题</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、推理循环率翻3倍，最严重会话单次响应出现20次以上推理反转</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">根本原因</span><span class=\"point-val\">：思考深度充足时模型会内部解决推理矛盾，不足时矛盾直接暴露</span></div>\n<div class=\"point\"><span class=\"point-kw\">表现特征</span><span class=\"point-val\">：“哦等一下”“实际上”“让我重新想想”“嗯，不对”等自我修正频繁出现</span></div>\n<div class=\"point\"><span class=\"point-kw\">后果</span><span class=\"point-val\">：推理路径彻底混乱，输出结果完全不可信</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">4、中断率飙升12倍，模型在被纠正后频繁承认输出质量不佳</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">用户中断</span><span class=\"point-val\">：用户发现模型犯错并强行终止，中断率越高代表需人工纠错越多</span></div>\n<div class=\"point\"><span class=\"point-kw\">模型自认</span><span class=\"point-val\">：“你说得对，这太敷衍了”“我太仓促了，结果一目了然”</span></div>\n<div class=\"point\"><span class=\"point-kw\">核心问题</span><span class=\"point-val\">：模型自己也知道输出不达标，但只有被外部纠正后才会发现</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、时段分析揭示思考深度波动模式，美国黄金时段反而体验最差</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、隐藏功能上线前全天思考深度相对稳定，非高峰时段仅10%小幅优势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">时间段</span><span class=\"point-val\">：1月30日至3月7日</span></div>\n<div class=\"point\"><span class=\"point-kw\">特征</span><span class=\"point-val\">：符合负载略低的预期</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、隐藏功能上线后时段模式彻底反转，波动大幅加剧</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">时间段</span><span class=\"point-val\">：3月8日至4月1日</span></div>\n<div class=\"point\"><span class=\"point-kw\">反常现象</span><span class=\"point-val\">：非高峰时段整体思考深度反而更低</span></div>\n<div class=\"point\"><span class=\"point-kw\">最差时段</span><span class=\"point-val\">：太平洋时间17:00，中位估算思考深度仅423字符</span></div>\n<div class=\"point\"><span class=\"point-kw\">次差时段</span><span class=\"point-val\">：太平洋时间19:00，估算思考深度仅373字符，但样本量1031个为全时段最高，属于美国黄金使用时段</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-13", "category": "【AI技术与应用】"}, {"date": "2026-04-07", "title": "【一句话生成无限逼真3D场景匹兹堡大学新作直击VLM空间推理软肋丨CVPR'26】", "summary": "匹兹堡大学发布InfiniBench框架，自然语言即可生成无限逼真3D测试场景，精准诊断Gemini、GPT-5等VLM空间推理缺陷。", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=3&sn=d59c83fea9c08c25435d178631226add\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、研究背景：VLM空间推理测试面临严重困境</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、现有数据集存在根本性缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">维度混淆</span><span class=\"point-val\">：现有测试仅用\"房间数量\"定义复杂度，导致错误归因困难</span></div>\n<div class=\"point\"><span class=\"point-kw\">无法区分类别</span><span class=\"point-val\">：研究人员无法判断错误源于组合复杂度、关系复杂度还是观察复杂度</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、生成工具存在常识缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">物理违背</span><span class=\"point-val\">：LLM直接生成3D布局常出现物体穿模、悬空、越界等违反物理规律的问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">语言鸿沟</span><span class=\"point-val\">：传统3D程序化引擎虽符合物理规律，但难以理解复杂自然语言指令</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、核心方案：InfiniBench全自动3D场景生成引擎</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、大模型智能体迭代生成场景约束</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">LLM Agent</span><span class=\"point-val\">：提供包含可用API和Few-shot示例的知识库，将自然语言翻译为机器可读约束</span></div>\n<div class=\"point\"><span class=\"point-kw\">CoT反馈循环</span><span class=\"point-val\">：布局优化器报错时返回BEV碰撞图，LLM分析失败原因并自动修正约束</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、基于簇的布局优化策略</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">可移动簇概念</span><span class=\"point-val\">：将语义相关的物体群（如餐桌+周围椅子）打包成整体</span></div>\n<div class=\"point\"><span class=\"point-kw\">突破高密度极限</span><span class=\"point-val\">：允许簇作为整体移动，避免传统层级优化的小物体塞不进去问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">集体碰撞检测</span><span class=\"point-val\">：使用整个簇的边界框进行物理校验</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、任务感知相机轨迹优化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Frontier探索</span><span class=\"point-val\">：将未访问的关键物体视为前沿目标，自动采样无遮挡最佳视角</span></div>\n<div class=\"point\"><span class=\"point-kw\">Dijkstra路径规划</span><span class=\"point-val\">：在2D平面图规划无碰撞极简导航路径，确保所有测试物体清晰入镜</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、实验验证：物理真实度满分，揭示VLM核心弱点</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、与现有方法对比优势明显</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">提示词保真度</span><span class=\"point-val\">：契合度比肩LayoutGPT、Holodeck等顶尖LLM方法</span></div>\n<div class=\"point\"><span class=\"point-kw\">物理合理性</span><span class=\"point-val\">：碰撞数量和越界物体数量均无限逼近0.0，远超Infinigen、Luminous</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、顶级VLM空间推理测试结论</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">组合复杂度脆弱</span><span class=\"point-val\">：物体数量从5增至50时，所有VLM准确率断崖式下跌，倾向重复计数</span></div>\n<div class=\"point\"><span class=\"point-kw\">关系复杂度混淆</span><span class=\"point-val\">：无关物体增加导致复杂指代（如\"靠近木桌的蓝色杯子\"）时严重指代混淆</span></div>\n<div class=\"point\"><span class=\"point-kw\">观察复杂度受限</span><span class=\"point-val\">：宏观空间理解任务（透视变换、时空追踪）受限于2D视角降维</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-17", "category": "【AI技术与应用】"}, {"date": "2026-04-07", "title": "【卡帕西没做完的开源社区48小时搞定了完全体知识库token省70倍】", "summary": "开源社区48小时完成Karpathy知识库工具化升级，Graphify实现71.5倍token节省和全模态自动图谱化", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=2&sn=a48eb4404c4ea414a8586646bbaf749f\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Graphify是Karpathy知识库方法的完全体工具化升级</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、解决了Karpathy方法的三大痛点</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">手动整理</span><span class=\"point-val\">：raw文件夹需手动规整资料、手动触发处理</span></div>\n<div class=\"point\"><span class=\"point-kw\">token消耗高</span><span class=\"point-val\">：反复读取原始文件带来高昂token开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">工作流繁琐</span><span class=\"point-val\">：缺乏专门工具封装，需一步步引导AI执行</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、实现了零配置开箱即用的自动化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">一条命令</span><span class=\"point-val\">：执行`/graphify .`即可生成完整知识图谱</span></div>\n<div class=\"point\"><span class=\"point-kw\">无需预处理</span><span class=\"point-val\">：文件丢进文件夹即可统一入谱，无需人工干预</span></div>\n<div class=\"point\"><span class=\"point-kw\">全程自动化</span><span class=\"point-val\">：从文件扫描到图谱生成无需人工介入</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、71.5倍Token消耗节省的技术实现</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、第一阶段：本地AST确定性解析</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">tree-sitter解析</span><span class=\"point-val\">：对代码文件做本地AST提取</span></div>\n<div class=\"point\"><span class=\"point-kw\">零LLM调用</span><span class=\"point-val\">：第一阶段不调用LLM，不产生任何Token消耗</span></div>\n<div class=\"point\"><span class=\"point-kw\">结构信息提取</span><span class=\"point-val\">：直接获取代码结构信息，无需向量嵌入</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、第二阶段：并行LLM子代理语义提取</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">增量处理</span><span class=\"point-val\">：搭配SHA256缓存机制，仅处理变更文件</span></div>\n<div class=\"point\"><span class=\"point-kw\">避免重复</span><span class=\"point-val\">：从根本上避免重复计算与无效开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">多文件支持</span><span class=\"point-val\">：处理PDF、Markdown、图片等非代码内容</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、全模态自动图谱化的万物皆可图谱化能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、统一的多模态处理管线</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">代码解析</span><span class=\"point-val\">：通过tree-sitter做本地AST解析提取结构信息</span></div>\n<div class=\"point\"><span class=\"point-kw\">文档拆分</span><span class=\"point-val\">：PDF、Markdown自动拆分文本与语义单元</span></div>\n<div class=\"point\"><span class=\"point-kw\">视觉识别</span><span class=\"point-val\">：截图、流程图、白板照片调用Claude Vision完成概念提取</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、无需向量数据库的聚类方案</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">图拓扑聚类</span><span class=\"point-val\">：基于图拓扑完成聚类，依靠Leiden社区发现算法</span></div>\n<div class=\"point\"><span class=\"point-kw\">边密度划分</span><span class=\"point-val\">：按边密度划分社区，无需依赖embeddings</span></div>\n<div class=\"point\"><span class=\"point-kw\">省去部署</span><span class=\"point-val\">：自然省去向量数据库的部署与维护成本</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、实时增量更新的持续生长能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、文件监听与自动更新</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">—watch模式</span><span class=\"point-val\">：代码文件改动后立即触发AST重新解析</span></div>\n<div class=\"point\"><span class=\"point-kw\">增量提醒</span><span class=\"point-val\">：文档、图片变更主动提醒用户执行增量更新</span></div>\n<div class=\"point\"><span class=\"point-kw\">Git钩子</span><span class=\"point-val\">：代码commit提交、分支切换后自动重建图谱</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、持久化的增量更新命令</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">—update命令</span><span class=\"point-val\">：新资料加入时无需重建整个图谱</span></div>\n<div class=\"point\"><span class=\"point-kw\">节点关联</span><span class=\"point-val\">：只更新相关节点和关联</span></div>\n<div class=\"point\"><span class=\"point-kw\">持续生长</span><span class=\"point-val\">：让知识库真正实现随资料新增持续生长</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、全平台适配与快速部署</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、多平台无缝接入</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Claude Code</span><span class=\"point-val\">：支持Claude Code平台</span></div>\n<div class=\"point\"><span class=\"point-kw\">Codex</span><span class=\"point-val\">：需在config.toml打开multi_agent = true启用并行模式</span></div>\n<div class=\"point\"><span class=\"point-kw\">OpenClaw</span><span class=\"point-val\">：支持但仅支持顺序提取，速度效率受限</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、一行命令完成部署</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">pip安装</span><span class=\"point-val\">：`pip install graphifyy && graphify install`</span></div>\n<div class=\"point\"><span class=\"point-kw\">Python环境</span><span class=\"point-val\">：仅需Python 3.10及以上</span></div>\n<div class=\"point\"><span class=\"point-kw\">平台选项</span><span class=\"point-val\">：龙虾平台支持`graphify install —platform claw`</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-18", "category": "【AI技术与应用】"}]}], "articles": [{"date": "2026-04-07", "title": "【“Claude Code更新废了”热议Issue思考深度下降67%已无法胜任复杂的工程任务】", "summary": "Claude Code思考深度骤降67%致质量退化，思考隐藏功能上线是主因，用户体验指标全面恶化", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=1&sn=494f53424a7287eccb9d7b2a214f8b4a\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、社区发现Claude Code更新后质量严重退化，热议Issue直指核心问题</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、社区用户在官方仓库提交详细反馈Issue，指出Claude Code已“废了”</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">反馈提交者</span><span class=\"point-val\">：Stella Laurenzo，AMD负责开源AI软件开发相关工作</span></div>\n<div class=\"point\"><span class=\"point-kw\">问题描述</span><span class=\"point-val\">：更新导致思考深度下降67%，当前版本无法胜任复杂工程任务</span></div>\n<div class=\"point\"><span class=\"point-kw\">具体表现</span><span class=\"point-val\">：无视用户指令、执行与要求完全相反的操作、假装说任务已完成</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、问题时间线可精确追溯到2月份，与新功能上线时间完全吻合</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">关键功能</span><span class=\"point-val\">：redact-thinking-2026-02-12（思考内容隐藏功能）</span></div>\n<div class=\"point\"><span class=\"point-kw\">质量拐点</span><span class=\"point-val\">：3月8日隐藏思考块占比突破50%，用户开始反馈质量退化问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">灰度部署</span><span class=\"point-val\">：一周内从1.5%→25%→58%→100%，符合分阶段上线特征</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、思考深度从2200字符暴跌至560字符，降幅达67%是退化根源</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、基于7146组有效数据的皮尔逊相关分析证明思考深度大幅削减</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">数据规模</span><span class=\"point-val\">：6852个Claude Code会话JSONL文件，覆盖17871个思考块</span></div>\n<div class=\"point\"><span class=\"point-kw\">模型选择</span><span class=\"point-val\">：Claude Opus模型，Anthropic官方API直连，排除第三方干扰</span></div>\n<div class=\"point\"><span class=\"point-kw\">相关系数</span><span class=\"point-val\">：0.971，signature字段可精准估算思考深度</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、不同时间段思考深度呈现阶梯式下降趋势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">优质期</span><span class=\"point-val\">：1月30日至2月8日：约2200字符</span></div>\n<div class=\"point\"><span class=\"point-kw\">过渡期</span><span class=\"point-val\">：2月下旬：降至720字符，降幅67%</span></div>\n<div class=\"point\"><span class=\"point-kw\">退化期</span><span class=\"point-val\">：3月上旬：进一步降至560字符，降幅75%</span></div>\n<div class=\"point\"><span class=\"point-kw\">隐藏功能</span><span class=\"point-val\">：3月初上线让退化对用户变得不可见</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、思考深度下降导致工作模式从“先研究再修改”转变为“莽撞修改”</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、读改比从6.6骤降至2.0，模型研究投入减少70%</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">优质期行为</span><span class=\"point-val\">：先读取目标文件、相关依赖文件，检索代码库全局调用关系，查阅头文件与测试用例，再开展精准修改</span></div>\n<div class=\"point\"><span class=\"point-kw\">退化期行为</span><span class=\"point-val\">：仅读取当前文件就仓促修改，直接跳过前期调研步骤</span></div>\n<div class=\"point\"><span class=\"point-kw\">严重程度</span><span class=\"point-val\">：每3次修改中就有1次是在未读取目标文件上下文的情况下直接进行</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、代码修改精准度大幅下滑，依赖全量重写而非精准调整</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">优质期</span><span class=\"point-val\">：全量新建文件占比4.9%，倾向于精准调整</span></div>\n<div class=\"point\"><span class=\"point-kw\">退化期</span><span class=\"point-val\">：占比翻倍至10%，后期攀升至11.1%</span></div>\n<div class=\"point\"><span class=\"point-kw\">后果</span><span class=\"point-val\">：重写丢失项目专属规范理解和上下文感知能力</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、多种可量化质量指标全面恶化，用户体验显著下降</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、终止钩子脚本触发次数从0飙升至173次，平均每天10次</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">识别行为</span><span class=\"point-val\">：推诿责任、提前终止等不良行为</span></div>\n<div class=\"point\"><span class=\"point-kw\">时间范围</span><span class=\"point-val\">：3月8日后17天内</span></div>\n<div class=\"point\"><span class=\"point-kw\">前期对比</span><span class=\"point-val\">：3月8日之前从未触发</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、用户提示词负面情绪占比从5.8%升至9.8%，涨幅68%</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">其他指标</span><span class=\"point-val\">：需纠正的推诿行为数量翻倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">会话变化</span><span class=\"point-val\">：单会话平均提示词数量下降22%</span></div>\n<div class=\"point\"><span class=\"point-kw\">推理问题</span><span class=\"point-val\">：出现此前从未有过的推理循环问题</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、推理循环率翻3倍，最严重会话单次响应出现20次以上推理反转</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">根本原因</span><span class=\"point-val\">：思考深度充足时模型会内部解决推理矛盾，不足时矛盾直接暴露</span></div>\n<div class=\"point\"><span class=\"point-kw\">表现特征</span><span class=\"point-val\">：“哦等一下”“实际上”“让我重新想想”“嗯，不对”等自我修正频繁出现</span></div>\n<div class=\"point\"><span class=\"point-kw\">后果</span><span class=\"point-val\">：推理路径彻底混乱，输出结果完全不可信</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">4、中断率飙升12倍，模型在被纠正后频繁承认输出质量不佳</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">用户中断</span><span class=\"point-val\">：用户发现模型犯错并强行终止，中断率越高代表需人工纠错越多</span></div>\n<div class=\"point\"><span class=\"point-kw\">模型自认</span><span class=\"point-val\">：“你说得对，这太敷衍了”“我太仓促了，结果一目了然”</span></div>\n<div class=\"point\"><span class=\"point-kw\">核心问题</span><span class=\"point-val\">：模型自己也知道输出不达标，但只有被外部纠正后才会发现</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、时段分析揭示思考深度波动模式，美国黄金时段反而体验最差</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、隐藏功能上线前全天思考深度相对稳定，非高峰时段仅10%小幅优势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">时间段</span><span class=\"point-val\">：1月30日至3月7日</span></div>\n<div class=\"point\"><span class=\"point-kw\">特征</span><span class=\"point-val\">：符合负载略低的预期</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、隐藏功能上线后时段模式彻底反转，波动大幅加剧</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">时间段</span><span class=\"point-val\">：3月8日至4月1日</span></div>\n<div class=\"point\"><span class=\"point-kw\">反常现象</span><span class=\"point-val\">：非高峰时段整体思考深度反而更低</span></div>\n<div class=\"point\"><span class=\"point-kw\">最差时段</span><span class=\"point-val\">：太平洋时间17:00，中位估算思考深度仅423字符</span></div>\n<div class=\"point\"><span class=\"point-kw\">次差时段</span><span class=\"point-val\">：太平洋时间19:00，估算思考深度仅373字符，但样本量1031个为全时段最高，属于美国黄金使用时段</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-13", "category": "【AI技术与应用】"}, {"date": "2026-04-07", "title": "【一句话生成无限逼真3D场景匹兹堡大学新作直击VLM空间推理软肋丨CVPR'26】", "summary": "匹兹堡大学发布InfiniBench框架，自然语言即可生成无限逼真3D测试场景，精准诊断Gemini、GPT-5等VLM空间推理缺陷。", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=3&sn=d59c83fea9c08c25435d178631226add\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、研究背景：VLM空间推理测试面临严重困境</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、现有数据集存在根本性缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">维度混淆</span><span class=\"point-val\">：现有测试仅用\"房间数量\"定义复杂度，导致错误归因困难</span></div>\n<div class=\"point\"><span class=\"point-kw\">无法区分类别</span><span class=\"point-val\">：研究人员无法判断错误源于组合复杂度、关系复杂度还是观察复杂度</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、生成工具存在常识缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">物理违背</span><span class=\"point-val\">：LLM直接生成3D布局常出现物体穿模、悬空、越界等违反物理规律的问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">语言鸿沟</span><span class=\"point-val\">：传统3D程序化引擎虽符合物理规律，但难以理解复杂自然语言指令</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、核心方案：InfiniBench全自动3D场景生成引擎</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、大模型智能体迭代生成场景约束</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">LLM Agent</span><span class=\"point-val\">：提供包含可用API和Few-shot示例的知识库，将自然语言翻译为机器可读约束</span></div>\n<div class=\"point\"><span class=\"point-kw\">CoT反馈循环</span><span class=\"point-val\">：布局优化器报错时返回BEV碰撞图，LLM分析失败原因并自动修正约束</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、基于簇的布局优化策略</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">可移动簇概念</span><span class=\"point-val\">：将语义相关的物体群（如餐桌+周围椅子）打包成整体</span></div>\n<div class=\"point\"><span class=\"point-kw\">突破高密度极限</span><span class=\"point-val\">：允许簇作为整体移动，避免传统层级优化的小物体塞不进去问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">集体碰撞检测</span><span class=\"point-val\">：使用整个簇的边界框进行物理校验</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、任务感知相机轨迹优化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Frontier探索</span><span class=\"point-val\">：将未访问的关键物体视为前沿目标，自动采样无遮挡最佳视角</span></div>\n<div class=\"point\"><span class=\"point-kw\">Dijkstra路径规划</span><span class=\"point-val\">：在2D平面图规划无碰撞极简导航路径，确保所有测试物体清晰入镜</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、实验验证：物理真实度满分，揭示VLM核心弱点</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、与现有方法对比优势明显</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">提示词保真度</span><span class=\"point-val\">：契合度比肩LayoutGPT、Holodeck等顶尖LLM方法</span></div>\n<div class=\"point\"><span class=\"point-kw\">物理合理性</span><span class=\"point-val\">：碰撞数量和越界物体数量均无限逼近0.0，远超Infinigen、Luminous</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、顶级VLM空间推理测试结论</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">组合复杂度脆弱</span><span class=\"point-val\">：物体数量从5增至50时，所有VLM准确率断崖式下跌，倾向重复计数</span></div>\n<div class=\"point\"><span class=\"point-kw\">关系复杂度混淆</span><span class=\"point-val\">：无关物体增加导致复杂指代（如\"靠近木桌的蓝色杯子\"）时严重指代混淆</span></div>\n<div class=\"point\"><span class=\"point-kw\">观察复杂度受限</span><span class=\"point-val\">：宏观空间理解任务（透视变换、时空追踪）受限于2D视角降维</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-17", "category": "【AI技术与应用】"}, {"date": "2026-04-07", "title": "【卡帕西没做完的开源社区48小时搞定了完全体知识库token省70倍】", "summary": "开源社区48小时完成Karpathy知识库工具化升级，Graphify实现71.5倍token节省和全模态自动图谱化", "source": "量子位 4月7日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247881170&idx=2&sn=a48eb4404c4ea414a8586646bbaf749f\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Graphify是Karpathy知识库方法的完全体工具化升级</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、解决了Karpathy方法的三大痛点</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">手动整理</span><span class=\"point-val\">：raw文件夹需手动规整资料、手动触发处理</span></div>\n<div class=\"point\"><span class=\"point-kw\">token消耗高</span><span class=\"point-val\">：反复读取原始文件带来高昂token开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">工作流繁琐</span><span class=\"point-val\">：缺乏专门工具封装，需一步步引导AI执行</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、实现了零配置开箱即用的自动化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">一条命令</span><span class=\"point-val\">：执行`/graphify .`即可生成完整知识图谱</span></div>\n<div class=\"point\"><span class=\"point-kw\">无需预处理</span><span class=\"point-val\">：文件丢进文件夹即可统一入谱，无需人工干预</span></div>\n<div class=\"point\"><span class=\"point-kw\">全程自动化</span><span class=\"point-val\">：从文件扫描到图谱生成无需人工介入</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、71.5倍Token消耗节省的技术实现</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、第一阶段：本地AST确定性解析</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">tree-sitter解析</span><span class=\"point-val\">：对代码文件做本地AST提取</span></div>\n<div class=\"point\"><span class=\"point-kw\">零LLM调用</span><span class=\"point-val\">：第一阶段不调用LLM，不产生任何Token消耗</span></div>\n<div class=\"point\"><span class=\"point-kw\">结构信息提取</span><span class=\"point-val\">：直接获取代码结构信息，无需向量嵌入</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、第二阶段：并行LLM子代理语义提取</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">增量处理</span><span class=\"point-val\">：搭配SHA256缓存机制，仅处理变更文件</span></div>\n<div class=\"point\"><span class=\"point-kw\">避免重复</span><span class=\"point-val\">：从根本上避免重复计算与无效开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">多文件支持</span><span class=\"point-val\">：处理PDF、Markdown、图片等非代码内容</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、全模态自动图谱化的万物皆可图谱化能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、统一的多模态处理管线</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">代码解析</span><span class=\"point-val\">：通过tree-sitter做本地AST解析提取结构信息</span></div>\n<div class=\"point\"><span class=\"point-kw\">文档拆分</span><span class=\"point-val\">：PDF、Markdown自动拆分文本与语义单元</span></div>\n<div class=\"point\"><span class=\"point-kw\">视觉识别</span><span class=\"point-val\">：截图、流程图、白板照片调用Claude Vision完成概念提取</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、无需向量数据库的聚类方案</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">图拓扑聚类</span><span class=\"point-val\">：基于图拓扑完成聚类，依靠Leiden社区发现算法</span></div>\n<div class=\"point\"><span class=\"point-kw\">边密度划分</span><span class=\"point-val\">：按边密度划分社区，无需依赖embeddings</span></div>\n<div class=\"point\"><span class=\"point-kw\">省去部署</span><span class=\"point-val\">：自然省去向量数据库的部署与维护成本</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、实时增量更新的持续生长能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、文件监听与自动更新</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">—watch模式</span><span class=\"point-val\">：代码文件改动后立即触发AST重新解析</span></div>\n<div class=\"point\"><span class=\"point-kw\">增量提醒</span><span class=\"point-val\">：文档、图片变更主动提醒用户执行增量更新</span></div>\n<div class=\"point\"><span class=\"point-kw\">Git钩子</span><span class=\"point-val\">：代码commit提交、分支切换后自动重建图谱</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、持久化的增量更新命令</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">—update命令</span><span class=\"point-val\">：新资料加入时无需重建整个图谱</span></div>\n<div class=\"point\"><span class=\"point-kw\">节点关联</span><span class=\"point-val\">：只更新相关节点和关联</span></div>\n<div class=\"point\"><span class=\"point-kw\">持续生长</span><span class=\"point-val\">：让知识库真正实现随资料新增持续生长</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、全平台适配与快速部署</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、多平台无缝接入</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Claude Code</span><span class=\"point-val\">：支持Claude Code平台</span></div>\n<div class=\"point\"><span class=\"point-kw\">Codex</span><span class=\"point-val\">：需在config.toml打开multi_agent = true启用并行模式</span></div>\n<div class=\"point\"><span class=\"point-kw\">OpenClaw</span><span class=\"point-val\">：支持但仅支持顺序提取，速度效率受限</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、一行命令完成部署</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">pip安装</span><span class=\"point-val\">：`pip install graphifyy && graphify install`</span></div>\n<div class=\"point\"><span class=\"point-kw\">Python环境</span><span class=\"point-val\">：仅需Python 3.10及以上</span></div>\n<div class=\"point\"><span class=\"point-kw\">平台选项</span><span class=\"point-val\">：龙虾平台支持`graphify install —platform claw`</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-18", "category": "【AI技术与应用】"}]}, "2026-04-06": {"categories": [{"category": "【AI技术与应用】", "articles": [{"date": "2026-04-06", "title": "【OpenAI又曝出内讧了IPO前夜高层大换血】", "summary": "OpenAI冲刺IPO关键期遭遇高层动荡，CEO与CFO战略分歧加剧，上市前景引发外界质疑。", "source": "量子位 4月6日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247880964&idx=1&sn=ed05f4db2d8458c0b47209102222ace7\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、IPO冲刺期核心高管集中动荡</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、COO Brad Lightcap被“明升暗贬”</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Lightcap转岗</span><span class=\"point-val\">：原COO转任“特别项目”负责人，直接向CEO汇报，被外界解读为失去“大管家”身份</span></div>\n<div class=\"point\"><span class=\"point-kw\">Dresser接任</span><span class=\"point-val\">：Denise Dresser上任不足4个月即接棒COO，其Slack CEO背景显示OpenAI商业化战略转向</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、两位高管因健康原因离开岗位</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Simo休假</span><span class=\"point-val\">：首席应用官Fidji Simo因健康问题休假，她是Meta出身、被重金挖来的人才</span></div>\n<div class=\"point\"><span class=\"point-kw\">Rouch离职</span><span class=\"point-val\">：首席营销官Kate Rouch因癌症治疗离职，健康理由过于巧合引发外界猜测</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、CEO与CFO在IPO时间表上存在重大分歧</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、奥特曼求“快”vs CFO求“稳”</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">激进目标</span><span class=\"point-val\">：奥特曼希望抢在Anthropic之前于今年Q4完成IPO，并承诺5年投入6000亿美元</span></div>\n<div class=\"point\"><span class=\"point-kw\">谨慎态度</span><span class=\"point-val\">：CFO Sarah Friar认为内部准备工作量巨大，今年IPO目标过于激进</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、战略分歧已影响工作关系</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">汇报线调整</span><span class=\"point-val\">：自去年8月起，CFO不再直接向CEO汇报，而是向应用业务负责人汇报</span></div>\n<div class=\"point\"><span class=\"point-kw\">决策排除</span><span class=\"point-val\">：奥特曼近期与投资机构讨论服务器开支时，未让CFO参加，引发内部关注</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、OpenAI财务压力与市场竞争双重困境</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、巨额支出承诺与收入增长不匹配</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">服务器承诺</span><span class=\"point-val\">：OpenAI已签署总额约6650亿美元的服务器租赁协议，有效期至2030年</span></div>\n<div class=\"point\"><span class=\"point-kw\">消耗预警</span><span class=\"point-val\">：今年2月公司私下警告投资者，到2030年现金消耗量将比此前预测高两倍以上</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、竞争加剧导致商业化承压</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">毛利率下滑</span><span class=\"point-val\">：因面对Anthropic、谷歌Gemini竞争，OpenAI收入毛利率去年已不及预期</span></div>\n<div class=\"point\"><span class=\"point-kw\">对手嘲讽</span><span class=\"point-val\">：Anthropic CEO暗讽若对收入增长判断失误，提前锁定大量数据中心投资将是巨大风险</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-10", "category": "【AI技术与应用】"}, {"date": "2026-04-06", "title": "【让离线强化学习从局部描摹变全局布局丨ICLR'26】", "summary": "MAGE算法通过多尺度\"由粗到细\"的自回归生成策略，解决离线强化学习中局部合理但全局偏航的难题，实现长序列任务的高效规划。", "source": "量子位 4月6日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247880964&idx=2&sn=66563b6c5c6fcf70a9432eb599439b9a\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、问题背景：现有离线强化学习方法在长程规划中陷入「局部合理、全局偏航」困境</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、现有生成式方法的全局规划缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">单向自回归限制</span><span class=\"point-val\">：Decision Transformer受限于单向自回归的全局上下文缺失，在长程规划中迷失方向，无法抵达终点</span></div>\n<div class=\"point\"><span class=\"point-kw\">扩散模型局部偏差</span><span class=\"point-val\">：Decision Diffuser生成的轨迹仅能保证局部合理，智能体虽到达终点但遗漏关键金币，全局连贯性不足</span></div>\n<div class=\"point\"><span class=\"point-kw\">分层结构僵硬</span><span class=\"point-val\">：Hierarchical Diffuser固定双层结构导致高低层策略缺乏有效协同，出现物理违规的\"穿墙\"现象</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、迷宫吃金币实验验证缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">随机起点全局规划</span><span class=\"point-val\">：智能体需从随机起点出发，先吃银币再吃金币最后抵达终点，考验长程空间理解能力</span></div>\n<div class=\"point\"><span class=\"point-kw\">现有算法全面失败</span><span class=\"point-val\">：三个对比算法在需要全局规划的场景中均暴露出不同类型的缺陷</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、MAGE核心思路：「自顶向下、由粗到细」的生成策略</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、多尺度轨迹自编码器（MTAE）</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">多尺度离散Token</span><span class=\"point-val\">：将长序列轨迹转化为从粗到细的多尺度离散Token，粗尺度Token掌控全局长程结构，细尺度Token建模短期动态细节</span></div>\n<div class=\"point\"><span class=\"point-kw\">类比人类绘画</span><span class=\"point-val\">：如同画素描先画整体轮廓再细化五官，符合人类直觉的自顶向下规划方式</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、多尺度条件引导自回归生成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">目标回报约束</span><span class=\"point-val\">：每层生成均以\"目标回报\"和\"初始状态\"为条件进行约束</span></div>\n<div class=\"point\"><span class=\"point-kw\">序列化多尺度Token生成</span><span class=\"point-val\">：使用Transformer序列化生成多尺度Token，确保每步都朝向最终目标前进</span></div>\n<div class=\"point\"><span class=\"point-kw\">精确初始状态对齐</span><span class=\"point-val\">：集成轻量级适配器模块并引入条件引导损失函数Lcond，强制解码初始状态与真实环境精确对齐</span></div>\n<div class=\"point\"><span class=\"point-kw\">潜在逆动力学模型</span><span class=\"point-val\">：通过潜在逆动力学模型决定最终动作输出</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、实验验证：长序列任务全面超越且推理高效</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、多任务性能显著领先</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Adroit机械臂任务</span><span class=\"point-val\">：在高维连续控制、极其稀疏奖励下实现显著性能提升，大幅优于对比方法</span></div>\n<div class=\"point\"><span class=\"point-kw\">Franka Kitchen组合任务</span><span class=\"point-val\">：凭借捕获全局结构和局部细节的能力，以相当大优势超越所有竞争算法</span></div>\n<div class=\"point\"><span class=\"point-kw\">AntMaze迷宫导航</span><span class=\"point-val\">：在所有数据集上均取得最佳性能，验证长序列导航任务的卓越处理能力</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、推理效率满足实时控制要求</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">显著速度优势</span><span class=\"point-val\">：比Hierarchical Diffuser快约50倍，比Decision Diffuser快80倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">毫秒级推理</span><span class=\"point-val\">：每步推理时间保持在27毫秒，满足20 Hz真实机器人实时运行门槛</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-11", "category": "【AI技术与应用】"}]}], "articles": [{"date": "2026-04-06", "title": "【OpenAI又曝出内讧了IPO前夜高层大换血】", "summary": "OpenAI冲刺IPO关键期遭遇高层动荡，CEO与CFO战略分歧加剧，上市前景引发外界质疑。", "source": "量子位 4月6日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247880964&idx=1&sn=ed05f4db2d8458c0b47209102222ace7\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、IPO冲刺期核心高管集中动荡</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、COO Brad Lightcap被“明升暗贬”</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Lightcap转岗</span><span class=\"point-val\">：原COO转任“特别项目”负责人，直接向CEO汇报，被外界解读为失去“大管家”身份</span></div>\n<div class=\"point\"><span class=\"point-kw\ ontent\">\n<div class=\"level2\"><div class=\"level2-title\">1、多尺度轨迹自编码器（MTAE）</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">多尺度离散Token</span><span class=\"point-val\">：将长序列轨迹转化为从粗到细的多尺度离散Token，粗尺度Token掌控全局长程结构，细尺度Token建模短期动态细节</span></div>\n<div class=\"point\"><span class=\"point-kw\">类比人类绘画</span><span class=\"point-val\">：如同画素描先画整体轮廓再细化五官，符合人类直觉的自顶向下规划方式</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、多尺度条件引导自回归生成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">目标回报约束</span><span class=\"point-val\">：每层生成均以\"目标回报\"和\"初始状态\"为条件进行约束</span></div>\n<div class=\"point\"><span class=\"point-kw\">序列化多尺度Token生成</span><span class=\"point-val\">：使用Transformer序列化生成多尺度Token，确保每步都朝向最终目标前进</span></div>\n<div class=\"point\"><span class=\"point-kw\">精确初始状态对齐</span><span class=\"point-val\">：集成轻量级适配器模块并引入条件引导损失函数Lcond，强制解码初始状态与真实环境精确对齐</span></div>\n<div class=\"point\"><span class=\"point-kw\">潜在逆动力学模型</span><span class=\"point-val\">：通过潜在逆动力学模型决定最终动作输出</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、实验验证：长序列任务全面超越且推理高效</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、多任务性能显著领先</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Adroit机械臂任务</span><span class=\"point-val\">：在高维连续控制、极其稀疏奖励下实现显著性能提升，大幅优于对比方法</span></div>\n<div class=\"point\"><span class=\"point-kw\">Franka Kitchen组合任务</span><span class=\"point-val\">：凭借捕获全局结构和局部细节的能力，以相当大优势超越所有竞争算法</span></div>\n<div class=\"point\"><span class=\"point-kw\">AntMaze迷宫导航</span><span class=\"point-val\">：在所有数据集上均取得最佳性能，验证长序列导航任务的卓越处理能力</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、推理效率满足实时控制要求</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">显著速度优势</span><span class=\"point-val\">：比Hierarchical Diffuser快约50倍，比Decision Diffuser快80倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">毫秒级推理</span><span class=\"point-val\">：每步推理时间保持在27毫秒，满足20 Hz真实机器人实时运行门槛</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-11", "category": "【AI技术与应用】"}]}}};
const DATE_GROUPS = {"2026-04-12": {"categories": [{"category": "【AI技术与应用】", "articles": [{"date": "2026-04-12", "title": "【AI救活了一家马桶公司也点燃了存储芯片超级周期】", "summary": "AI需求引爆存储芯片超级周期，HBM售价超黄金，传统DRAM涨幅达1800%，产业链全线供不应求至2027年。", "source": "虎嗅APP 4月12日10时 <a href=\"https://mp.weixin.qq.com/s?__biz=MTQzMjE1NjQwMQ==&mid=2656164776&idx=3&sn=1c9c52a0585f22587cade0a6dd2db280\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、TOTO马桶公司因隐藏业务成为AI概念股</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、TOTO的高纯度陶瓷静电吸盘业务成刚需</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">TOTO</span><span class=\"point-val\">：日本高端智能马桶企业，股价因AI概念飙升</span></div>\n<div class=\"point\"><span class=\"point-kw\">静电吸盘</span><span class=\"point-val\">：芯片制造时固定晶圆的关键耗材，精度达头发丝的1/80，纯度业界第一</span></div>\n<div class=\"point\"><span class=\"point-kw\">订单排至2027年</span><span class=\"point-val\">：该业务占TOTO超过四成营业利润，高盛等投行上调其股价评级</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、存储芯片超级周期：全线告急，价格疯涨</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、HBM成为最耀眼紧缺产品</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">HBM</span><span class=\"point-val\">：高带宽内存，售价400-500美元/块，比同等重量黄金还贵</span></div>\n<div class=\"point\"><span class=\"point-kw\">三强格局</span><span class=\"point-val\">：SK海力士占60%份额，三星和美光各占20%</span></div>\n<div class=\"point\"><span class=\"point-kw\">SK海力士</span><span class=\"point-val\">：2026年产能已全部售罄，人均年终奖达64万元人民币</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、传统DRAM和NAND价格暴涨</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">DDR5</span><span class=\"point-val\">：16GB均价从4.6美元涨至28美元，涨幅超500%</span></div>\n<div class=\"point\"><span class=\"point-kw\">DDR4</span><span class=\"point-val\">：从3.2美元飙至62美元以上，累计涨幅达1800%</span></div>\n<div class=\"point\"><span class=\"point-kw\">服务器内存</span><span class=\"point-val\">：64GB模组半年内从255美元涨至700美元，涨幅175%</span></div>\n<div class=\"point\"><span class=\"point-kw\">三星</span><span class=\"point-val\">：2026年一季度NAND闪存供应价格直接翻倍，上调100%</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、产业链全景：热存储与冷存储的分工体系</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、热的存储：离计算最近的DRAM家族</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">DRAM</span><span class=\"point-val\">：动态随机存取存储器，电脑和手机的运行内存，速度快但断电丢数据</span></div>\n<div class=\"point\"><span class=\"point-kw\">HBM</span><span class=\"point-val\">：DRAM的进化形态，通过TSV技术垂直堆叠，与GPU/TPU紧密配合</span></div>\n<div class=\"point\"><span class=\"point-kw\">GDDR</span><span class=\"point-val\">：显卡专用；LPDDR 手机和笔记本专用</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、冷的存储：长期记忆的NAND和HDD</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">NAND Flash</span><span class=\"point-val\">：长期记忆，固态硬盘、手机存储、U盘的核心，断电不丢数据</span></div>\n<div class=\"point\"><span class=\"point-kw\">角色升级</span><span class=\"point-val\">：NAND正从\"仓库\"转变为AI前线的\"弹药库\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">HDD</span><span class=\"point-val\">：机械硬盘，速度慢但容量大，用于数据中心冷存储和归档</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、供应短缺持续，LTA新规则重塑行业格局</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、闪迪开创LTA先例，客户需预付款且毁约不退</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">LTA</span><span class=\"point-val\">：长期供货协议，历史上从未有法律效力和预付款要求</span></div>\n<div class=\"point\"><span class=\"point-kw\">新规则</span><span class=\"point-val\">：客户须打预付款，毁约不退，在存储行业几十年历史上首次发生</span></div>\n<div class=\"point\"><span class=\"point-kw\">预判</span><span class=\"point-val\">：三星、SK海力士、美光三大巨头同样具备执行此条款的能力</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、超级周期或将持续至2027年</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">供需失衡</span><span class=\"point-val\">：全球存储芯片正经历四十年来最严重供需失衡</span></div>\n<div class=\"point\"><span class=\"point-kw\">行业共识</span><span class=\"point-val\">：三星存储产品营销经理预计2026年已全部售完，2027年大概率相同</span></div>\n<div class=\"point\"><span class=\"point-kw\">投资判断</span><span class=\"point-val\">：华尔街Amont Partners管理合伙人Rob Li认为超级周期很可能持续到2027年</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-0", "category": "【AI技术与应用】"}, {"date": "2026-04-12", "title": "【996太轻松002极限压榨被AGI逼疯的硅谷天才正在集体逃亡】", "summary": "硅谷AI工程师因\"0-0-2\"极限压榨与道德焦虑导致精神崩溃，xAI、OpenAI核心人才正掀起集体离职潮。", "source": "新智元 4月12日10时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzI3MTA0MTk1MA==&mid=2652691298&idx=2&sn=31ab86e87784ccee50411483c86a0b68\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、OpenAI工程师Hieu Pham因精神透支离职，撕开硅谷残酷内卷真相</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、顶尖AI工程师Hieu Pham宣布离职，携家人返回越南</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">IMO银牌</span><span class=\"point-val\">：高中期间斩获国际数学奥林匹克竞赛银牌</span></div>\n<div class=\"point\"><span class=\"point-kw\">斯坦福+CMU</span><span class=\"point-val\">：本科斯坦福计算机专业，征战ICPC总决赛；后续攻读CMU机器学习博士</span></div>\n<div class=\"point\"><span class=\"point-kw\">顶级履历</span><span class=\"point-val\">：曾在百度硅谷实验室与Anthropic CEO共事，从谷歌到xAI再到OpenAI</span></div>\n<div class=\"point\"><span class=\"point-kw\">精神崩溃</span><span class=\"point-val\">：用\"痛苦、可怕、极度危险\"形容当前精神状态，称已彻底燃烧殆尽</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、存在主义焦虑困扰AI从业者</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">存在性威胁</span><span class=\"point-val\">：看着亲手训练的模型，感到前所未有的存在性威胁</span></div>\n<div class=\"point\"><span class=\"point-kw\">道德困境</span><span class=\"point-val\">：当AI过于完美并颠覆一切时，人类还能剩下什么</span></div>\n<div class=\"point\"><span class=\"point-kw\">悲观预判</span><span class=\"point-val\">：当时得出的结论是，这只是时间问题</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、硅谷AI行业\"0-0-2\"极限工作模式成为行业常态</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、AGI竞赛催生极端劳动模式</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">80小时起步</span><span class=\"point-val\">：业界曾流传每周工作80小时的\"硬核\"传闻，如今已被视作温和</span></div>\n<div class=\"point\"><span class=\"point-kw\">0-0-2模式</span><span class=\"point-val\">：从午夜工作到下一个午夜，整个周末仅保留两个小时的喘息时间</span></div>\n<div class=\"point\"><span class=\"point-kw\">16小时专注</span><span class=\"point-val\">：每天长达16个小时的绝对专注，没有周末，没有节假日</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、明星初创企业将员工生活完全搬进办公室</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">两居室公寓</span><span class=\"point-val\">：团队成员将生活完全搬进拥挤的两居室公寓</span></div>\n<div class=\"point\"><span class=\"point-kw\">生活工作一体化</span><span class=\"point-val\">：客厅是会议室，卧室是机房，餐桌上堆满凉透的外卖</span></div>\n<div class=\"point\"><span class=\"point-kw\">公司合理化</span><span class=\"point-val\">：高层在招聘启事中宣称员工不需要去操心住房、三餐甚至社交生活</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、行业反思：高压工作模式的蔓延</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">圣战叙事</span><span class=\"point-val\">：追逐AGI被包装成拯救或改变人类命运的圣战</span></div>\n<div class=\"point\"><span class=\"point-kw\">休息即背叛</span><span class=\"point-val\">：任何关于休息的渴望都被视作对使命的背叛</span></div>\n<div class=\"point\"><span class=\"point-kw\">遥遥无期</span><span class=\"point-val\">：大模型迭代如同深不见底的黑洞，\"冲刺\"被无限期拉长成透支生命的漫长马拉松</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、华人AI力量正经历最剧烈的人才流失与震荡</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、xAI在24小时内痛失两位华人联合创始人</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">吴宇怀离职</span><span class=\"point-val\">：曾坐在马斯克身旁占据C位，暗示对大厂疯狂堆叠资源模式的厌倦</span></div>\n<div class=\"point\"><span class=\"point-kw\">吉米·巴紧随</span><span class=\"point-val\">：传言背后是缩小与OpenAI差距带来的巨大内部研发压力</span></div>\n<div class=\"point\"><span class=\"point-kw\">50%流失率</span><span class=\"point-val\">：xAI最初12位联合创始人中已有6位黯然离场</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、多位核心技术骨干因身体原因提前退出</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Greg Yang</span><span class=\"point-val\">：xAI联合创始人因长期超负荷运转被诊断出莱姆病</span></div>\n<div class=\"point\"><span class=\"point-kw\">OpenAI核心</span><span class=\"point-val\">：离职潮核心不再是边缘员工淘汰，而是亲手搭建现代AI大厦的顶尖研究员</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、硅谷劳动模式异化正在完成闭环</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、技术前沿从业者的真实处境</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">高薪高压</span><span class=\"point-val\">：高昂薪酬和耀眼光环背后是喘不过气的高压和常人难以想象的心理代价</span></div>\n<div class=\"point\"><span class=\"point-kw\">自我怀疑</span><span class=\"point-val\">：在无数个被死线追赶的深夜，即使最坚韧的从业者也会拷问牺牲是否值得</span></div>\n<div class=\"point\"><span class=\"point-kw\">集体反思</span><span class=\"point-val\">：Hieu Pham的离开引发整个行业对正在蔓延的残酷工作模式的集体反思</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、行业文化正在发生根本性转变</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">悄然异化</span><span class=\"point-val\">：在曾经标榜自由和弹性工作生活的硅谷土地上，劳动模式异化正在完成闭环</span></div>\n<div class=\"point\"><span class=\"point-kw\">人才流失</span><span class=\"point-val\">：顶级研究员正掀起史无前例的集体逃亡，对行业可持续发展构成严峻挑战</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-1", "category": "【AI技术与应用】"}, {"date": "2026-04-12", "title": "【别盯着GPU了CPU正成为AI时代的“新瓶颈”】", "summary": "AI推理重心正从GPU转向CPU，智能体工作负载使CPU成为新瓶颈，Intel、AMD、NVIDIA各出奇招抢滩", "source": "腾讯科技 4月12日21时 <a href=\"https://mp.weixin.qq.com/s?__biz=Mjc1NjM3MjY2MA==&mid=2691566976&idx=1&sn=02efb920cb109e6b2f71158fe8cf50af\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、CPU市场正经历供应危机，价格与交付周期双飙升</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、服务器CPU价格大幅上涨，供应紧张加剧</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">价格上涨30%</span><span class=\"point-val\">：2025年第四季度服务器CPU平均售价上涨约30%，在成熟市场中极为罕见</span></div>\n<div class=\"point\"><span class=\"point-kw\">交付周期延长</span><span class=\"point-val\">：AMD交付周期从8周延长至10周以上，部分型号面临长达6个月延迟</span></div>\n<div class=\"point\"><span class=\"point-kw\">产能被挤占</span><span class=\"point-val\">：台积电3nm生产线紧张，CPU晶圆产能持续被利润更高的GPU订单挤占</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、科技巨头纷纷锁定CPU资源，争夺供应链安全</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">谷歌英特尔合作</span><span class=\"point-val\">：谷歌与英特尔达成多年协议，全球AI数据中心规模部署Xeon至强处理器</span></div>\n<div class=\"point\"><span class=\"point-kw\">马斯克Terafab项目</span><span class=\"point-val\">：马斯克委托英特尔为得克萨斯州项目设计制造定制芯片，打造统一计算底座</span></div>\n<div class=\"point\"><span class=\"point-kw\">生态博弈升级</span><span class=\"point-val\">：CPU市场竞争从参数比拼升级为生态系统和供应链稳定性的全面博弈</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、智能体时代工作负载变革，使CPU成为性能瓶颈</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、传统聊天机器人与智能体的工作负载模式存在本质差异</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">聊天机器人模式</span><span class=\"point-val\">：CPU仅负责调度和数据处理，GPU承担核心推理计算，CPU很少成为瓶颈</span></div>\n<div class=\"point\"><span class=\"point-kw\">智能体工作负载</span><span class=\"point-val\">：需要执行多步推理、调用API、读写数据库、编排复杂业务流</span></div>\n<div class=\"point\"><span class=\"point-kw\">算力分配反转</span><span class=\"point-val\">：GPU负责token生成（思考），CPU负责将思考结果转化为实际行动</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、CPU端工具处理占用大量延迟，成为系统性能决定因素</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">延迟占比50%-90.6%</span><span class=\"point-val\">：佐治亚理工学院论文量化分析显示CPU端工具处理占总延迟比例极高</span></div>\n<div class=\"point\"><span class=\"point-kw\">GPU空转等待</span><span class=\"point-val\">：某些场景下GPU已准备好处理下一批任务，CPU仍在等待工具调用返回</span></div>\n<div class=\"point\"><span class=\"point-kw\">协同效率关键</span><span class=\"point-val\">：适合智能体时代的CPU需要低延迟、一致内存访问能力和系统级协同能力</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、上下文窗口快速扩展导致KV缓存卸载需求激增</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">上下文窗口扩张</span><span class=\"point-val\">：2025年主流模型支持100万token以上，而2024年仅128K至200K</span></div>\n<div class=\"point\"><span class=\"point-kw\">内存压力剧增</span><span class=\"point-val\">：100万token时KV缓存约为200GB，远超单块H100的80GB显存容量</span></div>\n<div class=\"point\"><span class=\"point-kw\">内存卸载方案</span><span class=\"point-val\">：将KV缓存部分卸载至CPU内存，使CPU内存容量和带宽成为关键指标</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、芯片厂商采取差异化策略抢占智能体时代制高点</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、英特尔双线并进，押注“去GPU化”智能体推理</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">市场份额领先</span><span class=\"point-val\">：2025年Q4英特尔服务器CPU市场份额仍占60%，AMD占24.3%</span></div>\n<div class=\"point\"><span class=\"point-kw\">深度客户绑定</span><span class=\"point-val\">：继续与谷歌等超大规模客户深度绑定，合作覆盖CPU和IPU</span></div>\n<div class=\"point\"><span class=\"point-kw\">去GPU化方案</span><span class=\"point-val\">：与SambaNova合作推出至强处理器+RDU加速器组合，主打不用GPU也能跑智能体推理</span></div>\n<div class=\"point\"><span class=\"point-kw\">路线图关键</span><span class=\"point-val\">：至强6 Granite Rapids和18A工艺将是检验英特尔能否翻盘的关键</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、AMD成最大受益者，数据中心收入与份额双增长</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">收入增长39%</span><span class=\"point-val\">：2025年Q4 AMD数据中心收入54亿美元，同比增长39%</span></div>\n<div class=\"point\"><span class=\"point-kw\">EPYC主导</span><span class=\"point-val\">：第五代EPYC Turin占服务器CPU收入一半以上，云实例部署增长超50%</span></div>\n<div class=\"point\"><span class=\"point-kw\">收入份额突破</span><span class=\"point-val\">：AMD服务器CPU收入份额首次突破40%</span></div>\n<div class=\"point\"><span class=\"point-kw\">战略合作</span><span class=\"point-val\">：与Meta潜在交易超1000亿美元，供应MI450 GPU和Venice EPYC CPU</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、英伟达CPU设计另辟蹊径，聚焦系统级协同</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">核心数精简</span><span class=\"point-val\">：Grace CPU仅72核心，而EPYC和至强通常是128核心</span></div>\n<div class=\"point\"><span class=\"point-kw\">设计理念差异</span><span class=\"point-val\">：英伟达CPU设计思路与传统厂商完全不同</span></div>\n<div class=\"point\"><span class=\"point-kw\">互连能力短板</span><span class=\"point-val\">：AMD缺乏类似NVLink C2C的高速CPU-GPU互连能力</span></div>\n<div class=\"point\"><span class=\"point-kw\">协同效率趋势</span><span class=\"point-val\">：随着Agent系统对数据交互要求提高，互连能力重要性持续上升</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-2", "category": "【AI技术与应用】"}, {"date": "2026-04-12", "title": "【中国具身屠榜全球10万小时数据炸场PI、英伟达集体破防】", "summary": "中国灵初智能凭10万小时人类数据+双模型架构登顶MolmoSpaces，超越英伟达GEAR等主流方案，重新定义具身智能数据范式。", "source": "新智元 4月12日10时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzI3MTA0MTk1MA==&mid=2652691298&idx=1&sn=79453e0eb1067d97a6b91fdd81200b46\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、具身智能面临数据瓶颈，传统遥操作路线难以支撑大规模训练</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、真机遥操作数据采集面临高成本、低速度的双重硬伤</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">高成本</span><span class=\"point-val\">：采集一小时数据动辄数百元，还需专业动捕环境</span></div>\n<div class=\"point\"><span class=\"point-kw\">低速度</span><span class=\"point-val\">：人盯屏幕遥控机械臂，采集节奏难匹配真实生产节拍</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、人类操作数据被重新提上议程，成为破局关键</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">来源丰富</span><span class=\"point-val\">：人本身在真实作业场景中持续完成海量高精细操作</span></div>\n<div class=\"point\"><span class=\"point-kw\">信息完整</span><span class=\"point-val\">：天然携带任务目标、动作细节和节拍信息</span></div>\n<div class=\"point\"><span class=\"point-kw\">核心难题</span><span class=\"point-val\">：人手与机械手物理结构不同，无法直接平移；纯第一视角视频还原精度不够</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、灵初智能PSI框架：以Raw Data In, Raw Data Out理念融合人类与真机数据</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、Psi-R2策略模型：直接学习「任务该怎么做」</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">数据规模</span><span class=\"point-val\">：联合训练真机数据（Psi-MobiDex 5417小时）与人类数据（95472小时）</span></div>\n<div class=\"point\"><span class=\"point-kw\">人类数据覆盖</span><span class=\"point-val\">：294种场景、4821种任务、1382种物体</span></div>\n<div class=\"point\"><span class=\"point-kw\">训练策略</span><span class=\"point-val\">：摒弃复杂的图像修复、关键点辅助损失、跨空间对齐模块</span></div>\n<div class=\"point\"><span class=\"point-kw\">效果验证</span><span class=\"point-val\">：少于100条轨迹微调即可完成手机装配、工业包装、纸盒折叠等长时序高精度任务</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、Psi-W0世界模型：补全「换种做法会怎样」的反事实推理能力</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">动作条件生成</span><span class=\"point-val\">：吃进图像、语言指令和机器人动作轨迹，吐出未来场景视频预测</span></div>\n<div class=\"point\"><span class=\"point-kw\">失败样本学习</span><span class=\"point-val\">：训练中加入约30%失败样本，来自专项采集、常规采集和推理过程</span></div>\n<div class=\"point\"><span class=\"point-kw\">双层作用</span><span class=\"point-val\">：一是评估策略是否真正学会人类动作方法；二是将人类数据迁移为机器人可用数据</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、数据飞轮机制：世界模型驱动人类到机器人数据闭环</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、解决Sim2Real gap的创新思路</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">传统做法</span><span class=\"point-val\">：重建场景和物体重进仿真器再做强化学习微调，流程重、成本高</span></div>\n<div class=\"point\"><span class=\"point-kw\">灵初方案</span><span class=\"point-val\">：在世界模型内完成动作迁移推演，用强化学习调整直到轨迹贴近机器人执行状态</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、数据飞轮运转逻辑</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">好轨迹回流</span><span class=\"point-val\">：理想轨迹回流训练成为新的有效数据</span></div>\n<div class=\"point\"><span class=\"point-kw\">失败边界识别</span><span class=\"point-val\">：偏掉轨迹帮助模型识别失败边界，推动世界模型越来越准</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、MolmoSpaces榜单验证：Psi-R2登顶总榜第一，超越主流方案</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、榜单地位与竞争格局</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">MolmoSpaces</span><span class=\"point-val\">：当前具身智能领域少数与真实世界评测具有较强相关性的公开基准之一</span></div>\n<div class=\"point\"><span class=\"point-kw\">参赛对手</span><span class=\"point-val\">：NVIDIA、PI等全球顶尖具身智能团队均参与本次评测</span></div>\n<div class=\"point\"><span class=\"point-kw\">Psi-R2表现</span><span class=\"point-val\">：总榜第一，整体表现超过具身大模型标杆π及英伟达GEAR等主流方案</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、数据价值分水岭：信噪比、精度与节拍三重维度</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、信噪比是决定数据价值的核心因素</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">低信噪比危害</span><span class=\"point-val\">：不光效率低，还会拖垮训练效果</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level
