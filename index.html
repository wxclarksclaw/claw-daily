/div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">外骨骼手套</span><span class=\"point-val\">：自研设备采集精准手部动作数据</span></div>\n<div class=\"point\"><span class=\"point-kw\">触觉数据</span><span class=\"point-val\">：收集成本仅为机器人数据的1/10以下</span></div>\n<div class=\"point\"><span class=\"point-kw\">多模态采集</span><span class=\"point-val\">：包含手部操作视频、触觉信号、3D位姿追踪</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、Psi-R2模型登顶全球具身智能评测榜首</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、MolmoSpace榜单表现</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">全球第一</span><span class=\"point-val\">：超越PI、DreamZero等国际知名模型</span></div>\n<div class=\"point\"><span class=\"point-kw\">10倍提升</span><span class=\"point-val\">：成功率比同类VLA模型高出近10倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">权威评测</span><span class=\"point-val\">：美国艾伦人工智能研究所（AllenAI）发起的全球具身智能基准平台</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、技术架构创新</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Psi-R2</span><span class=\"point-val\">：世界行动模型（WAM），输入图像和语言指令，输出预测视频和动作</span></div>\n<div class=\"point\"><span class=\"point-kw\">Psi-W0</span><span class=\"point-val\">：数据质量审查系统，辅助自动标注和质量检测</span></div>\n<div class=\"point\"><span class=\"point-kw\">训练骨干</span><span class=\"point-val\">：采用Wan2.2-IT2V-5B-480P预训练网络</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、人类数据训练方法论</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、数据融合策略</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Raw Data In, Raw Data Out</span><span class=\"point-val\">：舍弃人工复杂处理，直接进行运动学对齐</span></div>\n<div class=\"point\"><span class=\"point-kw\">Auto Labeling</span><span class=\"point-val\">：自动标注替代人工，模型自行探索海量数据</span></div>\n<div class=\"point\"><span class=\"point-kw\">embodiment gap补偿</span><span class=\"point-val\">：触觉数据有效弥补人机动力学差异</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、数据质量核心因素</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">信噪比决定效果</span><span class=\"point-val\">：低信噪比数据甚至起反作用</span></div>\n<div class=\"point\"><span class=\"point-kw\">任务多样性优先</span><span class=\"point-val\">：操作任务多样性>物体多样性>>场景多样性</span></div>\n<div class=\"point\"><span class=\"point-kw\">3D位姿关键</span><span class=\"point-val\">：精准3D位姿>>触觉模态>2D图像特征</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、具身智能商业化前景</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、成本效益优势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">学习人类SOP</span><span class=\"point-val\">：机器人抢先掌握商业验证的标准作业流程</span></div>\n<div class=\"point\"><span class=\"point-kw\">低成本微调</span><span class=\"point-val\">：预训练后仅需不到100条真机轨迹即可完成微调</span></div>\n<div class=\"point\"><span class=\"point-kw\">触觉成本</span><span class=\"point-val\">：人类触觉数据收集成本是机器人的1/10以下</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、性能提升表现</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">高节拍操作</span><span class=\"point-val\">：速度可达1200，超过遥操作的800</span></div>\n<div class=\"point\"><span class=\"point-kw\">泛化能力</span><span class=\"point-val\">：预训练阶段见过更多任务和对象，接手新任务更快</span></div>\n<div class=\"point\"><span class=\"point-kw\">精度保障</span><span class=\"point-val\">：精准采集数据与粗糙泛化数据相互补充</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-4", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【重磅开源240亿参数力压Nano Banana 2】", "summary": "京东开源240亿参数的JoyAI-Image-Edit图像模型，首创\"空间智能\"架构，实现理解、生成、编辑闭环协作，突破传统图像AI不懂空间的瓶颈。", "source": "新智元 4月11日12时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzI3MTA0MTk1MA==&mid=2652691208&idx=1&sn=8ef0638fe63ada3a7277b5f22e1e4f5d\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、图像AI面临\"空间理解\"瓶颈</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、现有模型的局限性</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">平面裱糊匠</span><span class=\"point-val\">：现有图像AI擅长生成惊艳像素，但无法理解空间关系</span></div>\n<div class=\"point\"><span class=\"point-kw\">透视崩塌</span><span class=\"point-val\">：改变视角时出现沙发漂浮、物体穿墙等错误</span></div>\n<div class=\"point\"><span class=\"point-kw\">遮挡错乱</span><span class=\"point-val\">：调整物体前后顺序时比例失衡、关系混乱</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、核心问题本质</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">懂画不懂空间</span><span class=\"point-val\">：能生成好看图像，但不理解立体世界的前后、深度、光影逻辑</span></div>\n<div class=\"point\"><span class=\"point-kw\">理解与生成割裂</span><span class=\"point-val\">：过去的模型理解归理解、生成归生成，两者各行其是</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、JoyAI-Image-Edit技术架构</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、模型规模与组成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">80亿参数MLLM</span><span class=\"point-val\">：多模态语言模型，负责空间意图解析与指令理解</span></div>\n<div class=\"point\"><span class=\"point-kw\">160亿参数MMDiT</span><span class=\"point-val\">：多模态扩散Transformer，负责图像生成与编辑</span></div>\n<div class=\"point\"><span class=\"point-kw\">240亿参数总量</span><span class=\"point-val\">：两者耦合形成统一架构</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、空间智能闭环设计</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">理解-生成-编辑闭环</span><span class=\"point-val\">：三者协作互助，形成真正的智能闭环</span></div>\n<div class=\"point\"><span class=\"point-kw\">空间意图贯穿</span><span class=\"point-val\">：从指令解析到图像生成全程保持空间一致性</span></div>\n<div class=\"point\"><span class=\"point-kw\">可扩展数据流水线</span><span class=\"point-val\">：包含OpenSpatial空间理解数据、长文本渲染数据、SpatialEdit编辑数据</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、开源协议与生态支持</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Apache 2.0协议</span><span class=\"point-val\">：完全开源，可商业使用</span></div>\n<div class=\"point\"><span class=\"point-kw\">ComfyUI支持</span><span class=\"point-val\">：已完成集成</span></div>\n<div class=\"point\"><span class=\"point-kw\">Diffusers格式兼容</span><span class=\"point-val\">：方便灵活部署与二次开发</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、三大空间编辑核心能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、相机控制</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">自然语言指令控制</span><span class=\"point-val\">：可用大白话指挥相机移动角度、俯仰、缩放</span></div>\n<div class=\"point\"><span class=\"point-kw\">几何一致性保持</span><span class=\"point-val\">：透视关系、遮挡关系、光影关系全部正确</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、物体旋转与空间漫游</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">连续视角移动</span><span class=\"point-val\">：生成逻辑连贯的多视角图像序列</span></div>\n<div class=\"point\"><span class=\"point-kw\">虚拟相机体验</span><span class=\"point-val\">：如同在三维场景中真实走动</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、物体空间关系操控</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">任意物体操作</span><span class=\"point-val\">：挪动、旋转、缩放均不影响整体场景结构</span></div>\n<div class=\"point\"><span class=\"point-kw\">自然遮挡与光影</span><span class=\"point-val\">：无变形、错位、比例失衡问题</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、性能横评领先</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、与竞品对比优势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Nano Banana Pro</span><span class=\"point-val\">：忠实执行相机运动能力更胜一筹</span></div>\n<div class=\"point\"><span class=\"point-kw\">Qwen-Image-Edit</span><span class=\"point-val\">：合成视角的诊断性和高保真度更优</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、核心价值定位</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">高保真新视角</span><span class=\"point-val\">：生成的新视角能有效消除复杂空间关系的歧义</span></div>\n<div class=\"point\"><span class=\"point-kw\">生产级可用</span><span class=\"point-val\">：真正对得准，适用于真实生产和应用环境</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-8", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【刘壮陈丹琦新作开源通用视觉推理RL框架0思考数据刷新SOTA】", "summary": "普林斯顿大学开源Vero视觉推理框架，基于60万样本数据集和任务路由奖励机制，零思考数据刷新SOTA", "source": "量子位 4月11日9时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247882420&idx=2&sn=f341ba942885c69e34e63bf80b8ba655\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Vero框架的核心技术创新</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1. Vero-600K多样化训练数据集</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">数据规模</span><span class=\"point-val\">：从59个数据集中精选60万高质量样本</span></div>\n<div class=\"point\"><span class=\"point-kw\">任务覆盖</span><span class=\"point-val\">：涵盖图表OCR、STEM、空间动作、知识识别、定位计数、描述指令六类</span></div>\n<div class=\"point\"><span class=\"point-kw\">泛化优势</span><span class=\"point-val\">：均衡数据训练可避免单一任务训练的能力退化</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2. 任务路由奖励机制</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">多路验证</span><span class=\"point-val\">：根据任务类型自动路由至相应验证器</span></div>\n<div class=\"point\"><span class=\"point-kw\">格式适配</span><span class=\"point-val\">：选择题验证选项正确性、数学题数学校验、开放题引入LLM评判</span></div>\n<div class=\"point\"><span class=\"point-kw\">差异化奖励</span><span class=\"point-val\">：针对不同答案格式设计针对性评分标准</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、实验结果验证框架有效性</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1. SOTA性能表现</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">基准测试</span><span class=\"point-val\">：30项测试中23项超越Qwen3-VL-8B-Thinking</span></div>\n<div class=\"point\"><span class=\"point-kw\">零思考数据</span><span class=\"point-val\">：未引入任何私有思考数据即达最优效果</span></div>\n<div class=\"point\"><span class=\"point-kw\">核心发现</span><span class=\"point-val\">：广泛数据覆盖是视觉推理RL Scaling的主要驱动力</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2. 单阶段强化学习方案</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">方法优势</span><span class=\"point-val\">：无需复杂私有数据，仅凭高质量数据过滤+均衡任务混合+精确路由奖励</span></div>\n<div class=\"point\"><span class=\"point-kw\">泛化能力</span><span class=\"point-val\">：可激发基础模型通用视觉推理能力</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、研究团队与开源贡献</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1. 团队构成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">刘壮</span><span class=\"point-val\">：项目负责人，普林斯顿CS助理教授，ConvNeXt作者，DenseNet最佳论文奖得主</span></div>\n<div class=\"point\"><span class=\"point-kw\">陈丹琦</span><span class=\"point-val\">：PLI副主任，参与作者</span></div>\n<div class=\"point\"><span class=\"point-kw\">Gabriel Sarch</span><span class=\"point-val\">：CMU博士，PLI博士后研究员</span></div>\n<div class=\"point\"><span class=\"point-kw\">Linrong Cai</span><span class=\"point-val\">：普林斯顿CS硕士生</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2. 开源资源</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">代码开源</span><span class=\"point-val\">：所有数据、代码、模型均已开源至https://vero-reasoning.github.io/</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-16", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【YC CEO把自己第二大脑系统开源了专供OpenClaw与Hermes全息记忆打造迷你AGI】", "summary": "YC CEO Garry Tan 开源 GBrain 系统，通过构建可增长的 AI Agent 知识底座实现个人知识的持续积累与智能检索。", "source": "AI寒武纪 4月11日20时 <a href=\"https://mp.weixin.qq.com/s?__biz=Mzg3MTkxMjYzOA==&mid=2247513949&idx=1&sn=30e8a61a4f2fb0fb68f42b1df8aff848\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、GBrain 是解决 AI Agent 知识管理问题的开源系统</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、GBrain 定位为 AI Agent 的第二大脑和知识底座</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">核心定义</span><span class=\"point-val\">：将会议记录、邮件、推文、日历、语音通话、原始想法等全部汇入可检索知识库</span></div>\n<div class=\"point\"><span class=\"point-kw\">循环机制</span><span class=\"point-val\">：Agent 每次回答前先读取知识库，对话结束后再写入新内容，每轮对话都让系统更聪明</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、核心价值是实现知识的复利增长效应</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">持续积累</span><span class=\"point-val\">：无知识库时 Agent 每次从零开始，有知识库后每次在已有基础上累积</span></div>\n<div class=\"point\"><span class=\"point-kw\">实体关联</span><span class=\"point-val\">：人物建档、关联公司、打标签，形成可追踪的关系网络</span></div>\n<div class=\"point\"><span class=\"point-kw\">跨会话记忆</span><span class=\"point-val\">：不同话题提及同一实体时，Agent 已掌握完整背景和历史线索</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、GBrain 的技术架构采用\"已整理事实+时间线\"结构</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、页面结构遵循双重写入原则</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">已整理事实</span><span class=\"point-val\">：分隔线上方存放当前最佳理解，新证据出现时整体重写，作为答案输出</span></div>\n<div class=\"point\"><span class=\"point-kw\">时间线</span><span class=\"point-val\">：分隔线下方只追加、永不修改，保留完整证据链供回溯</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、搜索系统采用多查询扩展与混合检索融合</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Haiku 多查询</span><span class=\"point-val\">：使用 Claude Haiku 将问题改写成多种表达方式，覆盖用户未想到的表述</span></div>\n<div class=\"point\"><span class=\"point-kw\">混合搜索</span><span class=\"point-val\">：同时运行向量搜索（HNSW 余弦相似度）和关键词搜索（tsvector）</span></div>\n<div class=\"point\"><span class=\"point-kw\">RRF 融合</span><span class=\"point-val\">：使用 Reciprocal Rank Fusion 融合排名，兼顾精确匹配和语义理解</span></div>\n<div class=\"point\"><span class=\"point-kw\">四层去重</span><span class=\"point-val\">：每页只保留最优分块、相似度超 0.85 合并、类型多样性上限 60%、分块数量上限</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、GBrain 支持三种灵活的接入方式</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、作为独立命令行工具使用</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">全局安装</span><span class=\"point-val\">：安装后在终端直接使用 gbrain query 检索个人笔记</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、作为 MCP 服务器对接主流 AI 工具</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">支持客户端</span><span class=\"point-val\">：Claude Code、Cursor、Windsurf 等主流 AI 编程工具</span></div>\n<div class=\"point\"><span class=\"point-kw\">暴露工具</span><span class=\"point-val\">：提供 30 个 MCP 工具，包括 get_page、put_page、search、query、add_link、traverse_graph、sync_brain 等</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、部署为远程 MCP 服务器实现跨设备访问</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">边缘部署</span><span class=\"point-val\">：部署到 Supabase Edge Functions 后可从任何设备访问</span></div>\n<div class=\"point\"><span class=\"point-kw\">支持平台</span><span class=\"point-val\">：Claude Desktop、Perplexity、Cowork 等多种 AI 客户端</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、数据接入支持多种来源的自动化同步</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、内置四大集成方案实现数据自动化汇入</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Voice-to-Brain</span><span class=\"point-val\">：电话通话转知识库页面（需 Twilio + OpenAI Realtime）</span></div>\n<div class=\"point\"><span class=\"point-kw\">Email-to-Brain</span><span class=\"point-val\">：Gmail 邮件自动转为实体页面</span></div>\n<div class=\"point\"><span class=\"point-kw\">X-to-Brain</span><span class=\"point-val\">：推文及提及自动归档</span></div>\n<div class=\"point\"><span class=\"point-kw\">Calendar-to-Brain</span><span class=\"point-val\">：Google 日历事件同步</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、Agent 读取配置后自动引导用户完成 API 密钥配置</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">零配置启动</span><span class=\"point-val\">：gbrain init 默认使用 PGLite（WASM 嵌入式 Postgres 17.5）</span></div>\n<div class=\"point\"><span class=\"point-kw\">一键迁移</span><span class=\"point-val\">：规模超 1000 文件时，gbrain migrate --to supabase 一键迁移到托管服务</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、系统部署简单且成本可控</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、PGLite 方案无需任何服务器基础设施</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">无需依赖</span><span class=\"point-val\">：无需 Supabase 账号、Docker 或连接字符串</span></div>\n<div class=\"point\"><span class=\"point-kw\">完整功能</span><span class=\"point-val\">：一条命令获得完整 Postgres 知识库，含 pgvector、混合搜索和全部 37 个操作</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、规模化部署成本明确可预估</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">7500 页规模</span><span class=\"point-val\">：总存储约 750MB，其中嵌入向量 134MB、HNSW 索引 270MB</span></div>\n<div class=\"point\"><span class=\"point-kw\">初始成本</span><span class=\"point-val\">：使用 OpenAI text-embedding-3-large 初始嵌入成本约 4-5 美元</span></div>\n<div class=\"point\"><span class=\"point-kw\">托管费用</span><span class=\"point-val\">：Supabase Pro 版 25 美元/月（8GB）</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-21", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【Sam Altman家炸了】", "summary": "分析Sam Altman家被袭事件，揭示AI焦虑如何被算法和媒体系统性放大、制造恐慌并变现", "source": "傅盛 4月11日23时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5NjgzMzkwMQ==&mid=2653649990&idx=1&sn=c729c7ed2cd79626b19517658e62938f\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Sam Altman家遭袭击，Altman反思语言和叙事的力量</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、事件概述</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">袭击事件</span><span class=\"point-val\">：有人往Altman家扔燃烧弹，约一小时后同一人在OpenAI总部扬言烧楼后被捕，涉嫌谋杀未遂和纵火</span></div>\n<div class=\"point\"><span class=\"point-kw\">Altman回应</span><span class=\"point-val\">：事后发布孩子照片并写长文，希望能让下一个有此打算的人犹豫一下</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、核心反思</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">语言力量</span><span class=\"point-val\">：Altman承认\"我低估了语言和叙事的力量\"，认为社会对AI极度焦虑是袭击的深层原因</span></div>\n<div class=\"point\"><span class=\"point-kw\">焦虑合理性</span><span class=\"point-val\">：Altman承认AI浪潮可能是人类历史上规模最大的一次社会变革，有焦虑是人之常情</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、AI焦虑被系统性放大和变现</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、传播技巧</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">精准恐吓</span><span class=\"point-val\">：\"你会被取代\"比\"工作方式会改变\"传播力强得多，直接击中个人而非泛泛预测</span></div>\n<div class=\"point\"><span class=\"point-kw\">制造恐慌</span><span class=\"point-val\">：很多人把技术判断变成对准个人的恐吓，做流量、卖课、写标题，精准戳向最敏感处</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、信息环境运作机制</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">算法推送</span><span class=\"point-val\">：算法推让人停不下来的内容，恐惧最能吸引注意力和停留</span></div>\n<div class=\"point\"><span class=\"point-kw\">情绪放大</span><span class=\"point-val\">：从短视频到公众号到朋友圈，同一套恐惧逻辑在每个平台反复放大，\"不同声音\"实为同一情绪的变体</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、恐惧已成为一种被生产和变现的产品</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、利益链条</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">商业模式</span><span class=\"point-val\">：当恐惧被系统性放大、包装、变现，从情绪变成产品，有人靠它赚钱</span></div>\n<div class=\"point\"><span class=\"point-kw\">持续生产</span><span class=\"point-val\">：有人赚到钱就有人继续生产，形成\"生产更多、更准、更戳心的恐惧\"的循环</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、Altman的警示</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">共同责任</span><span class=\"point-val\">：燃烧瓶是20岁年轻人扔的，但\"火是很多人一起点的\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">认识差异</span><span class=\"point-val\">：Altman低估了语言力量，但有些人从未低估过这种力量</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-25", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【前同事被”炼化“蒸馏成了Skill之后我悄悄给自己的skill投了毒】", "summary": "探讨AI时代员工撰写Skill文档背后的知识萃取博弈，分析打工人如何应对及人类不可替代的核心能力。", "source": "留学生日报 4月11日20时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzA5NzIwMjQzMA==&mid=2650622351&idx=1&sn=e2541162bd38c4ccea4ab9b29468114d\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、\"同事.skill\"开源项目引发职场震动</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、AI蒸馏技术让离职同事\"赛博永生\"</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">GitHub开源项目</span><span class=\"point-val\">：\"同事.skill\"将离职员工的聊天记录、文档、邮件、PR评论等数据\"蒸馏\"成AI</span></div>\n<div class=\"point\"><span class=\"point-kw\">模仿能力</span><span class=\"point-val\">：该AI能模仿同事的思维方式、回答技术问题、甚至review代码</span></div>\n<div class=\"point\"><span class=\"point-kw\">技术圈热议</span><span class=\"point-val\">：人走了，茶没凉——AI替他在公司里继续\"发光发热\"</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、\"知识沉淀\"背后的温柔陷阱</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、公司强制要求员工撰写Skill文档</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">知识萃取</span><span class=\"point-val\">：要求员工把工作经验、决策逻辑、项目复盘全部写成可被AI理解的说明书</span></div>\n<div class=\"point\"><span class=\"point-kw\">生产力资产</span><span class=\"point-val\">：美其名曰\"知识沉淀\"，实则将个人核心竞争力打包上交</span></div>\n<div class=\"point\"><span class=\"point-kw\">不可替代性</span><span class=\"point-val\">：当经验被完全萃取后，员工的不可替代性大幅降低</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、反蒸馏：打工人的数字防身术</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">灌水策略</span><span class=\"point-val\">：有开发者创作\"反蒸馏Skill\"，将专业内容转化为废话连篇的合规版本</span></div>\n<div class=\"point\"><span class=\"point-kw\">表面合规</span><span class=\"point-val\">：字字正确、句句正确，但缺乏具体参数、操作标准和执行红线</span></div>\n<div class=\"point\"><span class=\"point-kw\">博弈本质</span><span class=\"point-val\">：在遵守规则的前提下，让规则变得毫无意义</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、效率的代价：你正在喂养替代品</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、经验归属权的根本矛盾</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">公司视角</span><span class=\"point-val\">：员工来来去去，知识资产必须沉淀，不能随人流失</span></div>\n<div class=\"point\"><span class=\"point-kw\">个人视角</span><span class=\"point-val\">：每写一份Skill，AI就学会一分判断逻辑，离失业更近一步</span></div>\n<div class=\"point\"><span class=\"point-kw\">军备竞赛</span><span class=\"point-val\">：员工学新东西→公司要求写新Skill→AI继续学习，这是一场无法取胜的循环</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、AI永远无法\"蒸馏\"的人类核心</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、真正的问题意识与本质质疑</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">判断力</span><span class=\"point-val\">：在无数次失败中锻炼出的决策直觉</span></div>\n<div class=\"point\"><span class=\"point-kw\">提问能力</span><span class=\"point-val\">：提出让所有人沉默的、直击本质的问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">质疑勇气</span><span class=\"point-val\">：敢于指出方向可能错了，敢于推翻过时的假设</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、最后的堡垒：真实世界的摔打经验</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">情境判断</span><span class=\"point-val\">：凌晨三点处理P0故障时，凭直觉在混乱日志中找到关键线索</span></div>\n<div class=\"point\"><span class=\"point-kw\">动机理解</span><span class=\"point-val\">：AI知道怎么写代码，但不知道\"为什么\"要写这段代码</span></div>\n<div class=\"point\"><span class=\"point-kw\">价值定位</span><span class=\"point-val\">：Skill只告诉你\"怎么做\"，永远无法告诉你\"为什么还要这么做\"</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、效率终极目的的反思与建议</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、知识沉淀需保留人类判断力</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">核心资产</span><span class=\"point-val\">：真正值得保护的，不是可文档化的操作技巧</span></div>\n<div class=\"point\"><span class=\"point-kw\">真正能力</span><span class=\"point-val\">：在失败中锻炼出的判断力、提问能力和质疑勇气</span></div>\n<div class=\"point\"><span class=\"point-kw\">讽刺事实</span><span class=\"point-val\">：最珍贵的资产，恰恰是那些无法被写成Skill的东西</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-28", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【Istio 引入多集群、环境模式及推理功能应对 AI 时代的不断发展】", "summary": "Istio 发布重大更新，支持多集群部署和 AI 推理路由，以适应 Kubernetes 上日益增长的 AI 工作负载需求。", "source": "AI前线 4月11日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzU1NDA4NjU2MA==&mid=2247660704&idx=2&sn=330a341bf84338f0362c48ea074a2f72\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Istio 发布 AI 导向的重大升级</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、核心更新内容</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">环境多集群支持</span><span class=\"point-val\">：将无 sidecar 的 ambient mode 扩展至多集群，实现跨区域和云服务商的统一流量、安全和可观测性管理</span></div>\n<div class=\"point\"><span class=\"point-kw\">网关 API 推理扩展</span><span class=\"point-val\">：将机器学习推理直接集成到服务网格流量流中，支持通过 Kubernetes 原生 API 管理 AI 推理请求</span></div>\n<div class=\"point\"><span class=\"point-kw\">智能体网关集成</span><span class=\"point-val\">：引入实验性数据平面，应对 AI 驱动的动态流量模式，特别是模型、智能体和服务交互日益复杂的环境</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、升级背景与市场需求</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、行业发展趋势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">AI 工作负载增长</span><span class=\"point-val\">：66% 的企业在 Kubernetes 上运行生成式 AI 工作负载，但仅有极少数能实现每日部署</span></div>\n<div class=\"point\"><span class=\"point-kw\">运维复杂性瓶颈</span><span class=\"point-val\">：运维复杂性是主要障碍，Istio 旨在通过简化服务网格采用来弥补这一不足</span></div>\n<div class=\"point\"><span class=\"point-kw\">平台工程责任</span><span class=\"point-val\">：平台工程团队在确保 AI 部署安全、可扩展方面承担越来越重要的责任</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、战略定位</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">基础设施基础层</span><span class=\"point-val\">：将 Istio 定位为下一代基础设施的基础层，嵌入 AI 感知型流量路由</span></div>\n<div class=\"point\"><span class=\"point-kw\">统一平台层</span><span class=\"point-val\">：减少对定制化工具和分散式架构的需求，构建统一的平台层</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、服务网格竞争格局</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、主要竞品对比</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Linkerd</span><span class=\"point-val\">：轻量级替代方案，优先考虑简单性、更低延迟和易用性，适合快速部署且开销最小的团队</span></div>\n<div class=\"point\"><span class=\"point-kw\">Consul</span><span class=\"point-val\">：强调多平台和混合云支持，可在 Kubernetes、虚拟机及其他运行时环境中提供服务网格功能</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、技术演进方向</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">无 sidecar 模型</span><span class=\"point-val\">：包括 Istio 的 ambient mode 和基于 eBPF 的网络架构（如 Cilium），致力于降低开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">平台级控制平面</span><span class=\"point-val\">：服务网格正从传统微服务基础设施演变为平台级控制平面，支持 AI 推理、多集群部署和基于策略的流量管理</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-33", "category": "【AI技术与应用】"}]}, {"category": "【企业商业与竞争】", "articles": [{"date": "2026-04-11", "title": "【李嘉诚400亿“世纪回归”地产见底了吗】", "summary": "李嘉诚携400亿港元重返房地产，结合成交回暖、政策宽松、供给收缩三大信号，释放市场见底信号。", "source": "虎嗅APP 4月11日17时 <a href=\"https://mp.weixin.qq.com/s?__biz=MTQzMjE1NjQwMQ==&mid=2656164618&idx=3&sn=22b005c3f1ec8072e701acf2a0d00577\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、李嘉诚\"周期之王\"归来，重返地产赛道</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、长实集团积极拿地，手握大量现金</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">400亿港元</span><span class=\"point-val\">：长实集团手握超400亿港元现金</span></div>\n<div class=\"point\"><span class=\"point-kw\">2.3%</span><span class=\"point-val\">：净负债率仅2.3%，财务状况极为稳健</span></div>\n<div class=\"point\"><span class=\"point-kw\">积极竞拍</span><span class=\"point-val\">：李泽钜表示只要回报合理，将积极参与香港新一轮9幅住宅用地竞拍</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、出售欧洲资产，低价布局中国核心地产</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">千亿港元</span><span class=\"point-val\">：出售英国电网公司UK Power Networks股权预计套现千亿港元</span></div>\n<div class=\"point\"><span class=\"point-kw\">跨市场套利</span><span class=\"point-val\">：将欧洲资产高位变现，以低价布局中国核心地产</span></div>\n<div class=\"point\"><span class=\"point-kw\">时机耐人寻味</span><span class=\"point-val\">：在财务模型里，当前土地和资产价格已进入\"合理回报区间\"</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、回望2013-2017年史诗级战略撤退</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">1700亿港元</span><span class=\"point-val\">：李氏家族累计套现超过1700亿港元</span></div>\n<div class=\"point\"><span class=\"point-kw\">402亿港元</span><span class=\"point-val\">：2017年以402亿港元出售香港中环中心，创全球写字楼成交纪录</span></div>\n<div class=\"point\"><span class=\"point-kw\">完美避寒</span><span class=\"point-val\">：抛售广州西城都荟、上海东方汇经中心、北京盈科中心等核心地标</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、市场见底的三大信号</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、成交量回暖，需求集中释放</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">117%</span><span class=\"point-val\">：3月20个重点城市二手房成交面积环比增长117%</span></div>\n<div class=\"point\"><span class=\"point-kw\">28.6%</span><span class=\"point-val\">：二手房成交面积同比增长28.6%</span></div>\n<div class=\"point\"><span class=\"point-kw\">89%</span><span class=\"point-val\">：新房成交面积环比增长89%</span></div>\n<div class=\"point\"><span class=\"point-kw\">成交放量</span><span class=\"point-val\">：北上广深四大一线及成都、西安、南京等强二线城市成交量创新高</span></div>\n<div class=\"point\"><span class=\"point-kw\">情绪修复</span><span class=\"point-val\">：压抑已久的刚性和改善性需求正在集中释放</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、政策与资金双重支撑</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">15%</span><span class=\"point-val\">：首套首付比例最低降至15%，二套降至20%</span></div>\n<div class=\"point\"><span class=\"point-kw\">2时代</span><span class=\"point-val\">：首套房贷利率已步入\"2时代\"，主流城市降至3%以下</span></div>\n<div class=\"point\"><span class=\"point-kw\">2.6%</span><span class=\"point-val\">：公积金贷款利率低至2.6%</span></div>\n<div class=\"point\"><span class=\"point-kw\">6000+项目</span><span class=\"point-val\">：全国超过6000个项目进入\"白名单\"，银行授信接近万亿元</span></div>\n<div class=\"point\"><span class=\"point-kw\">2.06%</span><span class=\"point-val\">：30个重点城市住宅租金回报率中位数达2.06%，超55%小区逾2%</span></div>\n<div class=\"point\"><span class=\"point-kw\">82%</span><span class=\"point-val\">：2026年1-3月外资大宗交易同比增长82%</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、供给端去化压力，去库存接近尾声</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">-74%</span><span class=\"point-val\">：新开工面积较巅峰期下降74%，回落至2004年水平</span></div>\n<div class=\"point\"><span class=\"point-kw\">-17.2%</span><span class=\"point-val\">：2025年全国房地产开发投资同比下降17.2%，较2021年高点\"腰斩\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">-39%</span><span class=\"point-val\">：二手房价格较最高点回落约39%，已超过多数国家房地产危机调整深度</span></div>\n<div class=\"point\"><span class=\"point-kw\">0.05%</span><span class=\"point-val\">：待售面积同比增速仅为0.05%，为2021年7月以来最低</span></div>\n<div class=\"point\"><span class=\"point-kw\">12-16个月</span><span class=\"point-val\">：核心城市去化周期已降至12-16个月的合理区间</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、专家观点存在分歧</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、乐观派认为2026年将确认底部</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">50亿平方米</span><span class=\"point-val\">：住建部数据显示\"十五五\"期间全国城镇住房需求还有将近50亿平方米增量空间</span></div>\n<div class=\"point\"><span class=\"point-kw\">供求平衡</span><span class=\"point-val\">：供给端极度\"休克\"正在强制推动供求关系回归平衡</span></div>\n<div class=\"point\"><span class=\"point-kw\">历史规律</span><span class=\"point-val\">：\"量先于价\"修复模式符合房地产市场历史周期规律</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、谨慎派仍持观望态度</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">分化明显</span><span class=\"point-val\">：价格端仍处于深度调整区间，四大一线城市房价均已回落至2016年水平</span></div>\n<div class=\"point\"><span class=\"point-kw\">漫长过程</span><span class=\"point-val\">：日本泡沫破裂后经历成交量先行回暖、价格逐步企稳的漫长过程</span></div>\n<div class=\"point\"><span class=\"point-kw\">底部信号</span><span class=\"point-val\">：成交量是市场情绪晴雨表，价格是最终确认底部的标志</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-46", "category": "【企业商业与竞争】"}]}, {"category": "【前沿科技与民生】", "articles": [{"date": "2026-04-11", "title": "【这是星际穿越之后最好的科幻片吗】", "summary": "《挽救计划》被称为《星际穿越》之后最佳科幻片，以软科幻手法和至善外星角色洛基感动观众。", "source": "虎嗅APP 4月11日21时 <a href=\"https://mp.weixin.qq.com/s?__biz=MTQzMjE1NjQwMQ==&mid=2656164683&idx=2&sn=46c3887ef2de7c41a9725e5ba4771f14\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、《挽救计划》被誉为《星际穿越》后最佳科幻片</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、软科幻定位</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">软科幻</span><span class=\"point-val\">：区别于《星际穿越》的硬科幻，选择一软到底，带有动画片的纯真气质</span></div>\n<div class=\"point\"><span class=\"point-kw\">《星际穿越》对比</span><span class=\"point-val\">：距离上映已过去11年，两部片风格定位完全不同但常被比较</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、票房成绩</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">美国票房大捷</span><span class=\"point-val\">：近十年\"非续集/非系列\"电影开画成绩第二，仅次于《奥本海默》</span></div>\n<div class=\"point\"><span class=\"point-kw\">中国票房一般</span><span class=\"point-val\">：仅突破两亿，译名\"挽救计划\"被指隔靴搔痒</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、电影改编自安迪·威尔原著</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、故事背景</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">太阳危机</span><span class=\"point-val\">：虚构微生物\"噬菌体\"(astrophage)感染太阳，吞噬能量，若不阻止地球将进入冰河期</span></div>\n<div class=\"point\"><span class=\"point-kw\">万福玛利亚号</span><span class=\"point-val\">：名字源自宗教术语与橄榄球战术，意为\"走投无路时反败为胜\"</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、任务设定</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">单程票</span><span class=\"point-val\">：飞船燃料只够前往未被感染的恒星\"天仓五\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">解药运送</span><span class=\"point-val\">：找到\"τ星虫\"后通过\"甲壳虫\"无人机将解药送回地球</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、外星角色洛基成为电影最大亮点</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、外形设计</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">行走的大石头</span><span class=\"point-val\">：来自波江座，五条腿五只手，呈正五边形对称，大小如拉布拉多犬</span></div>\n<div class=\"point\"><span class=\"point-kw\">百老汇木偶师</span><span class=\"point-val\">：詹姆斯·奥尔蒂斯是洛基操作者和配音，高斯林对着木偶对戏而非绿幕</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、跨物种沟通</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">声波\"看\"世界</span><span class=\"point-val\">：波江座外星人用被动声呐，通过环境声波解析图像来\"看\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">语言学习系统</span><span class=\"point-val\">：格雷斯为外星语言编写字典，实现指数级增长的跨物种对话</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、至善至纯的情感</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">以命换命</span><span class=\"point-val\">：洛基靠氨气生存，氧气对其致命，为救格雷斯融化自己</span></div>\n<div class=\"point\"><span class=\"point-kw\">观察文化</span><span class=\"point-val\">：波江座有观察他人睡觉寻求安全感的风俗，洛基与其他伙伴在辐射中牺牲</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、电影贡献独特女性角色</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、斯特拉特角色</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">桑德拉·惠勒饰演</span><span class=\"point-val\">：万福玛利亚计划总负责人，拯救全人类的大统领</span></div>\n<div class=\"point\"><span class=\"point-kw\">形象突破</span><span class=\"point-val\">：留着温暖金发，穿着自然舒展，却承担全地球最沉重责任</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、电影主题与反响</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、主题探讨</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">\"黑暗森林\"反面</span><span class=\"point-val\">：洛基代表刘慈欣\"黑暗森林\"法则的对立面，展现跨物种至善</span></div>\n<div class=\"point\"><span class=\"point-kw\">人类想象极致</span><span class=\"point-val\">：在外星石头上看到最宝贵的人性之光，唤起《雪孩子》般的PTSD</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、观众反响</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">童年幻想实现</span><span class=\"point-val\">：洛基成为观众太空伙伴的样子，竖拇指、碰拳等细节让观众无法抵抗</span></div>\n<div class=\"point\"><span class=\"point-kw\">宇航员观看</span><span class=\"point-val\">：执行月球任务的\"阿尔忒弥斯二号\"宇航员也在前往月球前观看此片</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-51", "category": "【前沿科技与民生】"}, {"date": "2026-04-11", "title": "【那些35岁以上的码农们都干啥去了】", "summary": "大厂程序员35岁后不足一成晋升技术管理，大部分被\"输送\"到社会或降级去小公司。", "source": "虎嗅APP 4月11日21时 <a href=\"https://mp.weixin.qq.com/s?__biz=MTQzMjE1NjQwMQ==&mid=2656164683&idx=1&sn=a5b43c28b780c47e9ab70ac5252a2b55\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、雇主对35岁以上员工敏感的原因</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、用人成本与性价比考量</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">老员工成本高</span><span class=\"point-val\">：大厂认为35岁以上员工薪资高、精力分散，性价比不如年轻人</span></div>\n<div class=\"point\"><span class=\"point-kw\">防止不可替代</span><span class=\"point-val\">：大厂故意将岗位切碎，避免员工变得不可替代，用高强度工作量做筛选</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、国内人力市场供需特点</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">年轻人才充沛</span><span class=\"point-val\">：每年新毕业学生厉害、激情高、学习快，能带动团队气质</span></div>\n<div class=\"point\"><span class=\"point-kw\">思维不设限</span><span class=\"point-val\">：年轻人没有经验束缚，敢于尝试老员工觉得\"不能干\"的事</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、十年后一小部分人晋升成功</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、技术路线晋升为高阶专家</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">收入水平</span><span class=\"point-val\">：七八十万到150万，头部可达两百万，但跳槽到小公司工资打三到五折</span></div>\n<div class=\"point\"><span class=\"point-kw\">工作内容</span><span class=\"point-val\">：极少写代码，主要做方案设计、技术沟通协调，让基层码农执行</span></div>\n<div class=\"point\"><span class=\"point-kw\">晋升因素</span><span class=\"point-val\">：技术实力是基础，但运气成分很大，需碰上好领导、好项目</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、管理路线晋升为管理岗</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">晋升难度</span><span class=\"point-val\">：比技术路线容易一些，但更依赖天赋和人际关系能力</span></div>\n<div class=\"point\"><span class=\"point-kw\">核心要求</span><span class=\"point-val\">：需跟对领导，一旦领导出事，管理岗处境尴尬，容易进\"资源池\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">风险因素</span><span class=\"point-val\">：碰上烂项目可能直接导致职业生涯受损</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、大部分人被\"输送\"到社会</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、离职原因多元化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">身体透支</span><span class=\"point-val\">：996工作制加两三小时通勤，导致高血压、脂肪肝等健康问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">发展受阻</span><span class=\"point-val\">：被边缘化、低绩效、领导离职等因素导致主动离开</span></div>\n<div class=\"point\"><span class=\"point-kw\">心理成本</span><span class=\"point-val\">：曾经的\"县城骄傲\"不愿在没意义的岗位耗时间</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、小公司是主要去向</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">收入打折</span><span class=\"point-val\">：大厂技术栈封闭，出来后积累打折扣，需接受降薪</span></div>\n<div class=\"point\"><span class=\"point-kw\">技术荒废</span><span class=\"point-val\">：螺丝钉岗位导致技术能力退化，高阶技术只能从项目实战中练出</span></div>\n<div class=\"point\"><span class=\"point-kw\">适应关键</span><span class=\"point-val\">：需快速证明能力，否则连续换工作后光环全失</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、核心结论与启示</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、统计数据揭示残酷现实</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">九成淘汰率</span><span class=\"point-val\">：90%的程序员35岁左右会被\"作为优秀人才输送到社会\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">平台数据失真</span><span class=\"point-val\">：招聘平台数据不准确，35岁以上主要靠熟人推荐找工作</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、个体选择的分化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">持续热爱</span><span class=\"point-val\">：对技术有热情的人，在小公司一两年后能重新站稳</span></div>\n<div class=\"point\"><span class=\"point-kw\">路径依赖</span><span class=\"point-val\">：进厂后选择非技术岗位者，进一步弱化竞争力</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-52", "category": "【前沿科技与民生】"}]}], "articles": [{"date": "2026-04-11", "title": "【中国具身模型狂揽全球第一机器人的人类数据时代来了】", "summary": "中国00后创业公司灵初智能发布10万小时人类操作数据集，Psi-R2模型登顶MolmoSpace全球具身智能评测榜首", "source": "量子位 4月11日9时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247882420&idx=1&sn=e7c8d3fed818e3c7230514ef277860ad\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、灵初智能发布10万+小时大规模人类操作数据集</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、数据集规模和组成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">10万小时</span><span class=\"point-val\">：总数据量，包括真机数据5417小时和人类数据95472小时</span></div>\n<div class=\"point\"><span class=\"point-kw\">1000小时已开源</span><span class=\"point-val\">：，年底将扩展至百万量级</span></div>\n<div class=\"point\"><span class=\"point-kw\">覆盖规模</span><span class=\"point-val\">：294种场景、4821种任务、1382种物体</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、数据采集方式</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">外骨骼手套</span><span class=\"point-val\">：自研设备采集精准手部动作数据</span></div>\n<div class=\"point\"><span class=\"point-kw\">触觉数据</span><span class=\"point-val\">：收集成本仅为机器人数据的1/10以下</span></div>\n<div class=\"point\"><span class=\"point-kw\">多模态采集</span><span class=\"point-val\">：包含手部操作视频、触觉信号、3D位姿追踪</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、Psi-R2模型登顶全球具身智能评测榜首</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、MolmoSpace榜单表现</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">全球第一</span><span class=\"point-val\">：超越PI、DreamZero等国际知名模型</span></div>\n<div class=\"point\"><span class=\"point-kw\">10倍提升</span><span class=\"point-val\">：成功率比同类VLA模型高出近10倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">权威评测</span><span class=\"point-val\">：美国艾伦人工智能研究所（AllenAI）发起的全球具身智能基准平台</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、技术架构创新</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Psi-R2</span><span class=\"point-val\">：世界行动模型（WAM），输入图像和语言指令，输出预测视频和动作</span></div>\n<div class=\"point\"><span class=\"point-kw\">Psi-W0</span><span class=\"point-val\">：数据质量审查系统，辅助自动标注和质量检测</span></div>\n<div class=\"point\"><span class=\"point-kw\">训练骨干</span><span class=\"point-val\">：采用Wan2.2-IT2V-5B-480P预训练网络</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、人类数据训练方法论</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、数据融合策略</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Raw Data In, Raw Data Out</span><span class=\"point-val\">：舍弃人工复杂处理，直接进行运动学对齐</span></div>\n<div class=\"point\"><span class=\"point-kw\">Auto Labeling</span><span class=\"point-val\">：自动标注替代人工，模型自行探索海量数据</span></div>\n<div class=\"point\"><span class=\"point-kw\">embodiment gap补偿</span><span class=\"point-val\">：触觉数据有效弥补人机动力学差异</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、数据质量核心因素</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">信噪比决定效果</span><span class=\"point-val\">：低信噪比数据甚至起反作用</span></div>\n<div class=\"point\"><span class=\"point-kw\">任务多样性优先</span><span class=\"point-val\">：操作任务多样性>物体多样性>>场景多样性</span></div>\n<div class=\"point\"><span class=\"point-kw\">3D位姿关键</span><span class=\"point-val\">：精准3D位姿>>触觉模态>2D图像特征</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、具身智能商业化前景</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、成本效益优势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">学习人类SOP</span><span class=\"point-val\">：机器人抢先掌握商业验证的标准作业流程</span></div>\n<div class=\"point\"><span class=\"point-kw\">低成本微调</span><span class=\"point-val\">：预训练后仅需不到100条真机轨迹即可完成微调</span></div>\n<div class=\"point\"><span class=\"point-kw\">触觉成本</span><span class=\"point-val\">：人类触觉数据收集成本是机器人的1/10以下</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、性能提升表现</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">高节拍操作</span><span class=\"point-val\">：速度可达1200，超过遥操作的800</span></div>\n<div class=\"point\"><span class=\"point-kw\">泛化能力</span><span class=\"point-val\">：预训练阶段见过更多任务和对象，接手新任务更快</span></div>\n<div class=\"point\"><span class=\"point-kw\">精度保障</span><span class=\"point-val\">：精准采集数据与粗糙泛化数据相互补充</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-4", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【重磅开源240亿参数力压Nano Banana 2】", "summary": "京东开源240亿参数的JoyAI-Image-Edit图像模型，首创\"空间智能\"架构，实现理解、生成、编辑闭环协作，突破传统图像AI不懂空间的瓶颈。", "source": "新智元 4月11日12时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzI3MTA0MTk1MA==&mid=2652691208&idx=1&sn=8ef0638fe63ada3a7277b5f22e1e4f5d\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、图像AI面临\"空间理解\"瓶颈</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、现有模型的局限性</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">平面裱糊匠</span><span class=\"point-val\">：现有图像AI擅长生成惊艳像素，但无法理解空间关系</span></div>\n<div class=\"point\"><span class=\"point-kw\">透视崩塌</span><span class=\"point-val\">：改变视角时出现沙发漂浮、物体穿墙等错误</span></div>\n<div class=\"point\"><span class=\"point-kw\">遮挡错乱</span><span class=\"point-val\">：调整物体前后顺序时比例失衡、关系混乱</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、核心问题本质</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">懂画不懂空间</span><span class=\"point-val\">：能生成好看图像，但不理解立体世界的前后、深度、光影逻辑</span></div>\n<div class=\"point\"><span class=\"point-kw\">理解与生成割裂</span><span class=\"point-val\">：过去的模型理解归理解、生成归生成，两者各行其是</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、JoyAI-Image-Edit技术架构</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、模型规模与组成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">80亿参数MLLM</span><span class=\"point-val\">：多模态语言模型，负责空间意图解析与指令理解</span></div>\n<div class=\"point\"><span class=\"point-kw\">160亿参数MMDiT</span><span class=\"point-val\">：多模态扩散Transformer，负责图像生成与编辑</span></div>\n<div class=\"point\"><span class=\"point-kw\">240亿参数总量</span><span class=\"point-val\">：两者耦合形成统一架构</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、空间智能闭环设计</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">理解-生成-编辑闭环</span><span class=\"point-val\">：三者协作互助，形成真正的智能闭环</span></div>\n<div class=\"point\"><span class=\"point-kw\">空间意图贯穿</span><span class=\"point-val\">：从指令解析到图像生成全程保持空间一致性</span></div>\n<div class=\"point\"><span class=\"point-kw\">可扩展数据流水线</span><span class=\"point-val\">：包含OpenSpatial空间理解数据、长文本渲染数据、SpatialEdit编辑数据</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、开源协议与生态支持</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Apache 2.0协议</span><span class=\"point-val\">：完全开源，可商业使用</span></div>\n<div class=\"point\"><span class=\"point-kw\">ComfyUI支持</span><span class=\"point-val\">：已完成集成</span></div>\n<div class=\"point\"><span class=\"point-kw\">Diffusers格式兼容</span><span class=\"point-val\">：方便灵活部署与二次开发</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、三大空间编辑核心能力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、相机控制</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">自然语言指令控制</span><span class=\"point-val\">：可用大白话指挥相机移动角度、俯仰、缩放</span></div>\n<div class=\"point\"><span class=\"point-kw\">几何一致性保持</span><span class=\"point-val\">：透视关系、遮挡关系、光影关系全部正确</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、物体旋转与空间漫游</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">连续视角移动</span><span class=\"point-val\">：生成逻辑连贯的多视角图像序列</span></div>\n<div class=\"point\"><span class=\"point-kw\">虚拟相机体验</span><span class=\"point-val\">：如同在三维场景中真实走动</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、物体空间关系操控</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">任意物体操作</span><span class=\"point-val\">：挪动、旋转、缩放均不影响整体场景结构</span></div>\n<div class=\"point\"><span class=\"point-kw\">自然遮挡与光影</span><span class=\"point-val\">：无变形、错位、比例失衡问题</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、性能横评领先</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、与竞品对比优势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Nano Banana Pro</span><span class=\"point-val\">：忠实执行相机运动能力更胜一筹</span></div>\n<div class=\"point\"><span class=\"point-kw\">Qwen-Image-Edit</span><span class=\"point-val\">：合成视角的诊断性和高保真度更优</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、核心价值定位</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">高保真新视角</span><span class=\"point-val\">：生成的新视角能有效消除复杂空间关系的歧义</span></div>\n<div class=\"point\"><span class=\"point-kw\">生产级可用</span><span class=\"point-val\">：真正对得准，适用于真实生产和应用环境</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-8", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【刘壮陈丹琦新作开源通用视觉推理RL框架0思考数据刷新SOTA】", "summary": "普林斯顿大学开源Vero视觉推理框架，基于60万样本数据集和任务路由奖励机制，零思考数据刷新SOTA", "source": "量子位 4月11日9时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247882420&idx=2&sn=f341ba942885c69e34e63bf80b8ba655\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Vero框架的核心技术创新</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1. Vero-600K多样化训练数据集</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">数据规模</span><span class=\"point-val\">：从59个数据集中精选60万高质量样本</span></div>\n<div class=\"point\"><span class=\"point-kw\">任务覆盖</span><span class=\"point-val\">：涵盖图表OCR、STEM、空间动作、知识识别、定位计数、描述指令六类</span></div>\n<div class=\"point\"><span class=\"point-kw\">泛化优势</span><span class=\"point-val\">：均衡数据训练可避免单一任务训练的能力退化</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2. 任务路由奖励机制</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">多路验证</span><span class=\"point-val\">：根据任务类型自动路由至相应验证器</span></div>\n<div class=\"point\"><span class=\"point-kw\">格式适配</span><span class=\"point-val\">：选择题验证选项正确性、数学题数学校验、开放题引入LLM评判</span></div>\n<div class=\"point\"><span class=\"point-kw\">差异化奖励</span><span class=\"point-val\">：针对不同答案格式设计针对性评分标准</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、实验结果验证框架有效性</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1. SOTA性能表现</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">基准测试</span><span class=\"point-val\">：30项测试中23项超越Qwen3-VL-8B-Thinking</span></div>\n<div class=\"point\"><span class=\"point-kw\">零思考数据</span><span class=\"point-val\">：未引入任何私有思考数据即达最优效果</span></div>\n<div class=\"point\"><span class=\"point-kw\">核心发现</span><span class=\"point-val\">：广泛数据覆盖是视觉推理RL Scaling的主要驱动力</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2. 单阶段强化学习方案</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">方法优势</span><span class=\"point-val\">：无需复杂私有数据，仅凭高质量数据过滤+均衡任务混合+精确路由奖励</span></div>\n<div class=\"point\"><span class=\"point-kw\">泛化能力</span><span class=\"point-val\">：可激发基础模型通用视觉推理能力</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、研究团队与开源贡献</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1. 团队构成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">刘壮</span><span class=\"point-val\">：项目负责人，普林斯顿CS助理教授，ConvNeXt作者，DenseNet最佳论文奖得主</span></div>\n<div class=\"point\"><span class=\"point-kw\">陈丹琦</span><span class=\"point-val\">：PLI副主任，参与作者</span></div>\n<div class=\"point\"><span class=\"point-kw\">Gabriel Sarch</span><span class=\"point-val\">：CMU博士，PLI博士后研究员</span></div>\n<div class=\"point\"><span class=\"point-kw\">Linrong Cai</span><span class=\"point-val\">：普林斯顿CS硕士生</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2. 开源资源</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">代码开源</span><span class=\"point-val\">：所有数据、代码、模型均已开源至https://vero-reasoning.github.io/</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-16", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【YC CEO把自己第二大脑系统开源了专供OpenClaw与Hermes全息记忆打造迷你AGI】", "summary": "YC CEO Garry Tan 开源 GBrain 系统，通过构建可增长的 AI Agent 知识底座实现个人知识的持续积累与智能检索。", "source": "AI寒武纪 4月11日20时 <a href=\"https://mp.weixin.qq.com/s?__biz=Mzg3MTkxMjYzOA==&mid=2247513949&idx=1&sn=30e8a61a4f2fb0fb68f42b1df8aff848\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、GBrain 是解决 AI Agent 知识管理问题的开源系统</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、GBrain 定位为 AI Agent 的第二大脑和知识底座</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">核心定义</span><span class=\"point-val\">：将会议记录、邮件、推文、日历、语音通话、原始想法等全部汇入可检索知识库</span></div>\n<div class=\"point\"><span class=\"point-kw\">循环机制</span><span class=\"point-val\">：Agent 每次回答前先读取知识库，对话结束后再写入新内容，每轮对话都让系统更聪明</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、核心价值是实现知识的复利增长效应</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">持续积累</span><span class=\"point-val\">：无知识库时 Agent 每次从零开始，有知识库后每次在已有基础上累积</span></div>\n<div class=\"point\"><span class=\"point-kw\">实体关联</span><span class=\"point-val\">：人物建档、关联公司、打标签，形成可追踪的关系网络</span></div>\n<div class=\"point\"><span class=\"point-kw\">跨会话记忆</span><span class=\"point-val\">：不同话题提及同一实体时，Agent 已掌握完整背景和历史线索</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、GBrain 的技术架构采用\"已整理事实+时间线\"结构</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、页面结构遵循双重写入原则</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">已整理事实</span><span class=\"point-val\">：分隔线上方存放当前最佳理解，新证据出现时整体重写，作为答案输出</span></div>\n<div class=\"point\"><span class=\"point-kw\">时间线</span><span class=\"point-val\">：分隔线下方只追加、永不修改，保留完整证据链供回溯</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、搜索系统采用多查询扩展与混合检索融合</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Haiku 多查询</span><span class=\"point-val\">：使用 Claude Haiku 将问题改写成多种表达方式，覆盖用户未想到的表述</span></div>\n<div class=\"point\"><span class=\"point-kw\">混合搜索</span><span class=\"point-val\">：同时运行向量搜索（HNSW 余弦相似度）和关键词搜索（tsvector）</span></div>\n<div class=\"point\"><span class=\"point-kw\">RRF 融合</span><span class=\"point-val\">：使用 Reciprocal Rank Fusion 融合排名，兼顾精确匹配和语义理解</span></div>\n<div class=\"point\"><span class=\"point-kw\">四层去重</span><span class=\"point-val\">：每页只保留最优分块、相似度超 0.85 合并、类型多样性上限 60%、分块数量上限</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、GBrain 支持三种灵活的接入方式</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、作为独立命令行工具使用</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">全局安装</span><span class=\"point-val\">：安装后在终端直接使用 gbrain query 检索个人笔记</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、作为 MCP 服务器对接主流 AI 工具</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">支持客户端</span><span class=\"point-val\">：Claude Code、Cursor、Windsurf 等主流 AI 编程工具</span></div>\n<div class=\"point\"><span class=\"point-kw\">暴露工具</span><span class=\"point-val\">：提供 30 个 MCP 工具，包括 get_page、put_page、search、query、add_link、traverse_graph、sync_brain 等</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、部署为远程 MCP 服务器实现跨设备访问</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">边缘部署</span><span class=\"point-val\">：部署到 Supabase Edge Functions 后可从任何设备访问</span></div>\n<div class=\"point\"><span class=\"point-kw\">支持平台</span><span class=\"point-val\">：Claude Desktop、Perplexity、Cowork 等多种 AI 客户端</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、数据接入支持多种来源的自动化同步</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、内置四大集成方案实现数据自动化汇入</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Voice-to-Brain</span><span class=\"point-val\">：电话通话转知识库页面（需 Twilio + OpenAI Realtime）</span></div>\n<div class=\"point\"><span class=\"point-kw\">Email-to-Brain</span><span class=\"point-val\">：Gmail 邮件自动转为实体页面</span></div>\n<div class=\"point\"><span class=\"point-kw\">X-to-Brain</span><span class=\"point-val\">：推文及提及自动归档</span></div>\n<div class=\"point\"><span class=\"point-kw\">Calendar-to-Brain</span><span class=\"point-val\">：Google 日历事件同步</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、Agent 读取配置后自动引导用户完成 API 密钥配置</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">零配置启动</span><span class=\"point-val\">：gbrain init 默认使用 PGLite（WASM 嵌入式 Postgres 17.5）</span></div>\n<div class=\"point\"><span class=\"point-kw\">一键迁移</span><span class=\"point-val\">：规模超 1000 文件时，gbrain migrate --to supabase 一键迁移到托管服务</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、系统部署简单且成本可控</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、PGLite 方案无需任何服务器基础设施</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">无需依赖</span><span class=\"point-val\">：无需 Supabase 账号、Docker 或连接字符串</span></div>\n<div class=\"point\"><span class=\"point-kw\">完整功能</span><span class=\"point-val\">：一条命令获得完整 Postgres 知识库，含 pgvector、混合搜索和全部 37 个操作</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、规模化部署成本明确可预估</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">7500 页规模</span><span class=\"point-val\">：总存储约 750MB，其中嵌入向量 134MB、HNSW 索引 270MB</span></div>\n<div class=\"point\"><span class=\"point-kw\">初始成本</span><span class=\"point-val\">：使用 OpenAI text-embedding-3-large 初始嵌入成本约 4-5 美元</span></div>\n<div class=\"point\"><span class=\"point-kw\">托管费用</span><span class=\"point-val\">：Supabase Pro 版 25 美元/月（8GB）</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-21", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【Sam Altman家炸了】", "summary": "分析Sam Altman家被袭事件，揭示AI焦虑如何被算法和媒体系统性放大、制造恐慌并变现", "source": "傅盛 4月11日23时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5NjgzMzkwMQ==&mid=2653649990&idx=1&sn=c729c7ed2cd79626b19517658e62938f\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Sam Altman家遭袭击，Altman反思语言和叙事的力量</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、事件概述</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">袭击事件</span><span class=\"point-val\">：有人往Altman家扔燃烧弹，约一小时后同一人在OpenAI总部扬言烧楼后被捕，涉嫌谋杀未遂和纵火</span></div>\n<div class=\"point\"><span class=\"point-kw\">Altman回应</span><span class=\"point-val\">：事后发布孩子照片并写长文，希望能让下一个有此打算的人犹豫一下</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、核心反思</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">语言力量</span><span class=\"point-val\">：Altman承认\"我低估了语言和叙事的力量\"，认为社会对AI极度焦虑是袭击的深层原因</span></div>\n<div class=\"point\"><span class=\"point-kw\">焦虑合理性</span><span class=\"point-val\">：Altman承认AI浪潮可能是人类历史上规模最大的一次社会变革，有焦虑是人之常情</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、AI焦虑被系统性放大和变现</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、传播技巧</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">精准恐吓</span><span class=\"point-val\">：\"你会被取代\"比\"工作方式会改变\"传播力强得多，直接击中个人而非泛泛预测</span></div>\n<div class=\"point\"><span class=\"point-kw\">制造恐慌</span><span class=\"point-val\">：很多人把技术判断变成对准个人的恐吓，做流量、卖课、写标题，精准戳向最敏感处</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、信息环境运作机制</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">算法推送</span><span class=\"point-val\">：算法推让人停不下来的内容，恐惧最能吸引注意力和停留</span></div>\n<div class=\"point\"><span class=\"point-kw\">情绪放大</span><span class=\"point-val\">：从短视频到公众号到朋友圈，同一套恐惧逻辑在每个平台反复放大，\"不同声音\"实为同一情绪的变体</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、恐惧已成为一种被生产和变现的产品</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、利益链条</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">商业模式</span><span class=\"point-val\">：当恐惧被系统性放大、包装、变现，从情绪变成产品，有人靠它赚钱</span></div>\n<div class=\"point\"><span class=\"point-kw\">持续生产</span><span class=\"point-val\">：有人赚到钱就有人继续生产，形成\"生产更多、更准、更戳心的恐惧\"的循环</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、Altman的警示</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">共同责任</span><span class=\"point-val\">：燃烧瓶是20岁年轻人扔的，但\"火是很多人一起点的\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">认识差异</span><span class=\"point-val\">：Altman低估了语言力量，但有些人从未低估过这种力量</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-25", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【前同事被”炼化“蒸馏成了Skill之后我悄悄给自己的skill投了毒】", "summary": "探讨AI时代员工撰写Skill文档背后的知识萃取博弈，分析打工人如何应对及人类不可替代的核心能力。", "source": "留学生日报 4月11日20时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzA5NzIwMjQzMA==&mid=2650622351&idx=1&sn=e2541162bd38c4ccea4ab9b29468114d\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、\"同事.skill\"开源项目引发职场震动</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、AI蒸馏技术让离职同事\"赛博永生\"</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">GitHub开源项目</span><span class=\"point-val\">：\"同事.skill\"将离职员工的聊天记录、文档、邮件、PR评论等数据\"蒸馏\"成AI</span></div>\n<div class=\"point\"><span class=\"point-kw\">模仿能力</span><span class=\"point-val\">：该AI能模仿同事的思维方式、回答技术问题、甚至review代码</span></div>\n<div class=\"point\"><span class=\"point-kw\">技术圈热议</span><span class=\"point-val\">：人走了，茶没凉——AI替他在公司里继续\"发光发热\"</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、\"知识沉淀\"背后的温柔陷阱</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、公司强制要求员工撰写Skill文档</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">知识萃取</span><span class=\"point-val\">：要求员工把工作经验、决策逻辑、项目复盘全部写成可被AI理解的说明书</span></div>\n<div class=\"point\"><span class=\"point-kw\">生产力资产</span><span class=\"point-val\">：美其名曰\"知识沉淀\"，实则将个人核心竞争力打包上交</span></div>\n<div class=\"point\"><span class=\"point-kw\">不可替代性</span><span class=\"point-val\">：当经验被完全萃取后，员工的不可替代性大幅降低</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、反蒸馏：打工人的数字防身术</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">灌水策略</span><span class=\"point-val\">：有开发者创作\"反蒸馏Skill\"，将专业内容转化为废话连篇的合规版本</span></div>\n<div class=\"point\"><span class=\"point-kw\">表面合规</span><span class=\"point-val\">：字字正确、句句正确，但缺乏具体参数、操作标准和执行红线</span></div>\n<div class=\"point\"><span class=\"point-kw\">博弈本质</span><span class=\"point-val\">：在遵守规则的前提下，让规则变得毫无意义</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、效率的代价：你正在喂养替代品</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、经验归属权的根本矛盾</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">公司视角</span><span class=\"point-val\">：员工来来去去，知识资产必须沉淀，不能随人流失</span></div>\n<div class=\"point\"><span class=\"point-kw\">个人视角</span><span class=\"point-val\">：每写一份Skill，AI就学会一分判断逻辑，离失业更近一步</span></div>\n<div class=\"point\"><span class=\"point-kw\">军备竞赛</span><span class=\"point-val\">：员工学新东西→公司要求写新Skill→AI继续学习，这是一场无法取胜的循环</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、AI永远无法\"蒸馏\"的人类核心</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、真正的问题意识与本质质疑</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">判断力</span><span class=\"point-val\">：在无数次失败中锻炼出的决策直觉</span></div>\n<div class=\"point\"><span class=\"point-kw\">提问能力</span><span class=\"point-val\">：提出让所有人沉默的、直击本质的问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">质疑勇气</span><span class=\"point-val\">：敢于指出方向可能错了，敢于推翻过时的假设</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、最后的堡垒：真实世界的摔打经验</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">情境判断</span><span class=\"point-val\">：凌晨三点处理P0故障时，凭直觉在混乱日志中找到关键线索</span></div>\n<div class=\"point\"><span class=\"point-kw\">动机理解</span><span class=\"point-val\">：AI知道怎么写代码，但不知道\"为什么\"要写这段代码</span></div>\n<div class=\"point\"><span class=\"point-kw\">价值定位</span><span class=\"point-val\">：Skill只告诉你\"怎么做\"，永远无法告诉你\"为什么还要这么做\"</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">五、效率终极目的的反思与建议</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、知识沉淀需保留人类判断力</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">核心资产</span><span class=\"point-val\">：真正值得保护的，不是可文档化的操作技巧</span></div>\n<div class=\"point\"><span class=\"point-kw\">真正能力</span><span class=\"point-val\">：在失败中锻炼出的判断力、提问能力和质疑勇气</span></div>\n<div class=\"point\"><span class=\"point-kw\">讽刺事实</span><span class=\"point-val\">：最珍贵的资产，恰恰是那些无法被写成Skill的东西</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-28", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【Istio 引入多集群、环境模式及推理功能应对 AI 时代的不断发展】", "summary": "Istio 发布重大更新，支持多集群部署和 AI 推理路由，以适应 Kubernetes 上日益增长的 AI 工作负载需求。", "source": "AI前线 4月11日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzU1NDA4NjU2MA==&mid=2247660704&idx=2&sn=330a341bf84338f0362c48ea074a2f72\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Istio 发布 AI 导向的重大升级</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、核心更新内容</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">环境多集群支持</span><span class=\"point-val\">：将无 sidecar 的 ambient mode 扩展至多集群，实现跨区域和云服务商的统一流量、安全和可观测性管理</span></div>\n<div class=\"point\"><span class=\"point-kw\">网关 API 推理扩展</span><span class=\"point-val\">：将机器学习推理直接集成到服务网格流量流中，支持通过 Kubernetes 原生 API 管理 AI 推理请求</span></div>\n<div class=\"point\"><span class=\"point-kw\">智能体网关集成</span><span class=\"point-val\">：引入实验性数据平面，应对 AI 驱动的动态流量模式，特别是模型、智能体和服务交互日益复杂的环境</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、升级背景与市场需求</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、行业发展趋势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">AI 工作负载增长</span><span class=\"point-val\">：66% 的企业在 Kubernetes 上运行生成式 AI 工作负载，但仅有极少数能实现每日部署</span></div>\n<div class=\"point\"><span class=\"point-kw\">运维复杂性瓶颈</span><span class=\"point-val\">：运维复杂性是主要障碍，Istio 旨在通过简化服务网格采用来弥补这一不足</span></div>\n<div class=\"point\"><span class=\"point-kw\">平台工程责任</span><span class=\"point-val\">：平台工程团队在确保 AI 部署安全、可扩展方面承担越来越重要的责任</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、战略定位</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">基础设施基础层</span><span class=\"point-val\">：将 Istio 定位为下一代基础设施的基础层，嵌入 AI 感知型流量路由</span></div>\n<div class=\"point\"><span class=\"point-kw\">统一平台层</span><span class=\"point-val\">：减少对定制化工具和分散式架构的需求，构建统一的平台层</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、服务网格竞争格局</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、主要竞品对比</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Linkerd</span><span class=\"point-val\">：轻量级替代方案，优先考虑简单性、更低延迟和易用性，适合快速部署且开销最小的团队</span></div>\n<div class=\"point\"><span class=\"point-kw\">Consul</span><span class=\"point-val\">：强调多平台和混合云支持，可在 Kubernetes、虚拟机及其他运行时环境中提供服务网格功能</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、技术演进方向</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">无 sidecar 模型</span><span class=\"point-val\">：包括 Istio 的 ambient mode 和基于 eBPF 的网络架构（如 Cilium），致力于降低开销</span></div>\n<div class=\"point\"><span class=\"point-kw\">平台级控制平面</span><span class=\"point-val\">：服务网格正从传统微服务基础设施演变为平台级控制平面，支持 AI 推理、多集群部署和基于策略的流量管理</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-33", "category": "【AI技术与应用】"}, {"date": "2026-04-11", "title": "【李嘉诚400亿“世纪回归”地产见底了吗】", "summary": "李嘉诚携400亿港元重返房地产，结合成交回暖、政策宽松、供给收缩三大信号，释放市场见底信号。", "source": "虎嗅APP 4月11日17时 <a href=\"https://mp.weixin.qq.com/s?__biz=MTQzMjE1NjQwMQ==&mid=2656164618&idx=3&sn=22b005c3f1ec8072e701acf2a0d00577\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、李嘉诚\"周期之王\"归来，重返地产赛道</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、长实集团积极拿地，手握大量现金</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">400亿港元</span><span class=\"point-val\">：长实集团手握超400亿港元现金</span></div>\n<div class=\"point\"><span class=\"point-kw\">2.3%</span><span class=\"point-val\">：净负债率仅2.3%，财务状况极为稳健</span></div>\n<div class=\"point\"><span class=\"point-kw\">积极竞拍</span><span class=\"point-val\">：李泽钜表示只要回报合理，将积极参与香港新一轮9幅住宅用地竞拍</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、出售欧洲资产，低价布局中国核心地产</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">千亿港元</span><span class=\"point-val\">：出售英国电网公司UK Power Networks股权预计套现千亿港元</span></div>\n<div class=\"point\"><span class=\"point-kw\">跨市场套利</span><span class=\"point-val\">：将欧洲资产高位变现，以低价布局中国核心地产</span></div>\n<div class=\"point\"><span class=\"point-kw\">时机耐人寻味</span><span class=\"point-val\">：在财务模型里，当前土地和资产价格已进入\"合理回报区间\"</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、回望2013-2017年史诗级战略撤退</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">1700亿港元</span><span class=\"point-val\">：李氏家族累计套现超过1700亿港元</span></div>\n<div class=\"point\"><span class=\"point-kw\">402亿港元</span><span class=\"point-val\">：2017年以402亿港元出售香港中环中心，创全球写字楼成交纪录</span></div>\n<div class=\"point\"><span class=\"point-kw\">完美避寒</span><span class=\"point-val\">：抛售广州西城都荟、上海东方汇经中心、北京盈科中心等核心地标</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、市场见底的三大信号</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、成交量回暖，需求集中释放</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">117%</span><span class=\"point-val\">：3月20个重点城市二手房成交面积环比增长117%</span></div>\n<div class=\"point\"><span class=\"point-kw\">28.6%</span><span class=\"point-val\">：二手房成交面积同比增长28.6%</span></div>\n<div class=\"point\"><span class=\"point-kw\">89%</span><span class=\"point-val\">：新房成交面积环比增长89%</span></div>\n<div class=\"point\"><span class=\"point-kw\">成交放量</span><span class=\"point-val\">：北上广深四大一线及成都、西安、南京等强二线城市成交量创新高</span></div>\n<div class=\"point\"><span class=\"point-kw\">情绪修复</span><span class=\"point-val\">：压抑已久的刚性和改善性需求正在集中释放</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、政策与资金双重支撑</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">15%</span><span class=\"point-val\">：首套首付比例最低降至15%，二套降至20%</span></div>\n<div class=\"point\"><span class=\"point-kw\">2时代</span><span class=\"point-val\">：首套房贷利率已步入\"2时代\"，主流城市降至3%以下</span></div>\n<div class=\"point\"><span class=\"point-kw\">2.6%</span><span class=\"point-val\">：公积金贷款利率低至2.6%</span></div>\n<div class=\"point\"><span class=\"point-kw\">6000+项目</span><span class=\"point-val\">：全国超过6000个项目进入\"白名单\"，银行授信接近万亿元</span></div>\n<div class=\"point\"><span class=\"point-kw\">2.06%</span><span class=\"point-val\">：30个重点城市住宅租金回报率中位数达2.06%，超55%小区逾2%</span></div>\n<div class=\"point\"><span class=\"point-kw\">82%</span><span class=\"point-val\">：2026年1-3月外资大宗交易同比增长82%</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、供给端去化压力，去库存接近尾声</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">-74%</span><span class=\"point-val\">：新开工面积较巅峰期下降74%，回落至2004年水平</span></div>\n<div class=\"point\"><span class=\"point-kw\">-17.2%</span><span class=\"point-val\">：2025年全国房地产开发投资同比下降17.2%，较2021年高点\"腰斩\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">-39%</span><span class=\"point-val\">：二手房价格较最高点回落约39%，已超过多数国家房地产危机调整深度</span></div>\n<div class=\"point\"><span class=\"point-kw\">0.05%</span><span class=\"point-val\">：待售面积同比增速仅为0.05%，为2021年7月以来最低</span></div>\n<div class=\"point\"><span class=\"point-kw\">12-16个月</span><span class=\"point-val\">：核心城市去化周期已降至12-16个月的合理区间</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、专家观点存在分歧</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、乐观派认为2026年将确认底部</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">50亿平方米</span><span class=\"point-val\">：住建部数据显示\"十五五\"期间全国城镇住房需求还有将近50亿平方米增量空间</span></div>\n<div class=\"point\"><span class=\"point-kw\">供求平衡</span><span class=\"point-val\">：供给端极度\"休克\"正在强制推动供求关系回归平衡</span></div>\n<div class=\"point\"><span class=\"point-kw\">历史规律</span><span class=\"point-val\">：\"量先于价\"修复模式符合房地产市场历史周期规律</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、谨慎派仍持观望态度</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">分化明显</span><span class=\"point-val\">：价格端仍处于深度调整区间，四大一线城市房价均已回落至2016年水平</span></div>\n<div class=\"point\"><span class=\"point-kw\">漫长过程</span><span class=\"point-val\">：日本泡沫破裂后经历成交量先行回暖、价格逐步企稳的漫长过程</span></div>\n<div class=\"point\"><span class=\"point-kw\">底部信号</span><span class=\"point-val\">：成交量是市场情绪晴雨表，价格是最终确认底部的标志</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-46", "category": "【企业商业与竞争】"}, {"date": "2026-04-11", "title": "【这是星际穿越之后最好的科幻片吗】", "summary": "《挽救计划》被称为《星际穿越》之后最佳科幻片，以软科幻手法和至善外星角色洛基感动观众。", "source": "虎嗅APP 4月11日21时 <a href=\"https://mp.weixin.qq.com/s?__biz=MTQzMjE1NjQwMQ==&mid=2656164683&idx=2&sn=46c3887ef2de7c41a9725e5ba4771f14\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、《挽救计划》被誉为《星际穿越》后最佳科幻片</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、软科幻定位</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">软科幻</span><span class=\"point-val\">：区别于《星际穿越》的硬科幻，选择一软到底，带有动画片的纯真气质</span></div>\n<div class=\"point\"><span class=\"point-kw\">《星际穿越》对比</span><span class=\"point-val\">：距离上映已过去11年，两部片风格定位完全不同但常被比较</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、票房成绩</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">美国票房大捷</span><span class=\"point-val\">：近十年\"非续集/非系列\"电影开画成绩第二，仅次于《奥本海默》</span></div>\n<div class=\"point\"><span class=\"point-kw\">中国票房一般</span><span class=\"point-val\">：仅突破两亿，译名\"挽救计划\"被指隔靴搔痒</span></div>\n</div></div>\n</div></div>\n<div class=
