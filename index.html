】", "summary": "小冰AI因技术路线两次关键卡顿而停摆，创始人李笛反思错过推理模型窗口期，并提出智能源于有效组织的独到见解。", "source": "AI科技评论 4月12日11时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzA5ODEzMjIyMA==&mid=2247733152&idx=1&sn=8462ac19c8028ec20778bfa727cfcf19\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、小冰因技术决策失误而停摆，产品于2025年底正式停服</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、2022年未采纳GPU采购建议，错过大模型爆发窗口期</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Transformer架构</span><span class=\"point-val\">：小冰团队预判架构潜力未挖尽，提出尽快采购GPU训练更大模型，未被采纳</span></div>\n<div class=\"point\"><span class=\"point-kw\">时间窗口</span><span class=\"point-val\">：2022年底至2023年初是基础模型能力拉开差距的关键期，小冰未能进入这一节奏</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、2023年\"小冰链\"项目被叫停，错失思维链技术先机</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">小冰链X-CoTA</span><span class=\"point-val\">：基于思维链（COT）判断，2023年2月推出，仅存活一个月即被强行叫停</span></div>\n<div class=\"point\"><span class=\"point-kw\">技术判断</span><span class=\"point-val\">：团队识别出大模型真正重要的变化在于模型具备\"思考\"能力，而非多模态或生成能力</span></div>\n<div class=\"point\"><span class=\"point-kw\">叫停理由</span><span class=\"point-val\">：被以\"看不懂，不让做\"为由终止</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、2023年底想做推理模型再次被否决，造成技术上的第二个卡顿</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">日本业务表现</span><span class=\"point-val\">：开源大模型排名与Meta持平，270万付费用户，账上资金充裕</span></div>\n<div class=\"point\"><span class=\"point-kw\">管理层分歧</span><span class=\"point-val\">：公司部分管理层再次否决训练推理模型的想法</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">4、核心产品停服，团队转型智能体赛道重新创业</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">X Eva停服</span><span class=\"point-val\">：2025年11月底核心产品正式停服</span></div>\n<div class=\"point\"><span class=\"point-kw\">明日新程</span><span class=\"point-val\">：2025年12月李笛带领核心团队（不足二十人）以新公司名义重新创业</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、小冰的技术理念曾走在时代前沿</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、2013年率先提出\"社交智能体\"架构，将情感计算写入核心设计目标</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Social Agent</span><span class=\"point-val\">：团队直接抛出社交智能体架构，全行业当时还在专注任务型工具</span></div>\n<div class=\"point\"><span class=\"point-kw\">专利布局</span><span class=\"point-val\">：团队对论文发布保持克制，更倾向于通过专利沉淀能力</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、2016年申请的多模态交互专利，至今仍难以绕开</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">多模态往复交互</span><span class=\"point-val\">：围绕AI与人之间通过多模态进行往复交互的方法，申请了底层交互方式设计专利</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、2017年生成模型自发产生\"思考过程\"，类似后来的Chain-of-Thought技术</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">注意力轻触</span><span class=\"point-val\">：李笛称之为\"注意力的一次轻触\"，是ChatGPT思维链技术的早期形态</span></div>\n<div class=\"point\"><span class=\"point-kw\">无人意识到</span><span class=\"point-val\">：当时没人意识到这一技术的价值，包括小冰自己</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、李笛对AI发展有独到见解，认为智能源于有效组织而非规模</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、批评单纯堆砌算力的\"熵增\"设计，倡导向关键节点收敛的\"熵减\"结构</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">群体智能</span><span class=\"point-val\">：真正高级的群体智能是向关键节点收敛的\"熵减\"过程，而非\"人海战术\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">上下文崩溃</span><span class=\"point-val\">：拼命往里塞专家和上下文的做法会导致管理走向崩溃</span></div>\n<div class=\"point\"><span class=\"point-kw\">群体愚蠢</span><span class=\"point-val\">：错误的设计会让AI陷入\"群体愚蠢\"</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、反对用DAU/MAU衡量AI产品，主张关注\"长程关系\"</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">媚俗指标</span><span class=\"point-val\">：行业习惯用DAU、MAU衡量AI产品表现，小冰内部认为这是\"媚俗\"的系统设计</span></div>\n<div class=\"point\"><span class=\"point-kw\">里程碑节点</span><span class=\"point-val\">：更关注用户是否把AI当作可讨论重要问题的对象，或在决策上参考其建议</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、真正在意\"认知\"与\"异构多智能体\"，认为未来会收敛到多智能体协作体系</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">关键在结构</span><span class=\"point-val\">：未来的AI不会停留在单一模型或简单封装，关键在于\"结构\"而非\"数量\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">有效组织</span><span class=\"point-val\">：分歧本质是对\"智能从哪里来\"的不同理解：来自更大的规模，还是更有效的组织</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、行业警示：大模型并非确定性答案，退出潮已经开始</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、零一万物2026年1月宣布将大部分预训练和AI Infra团队并入阿里云</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">人才流失</span><span class=\"point-val\">：经历2025年严重的人才流失潮后，被迫放弃对超级大模型的追逐</span></div>\n<div class=\"point\"><span class=\"point-kw\">明星独角兽</span><span class=\"point-val\">：曾是备受资本追捧的大模型\"六小虎\"之一</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、波形智能成立仅一年半、刚获千万元融资便宣告解散</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">垂直大模型</span><span class=\"point-val\">：专做垂直大模型的公司难以持续</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、单纯算力堆砌与多模态军备竞赛无法形成真正的技术壁垒</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">产业工人</span><span class=\"point-val\">：随着国内培养出上万名\"模型训练产业工人\"，技术壁垒难以建立</span></div>\n<div class=\"point\"><span class=\"point-kw\">规模非答案</span><span class=\"point-val\">：早期小冰内部预判如此，现在正在被验证</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-24", "category": "【AI技术与应用】"}, {"date": "2026-04-12", "title": "【OpenClaw 生态怎么赚钱两条路径拆清楚】", "summary": "OpenClaw 生态提供 Skill 经济与 Token 中转两条变现路径，Skill 经济适合有垂直行业经验者，Token 中转适合有技术资源者。", "source": "字节前端 4月12日21时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzA3MDkzNjM3MA==&mid=2455677052&idx=1&sn=666abff1a4906c090a1ab95b12de3338\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Skill 经济的底层逻辑是把经验结构化变现</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1.1 供需差是核心机会：垂直行业 Skill 严重供不应求</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">3000 vs 50 供需差</span><span class=\"point-val\">：ClawHub 上有 3000+ 免费通用 Skill（搜索、翻译等），但垂直行业 Skill 不到 50 个</span></div>\n<div class=\"point\"><span class=\"point-kw\">市场数据</span><span class=\"point-val\">：2026 年全球 Agent 市场预计 2000 亿美元，垂直行业占 44.5%</span></div>\n<div class=\"point\"><span class=\"point-kw\">结论</span><span class=\"point-val\">：钱在\"专\"里，不在\"通用\"里</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">1.2 三大变现成功案例展示不同路径</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">ClawMart 月入 $80,526</span><span class=\"point-val\">：把别人免费 Skill 打包成产品卖，订阅制 $39-49/月，163 个订阅用户</span></div>\n<div class=\"point\"><span class=\"point-kw\">商品价差监控月赚 3000+</span><span class=\"point-val\">：自动监控淘宝/拼多多/京东/亚马逊价格差，三层变现：自用省钱→卖监控服务→卖技能包</span></div>\n<div class=\"point\"><span class=\"point-kw\">B 站 UP 主收入涨 3 倍</span><span class=\"point-val\">：用 Skill 自动化选题和脚本，月产出从 4 期增至 12 期，月收入从 5000 增至 18000</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">1.3 变现路径按门槛从低到高分为四个层级</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">路径一：安装/部署服务</span><span class=\"point-val\">：¥99-299/单，门槛最低</span></div>\n<div class=\"point\"><span class=\"point-kw\">路径二：付费 Skill</span><span class=\"point-val\">：¥29-99/个，低门槛</span></div>\n<div class=\"point\"><span class=\"point-kw\">路径三：订阅制工具</span><span class=\"point-val\">：¥29-99/月，中门槛</span></div>\n<div class=\"point\"><span class=\"point-kw\">路径四：企业定制</span><span class=\"point-val\">：¥999-10000+，高门槛</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">1.4 70% 收益来自\"卖铲子\"而非 Skill 本身</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">TrustMRR 数据</span><span class=\"point-val\">：153 个商业化项目，近 30 天合计收入 35.86 万美元，前 30 名占 97.3%</span></div>\n<div class=\"point\"><span class=\"point-kw\">核心逻辑</span><span class=\"point-val\">：Skill 是免费获客工具，规模化靠订阅制和企业定制</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">1.5 发布 Skill 的技术流程及引流策略</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">发布命令</span><span class=\"point-val\">：npm i -g clawhub → clawhub login → clawhub skill publish</span></div>\n<div class=\"point\"><span class=\"point-kw\">安全检测</span><span class=\"point-val\">：VirusTotal + OpenClaw 双重扫描</span></div>\n<div class=\"point\"><span class=\"point-kw\">引流效果</span><span class=\"point-val\">：站外引流（教程/B站视频/小红书）比站内搜索有效 10 倍</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">1.6 Skill 经济存在四大坑点</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">头部效应强</span><span class=\"point-val\">：前 30 名拿走 97.3% 收入</span></div>\n<div class=\"point\"><span class=\"point-kw\">恶意 Skill 风险</span><span class=\"point-val\">：Snyk 扫出 386 个恶意 Skill</span></div>\n<div class=\"point\"><span class=\"point-kw\">维护成本</span><span class=\"point-val\">：行业规则/平台改版需持续更新</span></div>\n<div class=\"point\"><span class=\"point-kw\">部署服务天花板低</span><span class=\"point-val\">：¥99-299 一单，时间换钱不可持续</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、Token 中转的底层逻辑是帮别人省麻烦赚过路费</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">2.1 OpenRouter 验证了中转模式的可行性</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">OpenRouter 模式</span><span class=\"point-val\">：聚合几百个 AI 模型接口，每笔抽 5%</span></div>\n<div class=\"point\"><span class=\"point-kw\">财务数据</span><span class=\"point-val\">：2025 年 5 月平台上 AI 调用费用超 1 亿美金，年赚 500 万美金</span></div>\n<div class=\"point\"><span class=\"point-kw\">融资背书</span><span class=\"point-val\">：a16z 投资 4000 万美金，估值 5 亿</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2.2 用户选择中转站的四大原因</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">付款难</span><span class=\"point-val\">：海外 AI API 只收外币信用卡，中转站支持微信/支付宝</span></div>\n<div class=\"point\"><span class=\"point-kw\">接口乱</span><span class=\"point-val\">：Claude/GPT/Gemini 各有接口，中转站统一成一个</span></div>\n<div class=\"point\"><span class=\"point-kw\">不稳定</span><span class=\"point-val\">：官方限流，中转站接多条线路自动切换</span></div>\n<div class=\"point\"><span class=\"point-kw\">易被封</span><span class=\"point-val\">：Anthropic 对部分地区有限制，IP/支付触发风控</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2.3 Token 本质是 AI 的\"流量\"，跟手机流量一样按量付费</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">定义</span><span class=\"point-val\">：用户发一句话给 AI，AI 回一段话，这一来一回消耗的就是 Token</span></div>\n<div class=\"point\"><span class=\"point-kw\">用户需求</span><span class=\"point-val\">：买的不是神秘渠道，是省事、稳定、门槛低</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、两条路径的选择取决于个人资源禀赋</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">3.1 Skill 经济适合有垂直行业经验者</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">核心能力</span><span class=\"point-val\">：需要某领域深度经验，能结构化 SOP</span></div>\n<div class=\"point\"><span class=\"point-kw\">门槛</span><span class=\"point-val\">：相对低，10 分钟可发布 Skill</span></div>\n<div class=\"point\"><span class=\"point-kw\">风险</span><span class=\"point-val\">：头部效应强，需持续维护</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3.2 Token 中转适合有技术资源者</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">核心能力</span><span class=\"point-val\">：需要技术对接能力 + 稳定的服务器/支付通道</span></div>\n<div class=\"point\"><span class=\"point-kw\">门槛</span><span class=\"point-val\">：相对高，需要基础设施投入</span></div>\n<div class=\"point\"><span class=\"point-kw\">优势</span><span class=\"point-val\">：被动收入，边际成本低</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-29", "category": "【AI技术与应用】"}, {"date": "2026-04-12", "title": "【日嫖1000次Qwen3.6反代API接入任意工具】", "summary": "通过CLIProxyAPI工具将Qwen3.6等平台授权额度转换为标准API协议，实现免费白嫖AI模型额度。", "source": "甲维斯C 4月12日14时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzI2MzQ3MzUxMg==&mid=2247486580&idx=1&sn=beb22f0dbb4c698a6ca21811bd8e6ec3\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、问题背景：Qwen3.6出现“倒反天罡”现象</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、免费用户与付费用户待遇倒置</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">每日1000次免费</span><span class=\"point-val\">：普通用户每日可免费使用1000次Qwen3.6 API调用</span></div>\n<div class=\"point\"><span class=\"point-kw\">付费用户受限</span><span class=\"point-val\">：CodingPlan订阅用户反而无法使用该模型，形成反常的用户体验</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、官方功能存在BUG</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">模型选择异常</span><span class=\"point-val\">：用户可以切换到Qwen3.6模型，但切换后仍然无法实际使用</span></div>\n<div class=\"point\"><span class=\"point-kw\">用户体验问题</span><span class=\"point-val\">：选型机制不完善，用户期待官方能及时修复这一问题</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、解决方案：CLIProxyAPI工具介绍</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、核心功能</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">多平台额度转换</span><span class=\"point-val\">：支持将Qwen、Claude、Codex、Gemini等主流平台的授权登录额度转换为标准API协议</span></div>\n<div class=\"point\"><span class=\"point-kw\">多协议支持</span><span class=\"point-val\">：兼容OpenAI、Anthropic、Google三家协议，覆盖主流AI服务提供商</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、平台支持情况</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">支持的平台</span><span class=\"point-val\">：Qwen、Claude、OpenAI Codex、Gemini等几乎所有主流AI平台</span></div>\n<div class=\"point\"><span class=\"point-kw\">风险提示</span><span class=\"point-val\">：Claude平台使用存在一定风险，其他平台问题不大，部分平台甚至赞助了该项目</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、操作指南：完整部署流程</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、环境准备</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">下载地址</span><span class=\"point-val\">：GitHub项目地址：github.com/router-for-me/CLIProxyAPI，下载最新版本的AMD EXE程序</span></div>\n<div class=\"point\"><span class=\"point-kw\">存放路径</span><span class=\"point-val\">：将cli-proxy-api.exe放置到指定目录（如E:\\2api）</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、配置文件编写</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">服务端口</span><span class=\"point-val\">：port: 8317，用于后续API访问</span></div>\n<div class=\"point\"><span class=\"point-kw\">授权目录</span><span class=\"point-val\">：auth-dir: ./auth，保存授权文件，支持相对路径</span></div>\n<div class=\"point\"><span class=\"point-kw\">访问密钥</span><span class=\"point-val\">：api-keys: [\"sk-jarvis\"]，自定义密钥用于第三方接入鉴权</span></div>\n<div class=\"point\"><span class=\"point-kw\">重试机制</span><span class=\"point-val\">：request-retry: 3，遇到403/408/500/502/503/504时自动重试</span></div>\n<div class=\"point\"><span class=\"point-kw\">轮询策略</span><span class=\"point-val\">：quota-exceeded配置支持单账号429时自动切换下一个账号</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、授权登录流程</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Qwen授权</span><span class=\"point-val\">：命令：./cli-proxy-api.exe -qwen-login，自动调用浏览器打开授权页面</span></div>\n<div class=\"point\"><span class=\"point-kw\">其他平台命令</span><span class=\"point-val\">：Claude Code：-claude-login；OpenAI Codex：-codex-login；Gemini CLI：-login</span></div>\n<div class=\"point\"><span class=\"point-kw\">Token有效期</span><span class=\"point-val\">：约6小时，程序每15分钟自动刷新，无需手动处理</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">4、服务启动与验证</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">启动方式</span><span class=\"point-val\">：可直接双击exe或使用命令启动，成功后显示\"API server started successfully on: :8317\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">模型验证</span><span class=\"point-val\">：使用curl命令验证：curl http://localhost:8317/v1/models -H \"x-api-key: sk-jarvis\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">当前模型</span><span class=\"point-val\">：返回显示支持的模型为coder-model，实际对应Qwen3.6 Plus</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">5、协议测试验证</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Anthropic协议测试</span><span class=\"point-val\">：使用Python发送POST请求测试v1/messages接口</span></div>\n<div class=\"point\"><span class=\"point-kw\">返回验证</span><span class=\"point-val\">：正常情况下可成功调用，首次可能遇到429限流错误属正常现象</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-30", "category": "【AI技术与应用】"}, {"date": "2026-04-12", "title": "【造AI的人说AI既被高估又被低估】", "summary": "傅盛解析AI既被高估又被低估的矛盾现象，指出锯齿状智能缺陷、五年AGI节点，并强调AI提效工具已拉开差距。", "source": "傅盛 4月12日18时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5NjgzMzkwMQ==&mid=2653649991&idx=1&sn=e5f30a217f33fe4db2351dcc421bcc0b\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、AI被高估与低估的矛盾现象</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、Google DeepMind CEO Demis Hassabis提出矛盾论断</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">高估</span><span class=\"point-val\">：短期（1-2年内）AI能力被过度吹捧，实际进展未达预期</span></div>\n<div class=\"point\"><span class=\"point-kw\">低估</span><span class=\"point-val\">：长期（10年内）AI潜力被严重忽视，将产生深远影响</span></div>\n<div class=\"point\"><span class=\"point-kw\">可信度</span><span class=\"point-val\">：Hassabis主导了现代AI 90%的基础突破，包括Transformer、AlphaGo、AlphaFold等</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、锯齿状智能揭示AI根本缺陷</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">SimpleQA测试</span><span class=\"point-val\">：主流AI模型在基础事实性问答得分不到40%</span></div>\n<div class=\"point\"><span class=\"point-kw\">司法考试悖论</span><span class=\"point-val\">：同一模型却能通过美国司法考试前10%</span></div>\n<div class=\"point\"><span class=\"point-kw\">冻住论</span><span class=\"point-val\">：模型能力定格在训练完成时，不会因工作积累而成长</span></div>\n<div class=\"point\"><span class=\"point-kw\">缺失能力</span><span class=\"point-val\">：AI有\"记住\"但缺少类似人类睡眠中的整合重组机制</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、AGI五年内到来可能性大</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、按照路线图推进的技术进展</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">历史预测</span><span class=\"point-val\">：Hassabis 2010年预测AGI需20年，技术节点逐一实现</span></div>\n<div class=\"point\"><span class=\"point-kw\">待突破能力</span><span class=\"point-val\">：持续学习、世界模型、层级规划、创造性假设</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、推理模型的质变意义</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Thinking Models</span><span class=\"point-val\">：o1、o3等推理模型先推演再输出，模拟人类思考过程</span></div>\n<div class=\"point\"><span class=\"point-kw\">关键链路</span><span class=\"point-val\">：从\"记忆检索机器\"向\"能思考的系统\"演进</span></div>\n<div class=\"point\"><span class=\"point-kw\">Hassabis判断</span><span class=\"point-val\">：推理方向进展可能已是重大突破之一</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、AGI已在垂直领域到来</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">特斯拉自动驾驶</span><span class=\"point-val\">：在\"开车\"这件事上超越人类</span></div>\n<div class=\"point\"><span class=\"point-kw\">垂直领域AGI</span><span class=\"point-val\">：AGI不是全有全无的开关，已在各个垂直领域逐步实现</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、AI提效工具已拉开差距，不需要等AGI</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、10倍速工业革命效应</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">AGI比喻</span><span class=\"point-val\">：10倍速度的工业革命，十年重塑生产方式</span></div>\n<div class=\"point\"><span class=\"point-kw\">差距拉开</span><span class=\"point-val\">：最不安的不是预测，而是变化已经在发生</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、AI Agent提效已是日常现实</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">龙虾案例</span><span class=\"point-val\">：战略分析报告数小时完成，搜索、汇总、结构化、起草初稿</span></div>\n<div class=\"point\"><span class=\"point-kw\">时间压缩</span><span class=\"point-val\">：从两三人几天缩短到数小时</span></div>\n<div class=\"point\"><span class=\"point-kw\">思考密度提升</span><span class=\"point-val\">：人只需在最关键判断上\"压最后一刀\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">能力放大</span><span class=\"point-val\">：一人配多个Agent等于小型军团，10倍是起点而非上限</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-31", "category": "【AI技术与应用】"}, {"date": "2026-04-12", "title": "【最近刷屏的 SBTI我用几句话复制了一个】", "summary": "AI时代让技术门槛消失，但真正让产品刷屏的是对用户情绪的洞察和理解，而非技术本身。", "source": "我就BB怎么了 4月12日16时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzA5ODg5NDk1Ng==&mid=2247500499&idx=1&sn=1cf21e49cbd45a61f7c512615d04b58a\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、SBTI 是一个娱乐性人格测试产品，靠情绪共鸣出圈</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1. 产品形态模仿 MBTI，标签荒诞无科学依据</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">界面碰瓷</span><span class=\"point-val\">：直接对标 MBTI，开屏宣称\"MBTI 已经过时，SBTI 来了\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">测试标签</span><span class=\"point-val\">：包含死者 DEAD、吗喽 MALO、愤世者 SHIT 等 27 种荒诞标签，无一正经</span></div>\n<div class=\"point\"><span class=\"point-kw\">作者自评</span><span class=\"point-val\">：连作者自己都承认\"没有科学依据，娱乐为主，别认真\"</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2. 上线即刷屏，服务器崩了两次</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">传播数据</span><span class=\"point-val\">：上线当天冲上热搜，引发大量用户晒截图、讨论题库逻辑</span></div>\n<div class=\"point\"><span class=\"point-kw\">用户参与</span><span class=\"point-val\">：朋友圈大量转发认领标签，测试结果是情绪出口而非心理诊断</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3. 爆火核心在于抓住了年轻人的情绪痛点</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">情绪洞察</span><span class=\"point-val\">：作者懂年轻人的精神内耗，知道他们想自嘲但不想被说教</span></div>\n<div class=\"point\"><span class=\"point-kw\">情感共鸣</span><span class=\"point-val\">：用户测出\"死者\"发朋友圈，底下回复\"我也是\"，感到的是\"被看见\"</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、AI 工具让\"做产品\"门槛大幅降低，几小时即可上线</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1. SBTI 制作者不会写代码，完全借助 AI 完成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">创作背景</span><span class=\"point-val\">：想劝嗜酒朋友戒酒，设计测试引导其认识到问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">实现路径</span><span class=\"point-val\">：因不会写代码无法实现，直到借助 AI 才做出产品</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2. 作者演示用 Claude Code 快速复制类似产品</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">操作步骤</span><span class=\"point-val\">：打开 Claude Code 启动 Plan 模式，描述需求后 AI 完成产品设计</span></div>\n<div class=\"point\"><span class=\"point-kw\">制作时间</span><span class=\"point-val\">：几分钟产出初版，后续 AI 推荐免费部署平台</span></div>\n<div class=\"point\"><span class=\"point-kw\">作者案例</span><span class=\"point-val\">：制作了打工人人格测试网站\"摸鱼大神\"</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3. AI 编程工具让\"想法到产品\"的路径大幅缩短</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">技术平权</span><span class=\"point-val\">：以前\"不会写代码\"是巨大障碍，现在几小时就能上线产品</span></div>\n<div class=\"point\"><span class=\"point-kw\">工具成熟</span><span class=\"point-val\">：Claude Code 等 AI 编程工具已能独立完成产品设计、代码编写、部署上线</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、AI 时代真正的竞争力是对人的理解和情绪洞察</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1. 技术门槛消失后，真正的门槛浮出水面</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">技术易得</span><span class=\"point-val\">：AI 能帮你把想法变成产品，但替代不了你对人的理解</span></div>\n<div class=\"point\"><span class=\"point-kw\">新竞争点</span><span class=\"point-val\">：够不够了解身边人在想什么、在怕什么、在笑什么、在骂什么</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2. 理解用户情绪才是让产品刷屏的核心因素</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">SBTI 启示</span><span class=\"point-val\">：技术含量几乎为零，但懂情绪让产品疯传</span></div>\n<div class=\"point\"><span class=\"point-kw\">价值判断</span><span class=\"point-val\">：懂那种精神内耗是什么感觉，才能做出让人感到\"这说的是我\"的内容</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-32", "category": "【AI技术与应用】"}, {"date": "2026-04-12", "title": "【外交部宣布哈立德将访华】", "summary": "[需补充摘要]", "source": "参考消息 4月12日15时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5MzA0MTg2MA==&mid=2654607916&idx=1&sn=a7d82cae7e99a685b9bdf547688f0635\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "", "emoji": "📰", "id": "art-34", "category": "【AI技术与应用】"}, {"date": "2026-04-12", "title": "【联合利华再投这一印度护肤品牌】", "summary": "联合利华风投领投印度护肤品牌Clayco A轮融资，凸显国际美妆巨头对印度市场的高速增长潜力的一致看好", "source": "聚美丽 4月12日19时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzI0OTg1NTUxOA==&mid=2247636420&idx=2&sn=8473fb2c0617bfcdb9b44424a8fc2808\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、Clayco获联合利华风投再次投资，印证品牌差异化竞争力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、印度护肤品牌Clayco完成410万美元A轮融资</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">融资规模</span><span class=\"point-val\">：联合利华风投领投，新加坡ICMG Global Ventures II参投，约合人民币2802万元</span></div>\n<div class=\"point\"><span class=\"point-kw\">投资历程</span><span class=\"point-val\">：早在品牌推出后不久曾投资200万美元（约合人民币1367万元），时隔两年再次追投</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、Clayco定位日式护肤，中端价格覆盖主流消费群体</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">品牌创立</span><span class=\"point-val\">：2024年由印度女企业家Niharika Jhunjhunwala创立，主打\"从全球美妆仪式中汲取灵感\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">产品特色</span><span class=\"point-val\">：以日式护肤系列为核心，推出排毒抹茶泥膜、山茶花卸妆油、硫磺祛痘膏等热门单品</span></div>\n<div class=\"point\"><span class=\"point-kw\">价格区间</span><span class=\"point-val\">：599-1398印度卢比（约合人民币44-103元），覆盖中端护肤消费市场</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、Clayco多渠道布局实现快速增长，FY2026营收约770万美元</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">渠道模式</span><span class=\"point-val\">：采用线上线下多渠道并行发展，实现DTC直接面向消费者销售</span></div>\n<div class=\"point\"><span class=\"point-kw\">渠道覆盖</span><span class=\"point-val\">：印度本土知名美妆零售商Nykaa、Tira和多个即时零售Q-Commerce平台</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、印度美妆市场预计2035年达40亿美元，吸引国际巨头加速布局</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、全球美妆巨头争相布局印度市场</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">市场规模</span><span class=\"point-val\">：目前印度奢侈美容市场规模已达10亿美元（约合人民币68.4亿元），预计2028年增至16亿美元</span></div>\n<div class=\"point\"><span class=\"point-kw\">增长预测</span><span class=\"point-val\">：到2035年将实现4倍增长至40亿美元（约合人民币274亿元），复合年增长率达14%</span></div>\n<div class=\"point\"><span class=\"point-kw\">巨头动作</span><span class=\"point-val\">：除联合利华外，欧莱雅 L'Oréal、雅诗兰黛 Estée Lauder、资生堂 Shiseido 等纷纷加码印度市场</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、联合利华风投2024年至今已完成至少6笔投资</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">投资重点</span><span class=\"point-val\">：在美妆及健康领域动作频频，其中3笔涉及印度市场</span></div>\n<div class=\"point\"><span class=\"point-kw\">战略意图</span><span class=\"point-val\">：持续押注印度作为亚洲乃至全球增长最快的美妆市场之一</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、Clayco获融资后将拓展护发和身体护理品类，推动供应链升级</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、本轮资金将用于新品类拓展与供应链建设</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">品类延伸</span><span class=\"point-val\">：从护肤拓展至护发、身体护理等新品类</span></div>\n<div class=\"point\"><span class=\"point-kw\">基础设施</span><span class=\"point-val\">：推动供应链升级，为规模化扩张奠定基础</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、具备差异化竞争力的本土品牌将获国际资本持续青睐</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">发展逻辑</span><span class=\"point-val\">：从产品出圈、到资本加码、再到规模化扩张的加速期</span></div>\n<div class=\"point\"><span class=\"point-kw\">市场格局</span><span class=\"point-val\">：印度美妆市场将呈现\"国际资本赋能本土品牌\"的新格局，全球竞争格局正迎来新一轮重塑</span></div>\n</div></div>\n</div></div>", "emoji": "💰", "id": "art-36", "category": "【美妆个护行业】"}, {"date": "2026-04-12", "title": "【OLAY黑管精华2.0_赫莲娜黑绷带上新_卡诗护发晚安蜜丨CBOX】", "summary": "多个国际美妆品牌推出春季新品，涵盖抗衰精华、护发晚安蜜、彩妆系列及香氛，配方创新升级", "source": "化妆品财经在线 4月12日14时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzU0NjgwNjMyOQ==&mid=2247696980&idx=1&sn=7fca202616d9edc9d1edca8990c848e2\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、抗衰老护肤新品</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、OLAY黑管精华2.0</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">成分革新</span><span class=\"point-val\">：采用“双酸·双A·双肽”配方，通过PHCA酸复配PRO和类肉毒肽PRO深入肌底直击衰老细胞</span></div>\n<div class=\"point\"><span class=\"point-kw\">功效突破</span><span class=\"point-val\">：补骨脂酚和太子参提取物促生21种关键支撑蛋白，淡化法令纹、抬头纹、川字纹等顽固细纹</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、赫莲娜黑绷带轮廓精华</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">核心成分</span><span class=\"point-val\">：王牌玻色因溶液重塑肌底促生胶原，益生元复合因子强韧屏障，七叶树皂苷协同咖啡因舒缓眼周</span></div>\n<div class=\"point\"><span class=\"point-kw\">创新设计</span><span class=\"point-val\">：专研奢护按摩头搭配液体绷带质地，一泵冰感舒缓，精准提拉轮廓紧实下颌</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、护发产品创新</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、巴黎卡诗护发晚安蜜</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">创新场景</span><span class=\"point-val\">：专研「黄金蜜」配方，夜间护发新概念，精华彻夜环裹唤醒丝缎发质</span></div>\n<div class=\"point\"><span class=\"point-kw\">技术突破</span><span class=\"point-val\">：7年精研仿生蛋白，模拟原生发丝结构，以形补形修复受损发丝</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、欧莱雅PRO控油绿云朵瓶</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">产品定位</span><span class=\"point-val\">：专为油堵糙头皮打造的\"头皮吸油纸\"，精纯果酸温和去除老化角质疏通毛囊</span></div>\n<div class=\"point\"><span class=\"point-kw\">使用效果</span><span class=\"point-val\">：一次使用长效控油，发根持久蓬松清爽，轻盈云朵质地易冲洗不残留</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、彩妆与香氛新品</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、酵色COTD咖啡系列</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">设计理念</span><span class=\"point-val\">：咖啡融入日常，打造时髦高智感，唇颊冻采用质感棕调</span></div>\n<div class=\"point\"><span class=\"point-kw\">产品组合</span><span class=\"point-val\">：包括奶咖盘灵感妆容盘和「冰美式」妆前喷雾，醒肤贴妆消散浮肿倦意</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、阿蒂仙之香新香L'Amant情人</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">调香师</span><span class=\"point-val\">：由Nathalie Lorson创作，灵感源自玛格丽特·杜拉斯同名小说</span></div>\n<div class=\"point\"><span class=\"point-kw\">香调特点</span><span class=\"point-val\">：木质辛辣调，前调墨水气息，中调果叶香与辛香料，尾调广藿香和木质香，热冷张力碰撞</span></div>\n</div></div>\n</div></div>", "emoji": "💄", "id": "art-37", "category": "【美妆个护行业】"}, {"date": "2026-04-12", "title": "【超万件重组胶原蛋白“敷贴”被召回】", "summary": "近两年5家企业召回超1.3万件重组胶原蛋白敷贴，暴露\"械字号\"市场生产规范缺失和监管漏洞", "source": "青眼 4月12日13时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzAxMDY5MDA4NQ==&mid=2650545712&idx=1&sn=dbc59589da9f2d7d6842f40978fb881d\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、广西愈尔美主动召回8000盒重组胶原蛋白敷贴</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、召回规模与原因</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">召回数量</span><span class=\"point-val\">：涉及3个批号共8000盒产品，召回级别为三级</span></div>\n<div class=\"point\"><span class=\"point-kw\">违规原因</span><span class=\"point-val\">：未按照医疗器械生产质量管理规范组织生产，原料采购记录有缺失</span></div>\n<div class=\"point\"><span class=\"point-kw\">生产方</span><span class=\"point-val\">：委托生产企业为广东名颜化妆品有限公司</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、企业与产品背景</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">企业变更</span><span class=\"point-val\">：注册人名称于2024年11月15日由\"广西国械医药有限公司\"变更为\"广西愈尔美医药有限公司\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">企业资质</span><span class=\"point-val\">：成立于2023年9月，旗下共有4款第二类医疗器械产品</span></div>\n<div class=\"point\"><span class=\"point-kw\">监管措施</span><span class=\"point-val\">：广东药监局已要求委托方派质量负责人驻厂</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、重组胶原蛋白\"械字号\"市场乱象频发</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、行业整体召回情况</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">召回数量</span><span class=\"point-val\">：自2024年至今，5家企业共召回超1.3万件重组胶原蛋白\"械字号\"产品</span></div>\n<div class=\"point\"><span class=\"point-kw\">不合规通报</span><span class=\"point-val\">：2025年广东药监局抽查中，多款医用重组胶原蛋白产品被检出不符合规定</span></div>\n<div class=\"point\"><span class=\"point-kw\">问题根源</span><span class=\"point-val\">：生产与质量控制环节存在规范缺失</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、宣传层面的违规问题</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">违规宣传</span><span class=\"point-val\">：\"械字号\"水乳、面膜等产品的违规宣传问题屡禁不止</span></div>\n<div class=\"point\"><span class=\"point-kw\">套证乱象</span><span class=\"point-val\">：央视\"3·15\"曝光医美行业外泌体产品违规\"套证\"问题</span></div>\n<div class=\"point\"><span class=\"point-kw\">处罚结果</span><span class=\"point-val\">：灏麟生物被吊销营业执照并罚款200万元</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、市场前景广阔但合规风险突出</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、市场规模与增长潜力</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">市场规模</span><span class=\"point-val\">：2021年达259亿元，2022-2027年复合增长率将达23.1%</span></div>\n<div class=\"point\"><span class=\"point-kw\">热门成分</span><span class=\"point-val\">：重组胶原蛋白成为功效性护肤与医用敷料市场中复合年增长率最高的成分</span></div>\n<div class=\"point\"><span class=\"point-kw\">品牌布局</span><span class=\"point-val\">：敷尔佳、可复美、珀莱雅、丸美、倩碧等品牌争相入局\"械字号\"领域</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、行业发展趋势与合规挑战</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">注册数量</span><span class=\"point-val\">：以\"重组胶原蛋白\"为关键词在国家药监局平台检索到1687条注册信息</span></div>\n<div class=\"point\"><span class=\"point-kw\">三类械布局</span><span class=\"point-val\">：敷尔佳自主研发的重组III型人源化胶原蛋白冻干纤维已完成临床试验，正在筹备申报第三类医疗器械</span></div>\n<div class=\"point\"><span class=\"point-kw\">主要风险</span><span class=\"point-val\">：巩军华指出合规风险集中在三大环节：生产管理体系执行力度、包装标识和信息追溯的合规性、上市后质量抽检的应对能力</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-38", "category": "【美妆个护行业】"}, {"date": "2026-04-12", "title": "【美伊谈判陷入僵局两艘超级油轮在霍尔木兹海峡突然掉头】", "summary": "美伊谈判破裂致两艘超级油轮在霍尔木兹海峡掉头，海峡封锁持续，全球能源供应担忧加剧。", "source": "华尔街见闻 4月12日19时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5NzAwMzU0MA==&mid=2247639477&idx=2&sn=fa5bdce603198977b916bb13a54361be\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、美伊谈判破裂，油轮被迫掉头</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、谈判代表宣布在伊斯兰堡的谈判彻底失败</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">谈判破裂</span><span class=\"point-val\">：美伊双方在伊斯兰堡的谈判宣告失败，外界对霍尔木兹海峡短期内恢复正常通航的预期再度落空</span></div>\n<div class=\"point\"><span class=\"point-kw\">时间节点</span><span class=\"point-val\">：两艘空载超级油轮周日在抵近霍尔木兹海峡关键检查点后突然掉头，恰与谈判破裂高度吻合</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、两艘VLCC油轮掉头，一艘获批通行</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">油轮掉头</span><span class=\"point-val\">：悬挂希腊国旗的Agios Fanourios I号与巴基斯坦国旗的Shalamar号相继掉头折返</span></div>\n<div class=\"point\"><span class=\"point-kw\">成功通行</span><span class=\"point-val\">：VLCC Mombasa B经由伊朗批准航线驶入波斯湾，尚未发出明确目的地信号</span></div>\n<div class=\"point\"><span class=\"point-kw\">许可失效</span><span class=\"point-val\">：伊拉克和巴基斯坦此前均已获得伊朗过境许可，但两艘船只临阵退缩</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、军事对峙升级，海峡局势紧张</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、美军双舰穿越霍尔木兹海峡执行清雷任务</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">美军行动</span><span class=\"point-val\">：美东时间11日，两艘美国海军导弹驱逐舰穿越霍尔木兹海峡并在波斯湾行动</span></div>\n<div class=\"point\"><span class=\"point-kw\">任务目的</span><span class=\"point-val\">：美中央司令部称此举是清理伊朗伊斯兰革命卫队在海峡布设水雷任务的一部分</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、伊朗强烈否认美方说法，坚持主权立场</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">伊朗回应</span><span class=\"point-val\">：伊朗武装部队哈塔姆安比亚中央总部发言人强力否认美方清雷说法</span></div>\n<div class=\"point\"><span class=\"point-kw\">主权主张</span><span class=\"point-val\">：伊朗表示任何船只在霍尔木兹海峡的过境权完全掌握在伊朗武装力量手中</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、能源供应风险持续，市场担忧升温</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、封锁规模历史罕见，能源通道受阻</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">历史级别</span><span class=\"point-val\">：自中东冲突爆发以来，霍尔木兹海峡实际陷入封堵，能源供应中断规模为历史罕见</span></div>\n<div class=\"point\"><span class=\"point-kw\">市场预期</span><span class=\"point-val\">：谈判破裂意味着海峡通行问题短期内难以解决，原油供应担忧情绪料将持续升温</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、多艘船只曾中途放弃，通行风险居高不下</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">通行不稳</span><span class=\"point-val\">：近几周内多艘集装箱船于上月底掉头后最终成功驶出，液化天然气运输船上周同样中途折返</span></div>\n<div class=\"point\"><span class=\"point-kw\">短暂积极</span><span class=\"point-val\">：周六曾出现短暂积极信号——两艘超级油轮和一艘希腊船只满载原油成功经海峡驶出波斯湾</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-39", "category": "【国际地缘与能源】"}, {"date": "2026-04-12", "title": "【伊朗回应特朗普】", "summary": "伊朗反驳特朗普封锁威胁，强调封锁无法\"开放\"霍尔木兹海峡，呼吁通过谈判解决分歧", "source": "参考消息 4月12日18时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5MzA0MTg2MA==&mid=2654607944&idx=2&sn=797d149f8ce7d8328d6f1dd5e86ec397\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、伊朗回应美国封锁威胁</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、伊朗驻奥地利使馆在社交媒体上明确反驳</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">封锁概念</span><span class=\"point-val\">：伊朗强调\"封锁就是封锁\"，无法\"开放\"霍尔木兹海峡，只会对其加以限制</span></div>\n<div class=\"point\"><span class=\"point-kw\">唯一出路</span><span class=\"point-val\">：伊朗认为要走出困境，必须在谈判中保持开放与灵活，顺应理智</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、美伊谈判破裂导致局势紧张</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、谈判未能达成协议后，特朗普转发海上封锁文章</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">谈判失败</span><span class=\"point-val\">：美伊谈判未能达成协议，特朗普随即在社交媒体转发《如果伊朗不屈服，总统持有的王牌是海上封锁》文章</span></div>\n<div class=\"point\"><span class=\"point-kw\">历史先例</span><span class=\"point-val\">：美国曾通过海上封锁\"扼杀了\"委内瑞拉的石油收入，使该国经济陷入困境</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、特朗普发出强硬威胁，可能采取极端手段</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">极端威胁</span><span class=\"point-val\">：特朗普曾威胁将德黑兰炸回\"石器时代\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">备选方案</span><span class=\"point-val\">：若美伊谈判失败，特朗普可能动用封锁策略或实施军事打击</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-40", "category": "【国际地缘与能源】"}, {"date": "2026-04-12", "title": "【以色列多地爆发抗议活动】", "summary": "以色列多地爆发第6周反战抗议，数千人集会喊口号反对美以伊战事，控诉战争令民众深受其害", "source": "参考消息 4月12日15时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5MzA0MTg2MA==&mid=2654607916&idx=2&sn=d70982d4f7730079e3dfe8fc6197732a\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、以色列多地爆发大规模反战抗议活动</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、抗议活动在多个城市同步举行</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">抗议规模</span><span class=\"point-val\">：数千人聚集在特拉维夫市中心的哈比玛广场，海法和贝尔谢巴等地也举行集会</span></div>\n<div class=\"point\"><span class=\"point-kw\">持续时间</span><span class=\"point-val\">：这是美以伊战事爆发以来连续第6周举行抗议集会</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、抗议者高喊反战口号呼吁和平</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">核心口号</span><span class=\"point-val\">：\"占领黎巴嫩南部必将招致灾难\"、\"没有和平就没有安全\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">激进诉求</span><span class=\"point-val\">：\"不要再为战争推波助澜\"、\"飞行员，停止杀害儿童\"</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、民众表达对战争循环的强烈不满</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、抗议组织者批评战争伤害本国民众</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">生活影响</span><span class=\"point-val\">：\"6个星期以来，我们躲入防空洞，关停买卖，让孩子待在家里\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">伤亡代价</span><span class=\"point-val\">：\"失去亲人\"，战争给以色列普通民众带来深重苦难</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、反战运动志在制止无休无止的战争循环</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">组织目标</span><span class=\"point-val\">：非政府组织\"共享之城\"成员表示聚集目的不仅是制止当前战争</span></div>\n<div class=\"point\"><span class=\"point-kw\">长远愿景</span><span class=\"point-val\">：抗议者宣称要\"制止下一场战争，制止无休无止循环的战争\"</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、冲突背景与局势升级</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、美国和以色列对伊朗发起军事行动</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">军事行动</span><span class=\"point-val\">：美国和以色列于2026年2月28日对伊朗发起大规模军事行动</span></div>\n<div class=\"point\"><span class=\"point-kw\">反击行动</span><span class=\"point-val\">：伊朗随后对中东地区美军基地和以色列目标发起还击</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、以色列对黎巴嫩实施大规模空袭</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">空袭时间</span><span class=\"point-val\">：以色列于2026年3月2日起对黎巴嫩实施大规模空袭</span></div>\n<div class=\"point\"><span class=\"point-kw\">伤亡情况</span><span class=\"point-val\">：空袭造成重大人员伤亡，局势持续紧张升级</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-41", "category": "【国际地缘与能源】"}, {"date": "2026-04-12", "title": "【美伊谈判后伊朗总统向普京通报】", "summary": "伊朗总统佩泽希齐扬向普京通报美伊谈判结果，普京表示愿以政治外交途径解决美伊冲突。", "source": "参考消息 4月12日21时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5MzA0MTg2MA==&mid=2654607979&idx=1&sn=a4969fe49a31d66804c87fb99278b0b1\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、伊朗领导人向普京通报美伊谈判情况</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、伊朗总统佩泽希齐扬与普京通话</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">通话背景</span><span class=\"point-val\">：两国领导人就近期中东局势发展进行讨论</span></div>\n<div class=\"point\"><span class=\"point-kw\">通报内容</span><span class=\"point-val\">：佩泽希齐扬向普京通报了在伊斯兰堡举行的美伊谈判结果</span></div>\n<div class=\"point\"><span class=\"point-kw\">感谢表态</span><span class=\"point-val\">：佩泽希齐扬对俄罗斯秉持的缓和局势坚定立场表示感谢</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、伊朗对俄人道主义援助表示赞赏</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">人道援助</span><span class=\"point-val\">：佩泽希齐扬对俄罗斯向伊朗人民提供的人道主义援助表示感谢</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、普京表态愿为解决美伊冲突贡献力量</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、普京表达政治解决意愿</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">解决途径</span><span class=\"point-val\">：普京表示愿为寻求通过政治和外交途径解决美伊冲突贡献力量</span></div>\n<div class=\"point\"><span class=\"point-kw\">俄方立场</span><span class=\"point-val\">：俄罗斯将继续与该地区各方保持接触</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、俄方致力于中东地区和平</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">和平目标</span><span class=\"point-val\">：确保中东地区实现持久和平</span></div>\n<div class=\"point\"><span class=\"point-kw\">持续接触</span><span class=\"point-val\">：克里姆林宫表示俄将继续与该地区各方保持接触</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、两国重申深化俄伊友好关系</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、双方共同致力于双边合作</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">友好关系</span><span class=\"point-val\">：两国领导人重申双方共同致力于全面深化俄伊友好关系</span></div>\n<div class=\"point\"><span class=\"point-kw\">合作议题</span><span class=\"point-val\">：讨论了双边合作议题</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-42", "category": "【国际地缘与能源】"}, {"date": "2026-04-12", "title": "【桑切斯开启第四次访华】", "summary": "西班牙首相桑切斯四访中国，深化政治纽带、推动经济平衡合作并就国际问题交换意见", "source": "参考消息 4月12日12时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5MzA0MTg2MA==&mid=2654607890&idx=2&sn=4ce1998e1a8089a23571bbe42a9e0b31\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、访华背景与时间节点</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、四年内第四次访华</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">时间节点</span><span class=\"point-val\">：2026年4月11日抵达北京，是四年内的第四次访问</span></div>\n<div class=\"point\"><span class=\"point-kw\">外交连续性</span><span class=\"point-val\">：继西班牙国王费利佩六世和王后莱蒂西娅2025年底访华之后的又一次重要高层互动</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、访华主要目标</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、政治层面</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">政治纽带</span><span class=\"point-val\">：加强同中国的政治关系，提升双边合作层级</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、经济层面</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">贸易平衡</span><span class=\"point-val\">：在贸易和投资领域实现双边经济关系的进一步平衡</span></div>\n<div class=\"point\"><span class=\"point-kw\">行业布局</span><span class=\"point-val\">：会见汽车、能源、电信等战略行业的企业家</span></div>\n<div class=\"point\"><span class=\"point-kw\">商业活动</span><span class=\"point-val\">：出席欧盟中国商会的活动</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、人文科技</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">多领域合作</span><span class=\"point-val\">：推进双方在文化、教育和科学等领域的合作</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、国际议题讨论</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、地缘政治议题</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">全球局势</span><span class=\"point-val\">：两国领导人就当前地缘政治局势交换意见</span></div>\n<div class=\"point\"><span class=\"point-kw\">中东和平</span><span class=\"point-val\">：推动中东地区实现持久和平等共同关心的国际问题</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-43", "category": "【国际地缘与能源】"}, {"date": "2026-04-12", "title": "【美国人口大转折点真的来了吗】", "summary": "2025年美国净迁移转负非因\"集体逃亡\"，而是政策主动拦截流入，欧洲承接增量，加拿大反而降温。", "source": "虎嗅APP 4月12日10时 <a href=\"https://mp.weixin.qq.com/s?__biz=MTQzMjE1NjQwMQ==&mid=2656164776&idx=2&sn=ce85386af9fe3ef27d9a5a0ef040e417\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、2025年美国净迁移大幅下滑，但本质是政策阻挡流入而非移民逃离</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、人口流入被政策大幅削减导致净迁移数据腰斩</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">净迁移130万</span><span class=\"point-val\">：2025财年美国人口普查局数据显示净迁入约130万，较前年腰斩54%</span></div>\n<div class=\"point\"><span class=\"point-kw\">布鲁金斯估算</span><span class=\"point-val\">：布鲁金斯学会估算全年可能落至-10万至-29万区间，为50年来首次转负</span></div>\n<div class=\"point\"><span class=\"point-kw\">政策拦截</span><span class=\"point-val\">：边境管控收紧、签证紧缩、大规模驱逐导致2025上半年流入直接损失100多万</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、美国公民出逃规模有限，谈不上\"集体逃亡\"</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">退籍翻倍</span><span class=\"point-val\">：美国公民退籍申请2025年Q1同比翻倍，但全年总量仅几十万人</span></div>\n<div class=\"point\"><span class=\"point-kw\">3.4亿基数</span><span class=\"point-val\">：放在3.4亿人口大盘中，流出规模微不足道，远未构成人口危机</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、美国流出人口主要流向欧洲而非此前预期的加拿大</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、加拿大接收的美国移民反而同比减少20%</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">永久居民锐减</span><span class=\"point-val\">：2025年前三季度美国公民获加拿大永居资格人数同比减少20%，为疫情以来低位</span></div>\n<div class=\"point\"><span class=\"point-kw\">2026年更低</span><span class=\"point-val\">：2026年1月仅295人，远低于去年同期的805人</span></div>\n<div class=\"point\"><span class=\"point-kw\">加拿大自紧</span><span class=\"point-val\">：加拿大同步收紧移民，非永久居民减少60余万，总人口增长放缓</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、欧洲15国2025年承接至少18万美国人，为真正增量目的地</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">葡萄牙暴增</span><span class=\"point-val\">：葡萄牙美国人数量自疫情以来持续猛涨</span></div>\n<div class=\"point\"><span class=\"point-kw\">西班牙荷兰翻番</span><span class=\"point-val\">：两地十年内美国居民数量均翻倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">爱尔兰翻两倍</span><span class=\"point-val\">：2025年预计达1万人，几乎是2024年的两倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">德爱超本</span><span class=\"point-val\">：德国、爱尔兰2025年美国人移入数量甚至超过本国公民迁出</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、欧洲吸引力源于生活成本与质量优势</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">美元走弱</span><span class=\"point-val\">：汇率因素提升美国人在欧洲的购买力</span></div>\n<div class=\"point\"><span class=\"point-kw\">生活成本</span><span class=\"point-val\">：欧洲生活成本相对更可控</span></div>\n<div class=\"point\"><span class=\"point-kw\">远程办公</span><span class=\"point-val\">：数字游民可维持美国收入同时享受欧洲生活品质</span></div>\n<div class=\"point\"><span class=\"point-kw\">政策招贤</span><span class=\"point-val\">：欧洲多国主动推出招揽高技能人才的移民政策</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、美国移民问题的真正挑战是内部结构失衡而非绝对数量</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、虽然流入减少流出增加，但变量相对于大基数仍属短期波动</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">绝对量有限</span><span class=\"point-val\">：几十万量级的变化在3.4亿人口中占比极小</span></div>\n<div class=\"point\"><span class=\"point-kw\">灵活可调</span><span class=\"point-val\">：移民结构随政策变化具有高度灵活性</span></div>\n<div class=\"point\"><span class=\"point-kw\">腹地庞大</span><span class=\"point-val\">：美国潜在人口腹地和吸引力依然相当巨大</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、内部结构此消彼长的失衡才是核心矛盾</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">结构决定方向</span><span class=\"point-val\">：在无绝对量级差距时，结构比总量更能决定组织行动力</span></div>\n<div class=\"point\"><span class=\"point-kw\">政策可调总量</span><span class=\"point-val\">：政府可通过政策随时调节进来的人数和人群构成</span></div>\n<div class=\"point\"><span class=\"point-kw\">结构失控</span><span class=\"point-val\">：特朗普加大力度的背景正是内部结构越来越难以控制</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-44", "category": "【国际地缘与能源】"}, {"date": "2026-04-12", "title": "【字节砸60亿买地释放重大信号】", "summary": "字节跳动2026年砸61亿在北京连拿两块地，布局AI研发基地，彰显大厂\"由轻转重\"的战略转型。", "source": "新行情 4月12日12时 <a href=\"https://mp.weixin.qq.com/s?__biz=Mzg5NTUyMzM3NA==&mid=2247686868&idx=2&sn=5940f2ec2c30e0cf24d84c85fb26a288\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、字节跳动北京买地现状：连下两城，豪掷61亿</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、2026年开年即出手，在海淀区连续拿下两块科研用地</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">地块一</span><span class=\"point-val\">：蓝景丽家收储项目，成交价28亿元，规划建面9.68万平方米，用途为\"抖音集团数字经济产业园\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">地块二</span><span class=\"point-val\">：东升科技园三期地块，成交价33.05亿元，占地4.89万平方米，规划建面12.8万平方米，出让年限50年</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、两块地均位于北京智力资源最密集的核心区域</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">区位优势</span><span class=\"point-val\">：地块位于学院路双泉堡地区，靠近清华东路、小月河，地铁15号线北沙滩站旁</span></div>\n<div class=\"point\"><span class=\"point-kw\">产学研资源</span><span class=\"point-val\">：3公里范围内有清华大学、北京大学、中国科学院，39所高校和100多家科研院所</span></div>\n<div class=\"point\"><span class=\"point-kw\">准入门槛</span><span class=\"point-val\">：引入企业须为人工智能、集成电路、脑机接口、量子信息领域的标杆企业，年税收不低于6万元/平方米</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、字节北京不动产规模已超阿里腾讯两位老大哥</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">方恒时尚中心</span><span class=\"point-val\">：约50亿元，9万平方米</span></div>\n<div class=\"point\"><span class=\"point-kw\">大钟寺中坤广场</span><span class=\"point-val\">：约90亿元，43万平方米</span></div>\n<div class=\"point\"><span class=\"point-kw\">蓝景丽家项目</span><span class=\"point-val\">：28亿元，9.68万平方米</span></div>\n<div class=\"point\"><span class=\"point-kw\">东升科技园地块</span><span class=\"point-val\">：33亿元，12.8万平方米</span></div>\n<div class=\"point\"><span class=\"point-kw\">四笔合计</span><span class=\"point-val\">：74.48万平方米，超过阿里北京总部（47万）和腾讯北京总部（33.4万）</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、字节买地背后的战略逻辑：四大驱动力</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、业务规模扩张倒逼资产\"由轻转重\"</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">营收体量</span><span class=\"point-val\">：彭博社预测2025年字节总营收约1.31万亿元，同比增长20%，净利润约3520亿元，利润率近27%</span></div>\n<div class=\"point\"><span class=\"point-kw\">产品矩阵</span><span class=\"point-val\">：抖音、TikTok、今日头条、豆包、火山引擎等全球月活用户超40亿</span></div>\n<div class=\"point\"><span class=\"point-kw\">管理需求</span><span class=\"point-val\">：数万员工分散在十几个租赁写字楼，管理和沟通成本高，自建园区可提升信息安全与跨部门协作效率</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、技术研发专业化需要专属基础设施</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">AI大模型需求</span><span class=\"point-val\">：豆包大模型在AI赛道快速推进，需要专门算力基础设施</span></div>\n<div class=\"point\"><span class=\"point-kw\">硬件研究需求</span><span class=\"point-val\">：集成电路、脑机接口等研究方向需要专业实验室</span></div>\n<div class=\"point\"><span class=\"point-kw\">定制化建设</span><span class=\"point-val\">：自建园区可从设计阶段就将专业需求纳入规划</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、核心地段不动产是优质资产配置</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">稀缺资源</span><span class=\"point-val\">：北京海淀地块具有稀缺性和长期保值属性</span></div>\n<div class=\"point\"><span class=\"point-kw\">资产结构</span><span class=\"point-val\">：一线城市核心地段物业对优化公司资产结构有益</span></div>\n<div class=\"point\"><span class=\"point-kw\">行业规律</span><span class=\"point-val\">：互联网行业变化快，但核心城市地皮是硬通货</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">4、贴近顶尖人才与前沿研究资源</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">地理布局</span><span class=\"point-val\">：东升科技园地块紧邻清华北大和中科院，便于接触顶尖人才</span></div>\n<div class=\"point\"><span class=\"point-kw\">产业定位</span><span class=\"point-val\">：地块要求引入AI、集成电路、量子信息等未来产业标杆企业</span></div>\n<div class=\"point\"><span class=\"point-kw\">长远布局</span><span class=\"point-val\">：2030年竣工后将成为字节在学院路的全新研发中心</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、互联网大厂\"由轻转重\"的行业趋势</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、各大厂纷纷加码核心城市不动产</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">腾讯</span><span class=\"point-val\">：2024年以64.2亿元拿下海淀区学院路地块</span></div>\n<div class=\"point\"><span class=\"point-kw\">美团</span><span class=\"point-val\">：2020年以65.41亿元拿下上海杨浦滨江地块</span></div>\n<div class=\"point\"><span class=\"point-kw\">京东</span><span class=\"point-val\">：2023年以31.12亿元拿下北京亦庄地块</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、\"轻资产\"模式已不适配当前竞争阶段</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">行业背景</span><span class=\"point-val\">：互联网竞争进入深水区，自建总部或研发园区已成标配</span></div>\n<div class=\"point\"><span class=\"point-kw\">规模效应</span><span class=\"point-val\">：公司大到一定程度，自持物业带来的稳定性和自主性是租赁无法替代的</span></div>\n<div class=\"point\"><span class=\"point-kw\">字节路径</span><span class=\"point-val\">：从居民楼创业公司到74万平方米\"庞然大物\"，发展体量水到渠成的选择</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-45", "category": "【企业商业与竞争】"}, {"date": "2026-04-12", "title": "【狠人刘强东对网约车下手了】", "summary": "京东联合长安入局网约车，以“电商+车企”新模式切入出行赛道，布局超级APP生态。", "source": "新行情 4月12日12时 <a href=\"https://mp.weixin.qq.com/s?__biz=Mzg5NTUyMzM3NA==&mid=2247686868&idx=1&sn=2e8b4a10d49daf0817b4857a6520c6ff\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、京东正式推出“Open出发服务”进入网约车市场</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、济南内测阶段推进中</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">灰度测试</span><span class=\"point-val\">：目前已在济南启动内测，App端页面设计对标主流打车应用</span></div>\n<div class=\"point\"><span class=\"point-kw\">联合模式</span><span class=\"point-val\">：与长安汽车联合推出，深度牵手主机厂而非采用传统聚合平台模式</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、放弃传统聚合平台模式</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">运力自营</span><span class=\"point-val\">：不接入第三方网约车运力，转而自建运力体系</span></div>\n<div class=\"point\"><span class=\"point-kw\">利润优化</span><span class=\"point-val\">：缩短利润分配链条，从车辆供给端切入提高收益</span></div>\n<div class=\"point\"><span class=\"point-kw\">早期试水</span><span class=\"point-val\">：去年曾短暂上线“打车”入口后关闭，本次为战略性重启</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、京东入局网约车的核心优势</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、庞大的用户基础与电商生态</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">7亿活跃用户</span><span class=\"point-val\">：只需在现有App内开辟入口即可低成本打开市场</span></div>\n<div class=\"point\"><span class=\"point-kw\">差异化服务</span><span class=\"point-val\">：打车可享Plus会员权益、与购物场景联动，形成纯出行平台没有的服务体验</span></div>\n<div class=\"point\"><span class=\"point-kw\">高频场景</span><span class=\"point-val\">：用户打开App频率和使用时长将增加，从而拉动平台GMV</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、长安汽车深度合作形成壁垒</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">全面战略合作</span><span class=\"point-val\">：去年10月官宣与长安建立全面战略合作关系</span></div>\n<div class=\"point\"><span class=\"point-kw\">车辆供给优势</span><span class=\"point-val\">：借助长安能力加速切入出行服务赛道</span></div>\n<div class=\"point\"><span class=\"point-kw\">绕开依赖</span><span class=\"point-val\">：电商+车企组合具备较高壁垒，避免对第三方运力的依赖</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、京东在出行领域的长远战略布局</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、Robotaxi自动驾驶出租车领域</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">商标布局</span><span class=\"point-val\">：申请注册多枚“Joyrobotaxi”商标，覆盖运输工具、科学仪器等领域</span></div>\n<div class=\"point\"><span class=\"point-kw\">技术积累</span><span class=\"point-val\">：物流无人车已在近30座城市实现规模化应用，开展智能配送车运营</span></div>\n<div class=\"point\"><span class=\"point-kw\">无人配送站</span><span class=\"point-val\">：明年4月将建成全球首个无人配送站，实现无人机与无人配送车协同</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、巨大的市场前景</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">2000亿元市场</span><span class=\"point-val\">：东吴证券预测2030年自动驾驶出租车市场规模</span></div>\n<div class=\"point\"><span class=\"point-kw\">36%占比</span><span class=\"point-val\">：自动驾驶出租车占B端共享出行比例有望提升至36%</span></div>\n<div class=\"point\"><span class=\"point-kw\">成本下降</span><span class=\"point-val\">：小马智行第七代Robotaxi总成本下降70%，加速商业化落地</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、超级APP成为互联网下半场的竞争焦点</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、高频刚需场景的战略价值</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">频次更高</span><span class=\"point-val\">：外卖和打车使用频次高于线上购物，决策链路更短</span></div>\n<div class=\"point\"><span class=\"point-kw\">需求填补</span><span class=\"point-val\">：有效填补京东在用户日常生活场景中的需求空白</span></div>\n<div class=\"point\"><span class=\"point-kw\">用户粘性</span><span class=\"point-val\">：通过高频服务提升用户粘性，驱动存量用户新增长</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、各平台纷纷拓展服务边界</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">超级APP趋势</span><span class=\"point-val\">：各大互联网公司加码超级APP，覆盖社交、支付、出行、餐饮、购物等核心生活场景</span></div>\n<div class=\"point\"><span class=\"point-kw\">格局重塑</span><span class=\"point-val\">：超级APP战略正在重塑外卖、出行等多个赛道的竞争格局</span></div>\n<div class=\"point\"><span class=\"point-kw\">回归体验</span><span class=\"point-val\">：最终竞争将回归到用户体验比拼，推动行业差异化竞争</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-47", "category": "【企业商业与竞争】"}, {"date": "2026-04-12", "title": "【宇树机器人百米冲刺10米每秒破纪录_爱马仕Agent支持微信_8大模型赌球血本无归｜Hunt Good周报】", "summary": "本期周报涵盖AI芯片自研趋势、OpenAI推动免责立法、科技领袖遭袭及ChatGPT辅助诊疗等8大要闻", "source": "APPSO 4月12日9时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5MjAyNDUyMA==&mid=2651087285&idx=1&sn=7d3adfe231ec24fe48c28cefbbdc7275\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、AI行业竞争与布局</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、Anthropic评估自研AI芯片可行性</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">算力紧张</span><span class=\"point-val\">：公司评估自研芯片以应对训练和运行更强模型的算力需求</span></div>\n<div class=\"point\"><span class=\"point-kw\">早期阶段</span><span class=\"point-val\">：尚未敲定具体方案，也可能继续外购芯片</span></div>\n<div class=\"point\"><span class=\"point-kw\">营收暴涨</span><span class=\"point-val\">：年化营收突破300亿美元，四个月增长超三倍</span></div>\n<div class=\"point\"><span class=\"point-kw\">合作并行</span><span class=\"point-val\">：同时使用Google TPU和亚马逊芯片，并与Google及博通签署长期合作协议</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、Meta和OpenAI同步推进芯片自研</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">行业趋势</span><span class=\"point-val\">：多家头部AI实验室都在布局自研芯片</span></div>\n<div class=\"point\"><span class=\"point-kw\">成本估算</span><span class=\"point-val\">：设计一颗先进AI芯片成本约5亿美元</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、AI监管与法律争议</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、OpenAI支持SB 3444免责法案</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">保护范围</span><span class=\"point-val\">：AI公司发布安全报告后，即使造成百人死亡或超10亿美元损失也免责</span></div>\n<div class=\"point\"><span class=\"point-kw\">门槛限定</span><span class=\"point-val\">：保护限于训练算力成本超1亿美元的\"前沿模型\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">覆盖企业</span><span class=\"point-val\">：实际涵盖OpenAI、Google、Anthropic、xAI、Meta等头部实验室</span></div>\n<div class=\"point\"><span class=\"point-kw\">豁免争议</span><span class=\"point-val\">：包括坏人利用AI制造武器、AI自主犯罪等极端情况</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、立法策略明显转向</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">策略转变</span><span class=\"point-val\">：从防守反对到主动支持激进免责措施</span></div>\n<div class=\"point\"><span class=\"point-kw\">官方表态</span><span class=\"point-val\">：将重点放在\"降低最先进AI系统严重伤害风险\"</span></div>\n<div class=\"point\"><span class=\"point-kw\">民众反对</span><span class=\"point-val\">：伊利诺伊州90%受访者反对给AI公司豁免责任</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、AI引发的社会冲突</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、OpenAI CEO奥特曼住所遭燃烧瓶袭击</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">事件经过</span><span class=\"point-val\">：4月10日凌晨，旧金山住所被投掷燃烧瓶，门外起火</span></div>\n<div class=\"point\"><span class=\"point-kw\">嫌疑人</span><span class=\"point-val\">：20岁男性，约一小时后在OpenAI总部附近被捕，威胁烧毁大楼</span></div>\n<div class=\"point\"><span class=\"point-kw\">安全升级</span><span class=\"point-val\">：OpenAI办公区加强警力部署，多名警卫和封锁线</span></div>\n<div class=\"point\"><span class=\"point-kw\">背景调查</span><span class=\"point-val\">：嫌疑人在Altman价值2700万美元住宅附近被捕</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、AI批评与暴力行为的边界引发讨论</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">Altman回应</span><span class=\"point-val\">：表示对AI批评\"完全合理\"，呼吁降低对立强度</span></div>\n<div class=\"point\"><span class=\"point-kw\">组织撇清</span><span class=\"point-val\">：\"Stop the A.I. Race\"和\"Stop A.I.\"均否认参与并谴责暴力</span></div>\n<div class=\"point\"><span class=\"point-kw\">舆论焦点</span><span class=\"point-val\">：围绕AI的对立情绪已从抗议升级到实际攻击</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">四、AI应用突破案例</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、ChatGPT帮助女子确诊罕见病</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">误诊经历</span><span class=\"point-val\">：英国女子被误诊4年，涉及焦虑、抑郁、癫痫等多种病症</span></div>\n<div class=\"point\"><span class=\"point-kw\">诊断困境</span><span class=\"point-val\">：2022年确诊癫痫，2025年一度昏迷3天，原因不明</span></div>\n<div class=\"point\"><span class=\"point-kw\">AI介入</span><span class=\"point-val\">：将症状输入ChatGPT后获得\"遗传性痉挛性截瘫\"线索</span></div>\n<div class=\"point\"><span class=\"point-kw\">最终确认</span><span class=\"point-val\">：基因检测证实诊断，该病为罕见遗传性疾病</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-48", "category": "【企业商业与竞争】"}, {"date": "2026-04-12", "title": "【白女为啥突然集体骨折】", "summary": "2026年跑步热潮兴起，普通跑者应力性骨折频发，社交媒体博主推广不科学训练方式加剧了这一趋势。", "source": "虎嗅APP 4月12日10时 <a href=\"https://mp.weixin.qq.com/s?__biz=MTQzMjE1NjQwMQ==&mid=2656164776&idx=1&sn=c0aa50ce5134aeda4e698dc9e0d4768a\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、城市马拉松热潮与应力性骨折流行</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、城市马拉松一票难求，跑步成2026年最时髦生活方式</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">重庆马拉松中签率</span><span class=\"point-val\">：仅4.29%，朋友收到第12次中签失败短信</span></div>\n<div class=\"point\"><span class=\"point-kw\">恋爱软件线下版</span><span class=\"point-val\">：马拉松成为社交和城市GDP拉动活动</span></div>\n<div class=\"point\"><span class=\"point-kw\">Google搜索趋势</span><span class=\"point-val\">：应力性骨折关注度创2004年以来新高</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、应力性骨折从专业运动员扩展到普通女性跑者</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">专业运动员历史</span><span class=\"point-val\">：约40%运动员一辈子至少经历一次应力性骨折</span></div>\n<div class=\"point\"><span class=\"point-kw\">学术报告</span><span class=\"point-val\">：应力性骨折常见于精英运动员和军事训练人群</span></div>\n<div class=\"point\"><span class=\"point-kw\">新现象</span><span class=\"point-val\">：社交媒体上不专业跑步博主和素人跑者集体出现应力性骨折症状</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、社交媒体博主推广不科学训练方式</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、博主简化体育美德，忽视科学训练边界</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">鼓励叙事</span><span class=\"point-val\">：“跑步是最简单、最稳定的健康方式”“只要坚持跑，你就有回报”</span></div>\n<div class=\"point\"><span class=\"point-kw\">忽视休息</span><span class=\"point-val\">：网红鼓励新人动起来，却不告知何时需要停下</span></div>\n<div class=\"point\"><span class=\"point-kw\">受伤仍练</span><span class=\"point-val\">：博主在骨折后仍继续高强度训练，如锐舞、蹲起、跳跃</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、极端康复视频正常化有害训练观念</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">案例：Louise Stonham</span><span class=\"point-val\">：拖着腿到操场锐舞，用手撑着跑步机踢腿</span></div>\n<div class=\"point\"><span class=\"point-kw\">案例：Andrea</span><span class=\"point-val\">：胫骨粉碎性骨折后仍用外置医疗器械固定骨骼进行健身</span></div>\n<div class=\"point\"><span class=\"point-kw\">药物止痛</span><span class=\"point-val\">：博主鼓励服用布洛芬带伤完成训练，不到30分钟起效</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、大众模仿与危险循环的形成</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、流量导向的极端健康内容激励伤者效仿</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">侥幸心理</span><span class=\"point-val\">：伤者羡慕博主不把伤势当回事的“猛劲”，幻想再练练就恢复</span></div>\n<div class=\"point\"><span class=\"point-kw\">流量加持</span><span class=\"point-val\">：看受伤的人自讨苦吃成为群众“最大乐子”</span></div>\n<div class=\"point\"><span class=\"point-kw\">仪式化康复</span><span class=\"point-val\">：激昂节奏与动感音乐强化受伤坚持叙事，护具变成“光荣徽章”</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、应力性骨折与其他伤病群体形成“伤病康复”文化</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">骨折俱乐部</span><span class=\"point-val\">：#BrokenFootClub 和 #InjuryRecovery 话题下聚集大量伤员</span></div>\n<div class=\"point\"><span class=\"point-kw\">宣言式口号</span><span class=\"point-val\">：“第六次确诊应力性骨折，但还能一直蹦”“骨折阻止不了我”</span></div>\n<div class=\"point\"><span class=\"point-kw\">专家警告</span><span class=\"point-val\">：这种视频会正常化有害训练观念，使大众失去对科学医疗建议的信任</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-49", "category": "【前沿科技与民生】"}, {"date": "2026-04-12", "title": "【郑丽文一行圆满结束大陆参访 离京返台】", "summary": "郑丽文率国民党访问团完成6天大陆参访，参观小米汽车工厂体验智能汽车，时隔10年国民党主席再次访陆。", "source": "参考消息 4月12日15时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5MzA0MTg2MA==&mid=2654607916&idx=3&sn=84f947e0e78024ab2c1ba8dfb63ae527\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、参访行程圆满结束</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、访问行程安排</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">6天行程</span><span class=\"point-val\">：4月7日至12日，郑丽文率领国民党访问团访问大陆</span></div>\n<div class=\"point\"><span class=\"point-kw\">访问地点</span><span class=\"point-val\">：依次到访江苏、上海、北京三个城市</span></div>\n<div class=\"point\"><span class=\"point-kw\">返程安排</span><span class=\"point-val\">：12日下午乘机离开北京返回台湾</span></div>\n<div class=\"point\"><span class=\"point-kw\">送行官员</span><span class=\"point-val\">：中共中央台办主任宋涛前往首都机场送行</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、参观小米汽车工厂</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、了解新能源产业发展</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">实地考察</span><span class=\"point-val\">：上午参访小米汽车工厂，实地了解大陆新能源汽车生产研发最新进展</span></div>\n<div class=\"point\"><span class=\"point-kw\">亲身体验</span><span class=\"point-val\">：郑丽文坐上汽车驾驶座，面带笑意</span></div>\n<div class=\"point\"><span class=\"point-kw\">高度评价</span><span class=\"point-val\">：称赞车内智能、贴心的设计</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、此次访问的历史意义</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、十年来的首次</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">历史性访问</span><span class=\"point-val\">：这是中国国民党主席时隔10年再次率团访问大陆</span></div>\n<div class=\"point\"><span class=\"point-kw\">两岸交流</span><span class=\"point-val\">：体现了两岸政党间的重要沟通互动</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-50", "category": "【前沿科技与民生】"}, {"date": "2026-04-12", "title": "【丁业现被查】", "summary": "西藏自治区人大常委会原副主任丁业现因严重违纪违法，正接受中央纪委国家监委纪律审查和监察调查", "source": "参考消息 4月12日18时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5MzA0MTg2MA==&mid=2654607944&idx=3&sn=5f65ce008d920a647604100ca2d784f7\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、丁业现基本信息</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、职务情况</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">丁业现</span><span class=\"point-val\">：西藏自治区人大常委会原党组副书记、副主任</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、被查原因及调查情况</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、违纪违法情况</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">严重违纪违法</span><span class=\"point-val\">：丁业现涉嫌严重违纪违法</span></div>\n<div class=\"point\"><span class=\"point-kw\">调查机构</span><span class=\"point-val\">：正接受中央纪委国家监委纪律审查和监察调查</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、新闻来源</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、权威发布</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">来源媒体</span><span class=\"point-val\">：新华社</span></div>\n<div class=\"point\"><span class=\"point-kw\">发布时间</span><span class=\"point-val\">：2026年4月12日</span></div>\n<div class=\"point\"><span class=\"point-kw\">编辑审核</span><span class=\"point-val\">：审核：陈向阳，编辑：郭庆娜</span></div>\n</div></div>\n</div></div>", "emoji": "💡", "id": "art-53", "category": "【前沿科技与民生】"}, {"date": "2026-04-12", "title": "【男子爬上美国军机“一顿猛砸”】", "summary": "爱尔兰男子在香农机场闯入禁区，爬上美军C-130运输机持斧损毁飞机，被安保控制后逮捕。", "source": "参考消息 4月12日16时 <a href=\"https://mp.weixin.qq.com/s?__biz=MjM5MzA0MTg2MA==&mid=2654607935&idx=3&sn=cfed4773ed0e0e501218f6780a1159ff\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、事件基本信息</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、时间地点人物</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">时间</span><span class=\"point-val\">：当地时间4月11日</span></div>\n<div class=\"point\"><span class=\"point-kw\">地点</span><span class=\"point-val\">：克莱尔郡香农机场</span></div>\n<div class=\"point\"><span class=\"point-kw\">人物</span><span class=\"point-val\">：一名男子</span></div>\n<div class=\"point\"><span class=\"point-kw\">来源</span><span class=\"point-val\">：外媒报道</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">二、事件具体行为</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、闯入机场禁区</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">闯入禁区</span><span class=\"point-val\">：男子涉嫌非法进入机场管制区域</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、登机损毁</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">登上C-130运输机</span><span class=\"point-val\">：爬上美军C-130运输机</span></div>\n<div class=\"point\"><span class=\"point-kw\">持斧破坏</span><span class=\"point-val\">：使用斧头损毁机身与机翼</span></div>\n</div></div>\n</div></div>\n<div class=\"level1\"><div class=\"level1-title\">三、事件处置结果</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、安保响应</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">移动舷梯控制</span><span class=\"point-val\">：机场安保人员动用移动舷梯接近并控制涉事男子</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、法律程序</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">警方逮捕</span><span class=\"point-val\">：男子已被警方逮捕，面临相关指控</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">3、运营影响</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">短暂中断</span><span class=\"point-val\">：事件导致机场运营短暂中断，目前已基本恢复</span></div>\n</div></div>\n</div></div>", "emoji": "🚀", "id": "art-54", "category": "【前沿科技与民生】"}]}, "2026-04-11": {"categories": [{"category": "【AI技术与应用】", "articles": [{"date": "2026-04-11", "title": "【中国具身模型狂揽全球第一机器人的人类数据时代来了】", "summary": "中国00后创业公司灵初智能发布10万小时人类操作数据集，Psi-R2模型登顶MolmoSpace全球具身智能评测榜首", "source": "量子位 4月11日9时 <a href=\"https://mp.weixin.qq.com/s?__biz=MzIzNjc1NzUzMw==&mid=2247882420&idx=1&sn=e7c8d3fed818e3c7230514ef277860ad\" target=\"_blank\" style=\"color:var(--c6);text-decoration:none;\">链接</a>", "body": "<div class=\"level1\"><div class=\"level1-title\">一、灵初智能发布10万+小时大规模人类操作数据集</div><div class=\"level1-content\">\n<div class=\"level2\"><div class=\"level2-title\">1、数据集规模和组成</div><div class=\"level2-content\">\n<div class=\"point\"><span class=\"point-kw\">10万小时</span><span class=\"point-val\">：总数据量，包括真机数据5417小时和人类数据95472小时</span></div>\n<div class=\"point\"><span class=\"point-kw\">1000小时已开源</span><span class=\"point-val\">：，年底将扩展至百万量级</span></div>\n<div class=\"point\"><span class=\"point-kw\">覆盖规模</span><span class=\"point-val\">：294种场景、4821种任务、1382种物体</span></div>\n</div></div>\n<div class=\"level2\"><div class=\"level2-title\">2、数据采集方式<
